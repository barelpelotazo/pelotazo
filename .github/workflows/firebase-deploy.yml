name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main  # O "master", asegúrate de cómo se llama tu rama principal
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BAR_EL_PELOTAZO_16C19 }}'
          projectId: bar-el-pelotazo-16c19
          channelId: live
