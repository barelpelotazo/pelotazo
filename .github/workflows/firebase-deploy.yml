{
  "hosting": {
    "public": ".",
    "ignore": [
      "firebase.json",
      "**/.*",
      "**/node_modules/**",
      "**/*.bat",
      "**/*.md",
      "**/*.txt",
      ".github/**",
      "subir.bat",
      "reparar_y_subir.bat",
      "subir_web.bat"
    ],
    "headers": [
      {
        "source": "**/*.bat",
        "headers": [
          {
            "key": "Content-Type",
            "value": "text/html"
          },
          {
            "key": "Cache-Control",
            "value": "no-cache, no-store, must-revalidate"
          }
        ]
      }
    ],
    "rewrites": [
      {
        "source": "**",
        "destination": "/index.html"
      }
    ]
  }
}
