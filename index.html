<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bar App PRO Admin Integrada</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{--bg:#f3f4f6;--card:#fff;--text:#111827;--muted:#6b7280;--blue:#1d4ed8;--green:#15803d;--red:#dc2626;--orange:#ea580c;--sky:#0369a1;--gray:#374151}
*{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1200px;margin:0 auto}.top{background:#0f172a;color:#fff;padding:14px;text-align:center;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.card{background:var(--card);border-radius:14px;padding:14px;margin:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.product{background:#fff;border-radius:14px;padding:12px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.ticket{background:#fff;border-radius:14px;padding:14px;margin:10px;border-left:8px solid var(--blue);box-shadow:0 1px 6px rgba(0,0,0,.08)}
.title{font-size:28px;font-weight:800;text-align:center;margin:14px 0}.sub{font-size:14px;color:var(--muted)}
.btn{border:none;border-radius:12px;padding:12px 14px;font-weight:700;cursor:pointer}.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-orange{background:var(--orange);color:#fff}.btn-sky{background:var(--sky);color:#fff}.btn-gray{background:var(--gray);color:#fff}.btn-light{background:#e5e7eb;color:#111827}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.col{display:flex;flex-direction:column;gap:8px}
.input,.select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;background:#fff}.hidden{display:none!important}
.pill{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}.pill-green{background:#dcfce7;color:#166534}.pill-red{background:#fee2e2;color:#991b1b}.pill-orange{background:#ffedd5;color:#9a3412}
.sticky-bottom{position:sticky;bottom:0;background:#111827;color:#fff;padding:14px;text-align:center;font-size:22px;font-weight:800}
.admin-tabs{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;padding:10px}.small{font-size:12px;color:var(--muted)}.separator{height:1px;background:#e5e7eb;margin:12px 0}
</style>
</head>
<body>
<div class="top">BAR APP PRO</div>
<div id="app" class="wrap"></div>
<script>
const params = new URLSearchParams(location.search);
const modo = params.get("modo") || "cliente";
const mesa = params.get("mesa") || "0";
const firebaseConfig = {
  apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
  authDomain: "bar-el-pelotazo-16c19.firebaseapp.com",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19",
  storageBucket: "bar-el-pelotazo-16c19.firebasestorage.app",
  messagingSenderId: "209747310104",
  appId: "1:209747310104:web:aea60ec14671e302f9f56d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let carta = {}, camareros = {}, pedidos = {}, carrito = [], camareroActual = null, adminTab = "carta", pedidosAbiertos = true, mesasEstado = {};
function money(n){ return Number(n||0).toFixed(2) + "€"; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function byName(a,b){ return String(a.nombre||"").localeCompare(String(b.nombre||""),"es"); }
function openAdminTab(tab){ adminTab = tab; renderAdmin(); }
function ensureConfig(){ db.ref("config").once("value", s=>{ const v=s.val()||{}; if(v.pedidosAbiertos===undefined) db.ref("config/pedidosAbiertos").set(true); }); }
function mesaAbiertaActual(m){ return mesasEstado[String(m)] === false ? false : true; }
db.ref("carta").on("value", s=>{ carta = s.val() || {}; if(modo==="cliente") renderCliente(); if(modo==="camarero" && camareroActual) renderCamareroLogged(); if(modo==="admin" && document.getElementById("adminPass")==null) renderAdmin(); });
db.ref("camareros").on("value", s=>{ camareros = s.val() || {}; if(modo==="admin" && document.getElementById("adminPass")==null) renderAdmin(); });
db.ref("pedidos").on("value", s=>{ pedidos = s.val() || {}; if(modo==="cocina") renderCocina(); if(modo==="barra") renderBarra(); if(modo==="caja") renderCaja(); if(modo==="admin" && document.getElementById("adminPass")==null) renderAdmin(); });
db.ref("config/pedidosAbiertos").on("value", s=>{ pedidosAbiertos = s.val() === false ? false : true; if(modo==="cliente") renderCliente(); if(modo==="admin" && document.getElementById("adminPass")==null) renderAdmin(); });
db.ref("mesasEstado").on("value", s=>{ mesasEstado = s.val() || {}; if(modo==="admin" && document.getElementById("adminPass")==null) renderAdmin(); });
ensureConfig();

function renderCliente(){
  const list = Object.values(carta).sort(byName);
  app.innerHTML = `
    <div class="title">Mesa ${esc(mesa)}</div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div><div style="font-size:22px;font-weight:800">Carta</div><div class="sub">El cliente solo ve la carta. El camarero toma el pedido.</div></div>
        <button class="btn btn-blue" onclick="location.href='?modo=camarero&mesa=${mesa}'">Entrar como camarero</button>
      </div>
      <div style="margin-top:10px">${pedidosAbiertos ? '<span class="pill pill-green">PEDIDOS ACTIVOS</span>' : '<span class="pill pill-red">PEDIDOS BLOQUEADOS</span>'} ${mesaAbiertaActual(mesa) ? '<span class="pill pill-green">MESA ABIERTA</span>' : '<span class="pill pill-red">MESA CERRADA</span>'}</div>
    </div>
    <div class="grid">
      ${list.map(p=>`<div class="product"><div style="font-weight:800">${esc(p.nombre)}</div><div class="sub">${esc(p.categoria||"")}</div><div style="margin-top:8px;font-size:22px;font-weight:800">${money(p.precio)}</div></div>`).join("")}
    </div>`;
}
function renderCamareroLogin(){
  app.innerHTML = `
    <div class="title">Mesa ${esc(mesa)}</div>
    <div class="card" style="max-width:420px;margin:20px auto">
      <div style="font-size:22px;font-weight:800">Acceso camarero</div>
      <div class="sub">Introduce tu PIN para tomar el pedido de la mesa.</div>
      <div class="col" style="margin-top:12px">
        <input id="pin" class="input" placeholder="PIN camarero" inputmode="numeric">
        <button class="btn btn-blue" onclick="loginCamarero()">Entrar</button>
        <button class="btn btn-light" onclick="location.href='?mesa=${mesa}'">Volver a carta</button>
      </div>
    </div>`;
}
function loginCamarero(){
  const pin = document.getElementById("pin").value.trim();
  const found = Object.entries(camareros).map(([id,c])=>({id,...c})).find(c=>String(c.pin||"").trim()===pin && c.activo!==false);
  if(!found){ alert("PIN incorrecto"); return; }
  camareroActual = found;
  renderCamareroLogged();
}
function addItem(nombre, precio, cocina){ carrito.push({nombre, precio:Number(precio||0), cocina:!!cocina, hecho:false}); renderCamareroLogged(); }
function delItem(i){ carrito.splice(i,1); renderCamareroLogged(); }
function extraItem(){
  const n = prompt("Nombre del extra"); if(!n) return;
  const p = parseFloat(prompt("Precio")); if(isNaN(p)){ alert("Precio incorrecto"); return; }
  const c = confirm("Aceptar = cocina. Cancelar = barra.");
  carrito.push({nombre:n, precio:Number(p), cocina:c, hecho:false}); renderCamareroLogged();
}
function enviarPedido(){
  if(!camareroActual){ alert("Falta camarero"); return; }
  if(!pedidosAbiertos){ alert("Pedidos bloqueados"); return; }
  if(!mesaAbiertaActual(mesa)){ alert("Mesa cerrada"); return; }
  if(!carrito.length){ alert("Añade productos"); return; }
  db.ref("pedidos").push({ mesa:String(mesa), camarero:camareroActual.nombre, items:carrito, timestamp:Date.now() }).then(()=>{ carrito=[]; renderCamareroLogged(); alert("Pedido enviado"); });
}
function renderCamareroLogged(){
  if(!camareroActual){ renderCamareroLogin(); return; }
  const list = Object.values(carta).sort(byName);
  const total = carrito.reduce((a,b)=>a+Number(b.precio||0),0);
  app.innerHTML = `
    <div class="title">Mesa ${esc(mesa)}</div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div><div style="font-size:20px;font-weight:800">Camarero: ${esc(camareroActual.nombre)}</div><div class="sub">${pedidosAbiertos ? 'Pedidos activos' : 'Pedidos bloqueados'} · ${mesaAbiertaActual(mesa) ? 'Mesa abierta' : 'Mesa cerrada'}</div></div>
        <div class="row"><button class="btn btn-orange" onclick="extraItem()">+ EXTRA</button><button class="btn btn-light" onclick="location.href='?mesa=${mesa}'">Volver</button></div>
      </div>
    </div>
    <div class="grid">
      ${list.map(p=>`<div class="product"><div style="font-weight:800">${esc(p.nombre)}</div><div class="sub">${esc(p.categoria||"")} · ${p.cocina ? 'Cocina' : 'Barra'}</div><div style="margin:10px 0;font-size:22px;font-weight:800">${money(p.precio)}</div><button class="btn btn-blue" onclick="addItem('${String(p.nombre).replace(/'/g,"\\'")}', ${Number(p.precio||0)}, ${!!p.cocina})">+</button></div>`).join("")}
    </div>
    <div class="card">
      <div style="font-size:22px;font-weight:800">Carrito</div>
      <div class="separator"></div>
      ${carrito.length ? carrito.map((p,i)=>`<div class="row" style="justify-content:space-between;margin:8px 0"><div>${esc(p.nombre)} <span class="small">(${p.cocina ? 'Cocina' : 'Barra'})</span></div><div class="row"><div style="font-weight:800">${money(p.precio)}</div><button class="btn btn-red" onclick="delItem(${i})">✕</button></div></div>`).join("") : '<div class="sub">Carrito vacío</div>'}
      <div class="separator"></div>
      <button class="btn btn-green" style="width:100%" onclick="enviarPedido()">Enviar pedido</button>
    </div>
    <div class="sticky-bottom">TOTAL ${money(total)}</div>`;
}
function marcarHecho(id, cocina){
  db.ref("pedidos/"+id+"/items").once("value", s=>{
    const items = s.val() || [];
    items.forEach(i=>{ if(!!i.cocina === cocina && !i.hecho) i.hecho = true; });
    db.ref("pedidos/"+id+"/items").set(items);
  });
}
function renderProduccion(tipo){
  const cocinaMode = tipo === "cocina";
  app.innerHTML = `<div class="title">${cocinaMode ? 'COCINA' : 'BARRA'}</div><div id="tickets"></div>`;
  const html = Object.entries(pedidos).map(([id,p])=>{
    const items = (p.items||[]).filter(i => (!!i.cocina === cocinaMode) && !i.hecho);
    if(!items.length) return "";
    const total = items.reduce((a,b)=>a+Number(b.precio||0),0);
    return `<div class="ticket" style="border-left-color:${cocinaMode ? '#ea580c' : '#0369a1'}"><div class="row" style="justify-content:space-between"><div style="font-size:28px;font-weight:800">Mesa ${esc(p.mesa)}</div><div class="pill ${cocinaMode ? 'pill-orange' : 'pill-green'}">${cocinaMode ? 'COCINA' : 'BARRA'}</div></div><div class="sub">Camarero: ${esc(p.camarero || '')}</div><div class="sub">Hora: ${new Date(p.timestamp||0).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</div><div class="separator"></div><div style="font-size:22px;line-height:1.5">${items.map(i=>`• ${esc(i.nombre)} - ${money(i.precio)}`).join("<br>")}</div><div class="separator"></div><div style="font-size:22px;font-weight:800">Subtotal ${money(total)}</div><button class="btn ${cocinaMode ? 'btn-orange' : 'btn-sky'}" style="width:100%;margin-top:10px" onclick="marcarHecho('${id}', ${cocinaMode})">✔ HECHO</button></div>`;
  }).join("") || `<div class="card"><div class="sub">Sin pedidos pendientes</div></div>`;
  document.getElementById("tickets").innerHTML = html;
}
function renderCocina(){ renderProduccion("cocina"); }
function renderBarra(){ renderProduccion("barra"); }
function cerrarMesa(mesaCerrar){
  if(!confirm("¿Cerrar mesa " + mesaCerrar + "?")) return;
  db.ref("pedidos").once("value", s=>{
    const data = s.val() || {};
    const seleccion = Object.entries(data).filter(([_,p])=>String(p.mesa)===String(mesaCerrar));
    if(!seleccion.length) return;
    const payload = { mesa:String(mesaCerrar), timestamp:Date.now(), pedidos: seleccion.map(([id,p])=>({id,...p})) };
    db.ref("historialCaja").push(payload).then(()=>{ seleccion.forEach(([id])=> db.ref("pedidos/"+id).remove()); });
  });
}
function renderCaja(){
  const resumen = {};
  Object.values(pedidos).forEach(p=>{
    const m = String(p.mesa||"0");
    if(!resumen[m]) resumen[m] = { total:0, items:0 };
    (p.items||[]).forEach(i=>{ resumen[m].total += Number(i.precio||0); resumen[m].items += 1; });
  });
  app.innerHTML = `<div class="title">CAJA</div>${Object.entries(resumen).length ? Object.entries(resumen).map(([m,info])=>`<div class="card"><div class="row" style="justify-content:space-between"><div><div style="font-size:26px;font-weight:800">Mesa ${m}</div><div class="sub">${info.items} líneas</div></div><div style="font-size:26px;font-weight:800">${money(info.total)}</div></div><button class="btn btn-green" style="width:100%;margin-top:10px" onclick="cerrarMesa('${m}')">Cerrar mesa</button></div>`).join("") : '<div class="card"><div class="sub">No hay mesas pendientes</div></div>'}`;
}
const ADMIN_PASS = "1234";
function loginAdmin(){ const pass = document.getElementById("adminPass").value; if(pass !== ADMIN_PASS){ alert("Contraseña incorrecta"); return; } renderAdmin(); }
function crearProducto(){
  const nombre = document.getElementById("nuevoNombre").value.trim();
  const precio = parseFloat(document.getElementById("nuevoPrecio").value);
  const categoria = document.getElementById("nuevoCategoria").value.trim() || "General";
  const cocina = document.getElementById("nuevoDestino").value === "cocina";
  if(!nombre || isNaN(precio)){ alert("Datos incorrectos"); return; }
  db.ref("carta").push({nombre, precio:Number(precio), categoria, cocina, activo:true});
  document.getElementById("nuevoNombre").value = ""; document.getElementById("nuevoPrecio").value = "";
}
function toggleActivoProducto(id, valor){ db.ref("carta/"+id+"/activo").set(!valor); }
function toggleDestinoProducto(id, valor){ db.ref("carta/"+id+"/cocina").set(!valor); }
function borrarProducto(id){ if(confirm("¿Borrar producto?")) db.ref("carta/"+id).remove(); }
function cambiarNombreProducto(id, val){ db.ref("carta/"+id+"/nombre").set(val); }
function cambiarPrecioProducto(id, val){ db.ref("carta/"+id+"/precio").set(Number(val||0)); }
function crearCamarero(){
  const nombre = document.getElementById("camNombre").value.trim();
  const pin = document.getElementById("camPin").value.trim();
  if(!nombre || !pin){ alert("Datos incorrectos"); return; }
  db.ref("camareros").push({nombre, pin, activo:true});
  document.getElementById("camNombre").value = ""; document.getElementById("camPin").value = "";
}
function toggleActivoCamarero(id, valor){ db.ref("camareros/"+id+"/activo").set(!valor); }
function borrarCamarero(id){ if(confirm("¿Borrar camarero?")) db.ref("camareros/"+id).remove(); }
function cambiarNombreCamarero(id, val){ db.ref("camareros/"+id+"/nombre").set(val); }
function cambiarPinCamarero(id, val){ db.ref("camareros/"+id+"/pin").set(val); }
function toggleMesa(n){ const actual = mesaAbiertaActual(n); db.ref("mesasEstado/"+n).set(!actual); }
function resetMesas(){ const updates = {}; for(let i=1;i<=100;i++) updates["mesasEstado/"+i] = true; db.ref().update(updates); }
function togglePedidosGlobal(){ db.ref("config/pedidosAbiertos").set(!pedidosAbiertos); }
function renderAdmin(){
  const productos = Object.entries(carta).map(([id,p])=>({id,...p})).sort(byName);
  const cams = Object.entries(camareros).map(([id,c])=>({id,...c})).sort(byName);
  app.innerHTML = `
    <div class="title">ADMIN</div>
    <div class="admin-tabs">
      <button class="btn ${adminTab==='carta'?'btn-blue':'btn-light'}" onclick="openAdminTab('carta')">Carta</button>
      <button class="btn ${adminTab==='camareros'?'btn-blue':'btn-light'}" onclick="openAdminTab('camareros')">Camareros</button>
      <button class="btn ${adminTab==='mesas'?'btn-blue':'btn-light'}" onclick="openAdminTab('mesas')">Mesas</button>
      <button class="btn ${adminTab==='config'?'btn-blue':'btn-light'}" onclick="openAdminTab('config')">Config</button>
      <button class="btn ${adminTab==='resumen'?'btn-blue':'btn-light'}" onclick="openAdminTab('resumen')">Resumen</button>
    </div>

    <div class="${adminTab==='carta'?'':'hidden'}">
      <div class="card"><div style="font-size:22px;font-weight:800">Nuevo producto</div>
        <div class="grid">
          <input id="nuevoNombre" class="input" placeholder="Nombre">
          <input id="nuevoPrecio" class="input" type="number" step="0.01" placeholder="Precio">
          <input id="nuevoCategoria" class="input" placeholder="Categoría">
          <select id="nuevoDestino" class="select"><option value="cocina">Cocina</option><option value="barra">Barra</option></select>
        </div>
        <button class="btn btn-green" onclick="crearProducto()">Crear producto</button>
      </div>
      ${productos.map(p=>`<div class="card"><div class="grid"><input class="input" value="${esc(p.nombre)}" onchange="cambiarNombreProducto('${p.id}', this.value)"><input class="input" type="number" step="0.01" value="${Number(p.precio||0)}" onchange="cambiarPrecioProducto('${p.id}', this.value)"><div class="row"><span class="pill ${p.activo!==false?'pill-green':'pill-red'}">${p.activo!==false?'ACTIVO':'INACTIVO'}</span><span class="pill ${p.cocina?'pill-orange':'pill-green'}">${p.cocina?'COCINA':'BARRA'}</span></div></div><div class="row"><button class="btn btn-gray" onclick="toggleActivoProducto('${p.id}', ${p.activo!==false})">${p.activo!==false?'Desactivar':'Activar'}</button><button class="btn btn-sky" onclick="toggleDestinoProducto('${p.id}', ${!!p.cocina})">Cambiar destino</button><button class="btn btn-red" onclick="borrarProducto('${p.id}')">Borrar</button></div></div>`).join("")}
    </div>

    <div class="${adminTab==='camareros'?'':'hidden'}">
      <div class="card"><div style="font-size:22px;font-weight:800">Nuevo camarero</div>
        <div class="grid"><input id="camNombre" class="input" placeholder="Nombre"><input id="camPin" class="input" placeholder="PIN"></div>
        <button class="btn btn-green" onclick="crearCamarero()">Crear camarero</button>
      </div>
      ${cams.map(c=>`<div class="card"><div class="grid"><input class="input" value="${esc(c.nombre)}" onchange="cambiarNombreCamarero('${c.id}', this.value)"><input class="input" value="${esc(c.pin)}" onchange="cambiarPinCamarero('${c.id}', this.value)"><div class="row"><span class="pill ${c.activo!==false?'pill-green':'pill-red'}">${c.activo!==false?'ACTIVO':'INACTIVO'}</span></div></div><div class="row"><button class="btn btn-gray" onclick="toggleActivoCamarero('${c.id}', ${c.activo!==false})">${c.activo!==false?'Desactivar':'Activar'}</button><button class="btn btn-red" onclick="borrarCamarero('${c.id}')">Borrar</button></div></div>`).join("")}
    </div>

    <div class="${adminTab==='mesas'?'':'hidden'}">
      <div class="card"><div class="row" style="justify-content:space-between"><div style="font-size:22px;font-weight:800">Control de mesas</div><button class="btn btn-red" onclick="resetMesas()">Abrir todas</button></div></div>
      <div class="grid">${Array.from({length:100}, (_,i)=>i+1).map(n=>`<div class="product"><div style="font-size:20px;font-weight:800">Mesa ${n}</div><div style="margin:8px 0"><span class="pill ${mesaAbiertaActual(n)?'pill-green':'pill-red'}">${mesaAbiertaActual(n)?'ABIERTA':'CERRADA'}</span></div><button class="btn ${mesaAbiertaActual(n)?'btn-red':'btn-green'}" onclick="toggleMesa(${n})">${mesaAbiertaActual(n)?'Cerrar':'Abrir'}</button></div>`).join("")}</div>
    </div>

    <div class="${adminTab==='config'?'':'hidden'}">
      <div class="card"><div style="font-size:22px;font-weight:800">Configuración</div><div class="separator"></div><div class="row" style="justify-content:space-between"><div><div style="font-weight:800">Pedidos del sistema</div><div class="sub">Activa o bloquea pedidos nuevos.</div></div><div class="row"><span class="pill ${pedidosAbiertos?'pill-green':'pill-red'}">${pedidosAbiertos?'ACTIVOS':'BLOQUEADOS'}</span><button class="btn ${pedidosAbiertos?'btn-red':'btn-green'}" onclick="togglePedidosGlobal()">${pedidosAbiertos?'Bloquear':'Activar'}</button></div></div></div>
    </div>

    <div class="${adminTab==='resumen'?'':'hidden'}">
      <div class="card"><div style="font-size:22px;font-weight:800">Resumen</div><div class="separator"></div><div class="grid"><div class="product"><div class="sub">Productos</div><div style="font-size:28px;font-weight:800">${productos.length}</div></div><div class="product"><div class="sub">Camareros</div><div style="font-size:28px;font-weight:800">${cams.length}</div></div><div class="product"><div class="sub">Pedidos vivos</div><div style="font-size:28px;font-weight:800">${Object.keys(pedidos).length}</div></div><div class="product"><div class="sub">Mesas cerradas</div><div style="font-size:28px;font-weight:800">${Array.from({length:100},(_,i)=>i+1).filter(n=>!mesaAbiertaActual(n)).length}</div></div></div></div>
    </div>`;
}
if(modo === "cliente") renderCliente();
if(modo === "camarero") renderCamareroLogin();
if(modo === "cocina") renderCocina();
if(modo === "barra") renderBarra();
