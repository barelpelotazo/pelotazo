<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes flashPedido {
  0% { background-color: #fef9c3; }
  100% { background-color: white; }
}
.flash {
  animation: flashPedido 1.2s ease-out;
}
</style>
</head>

<body class="bg-gray-100">

<div class="bg-blue-950 text-white text-center p-3">
  <div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="text-center p-3">
  <div class="text-base font-semibold text-gray-600 mb-1">Mesa</div>
  <div id="mesa" class="inline-block px-5 py-2 rounded-full bg-white border-2 border-blue-900 text-blue-950 text-2xl font-black shadow">
    --
  </div>
</div>

<div class="text-center -mt-1 mb-2">
  <button onclick="limpiarMesaGuardada()" class="text-xs text-gray-500 underline">
    Cambiar mesa
  </button>
</div>

<div class="text-center text-red-600 font-bold text-xl">
  Total: <span id="total">0.00€</span>
</div>

<div id="carta" style="padding-bottom:170px;"></div>

<div class="fixed bottom-0 w-full bg-white p-3 border-t shadow-lg">
  <button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-3 rounded text-lg font-bold">
    Enviar pedido
  </button>

  <div onclick="abrirAdmin()" class="text-center text-xs mt-2 text-gray-400 cursor-pointer">
    ···
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-white p-5 rounded-xl w-80">
    <input id="email" placeholder="Email" class="w-full border p-2 mb-2">
    <input id="pass" type="password" placeholder="Contraseña" class="w-full border p-2 mb-2">
    <button onclick="login()" class="bg-blue-600 text-white w-full p-2 rounded">Entrar</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-white z-50 overflow-auto">
  <button onclick="logout()" class="bg-red-600 text-white p-2">Salir</button>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAx...",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentUid = null;

// LOGIN ANÓNIMO
auth.signInAnonymously();

auth.onAuthStateChanged(user=>{
  currentUid = user ? user.uid : null;
});

// QR MESA
const params = new URLSearchParams(window.location.search);
const mesaQR = params.get("mesa");

if(mesaQR){
  localStorage.setItem("mesa", mesaQR);
}

let mesa = localStorage.getItem("mesa") || "";

const mesaEl = document.getElementById("mesa");

function actualizarMesa(){
  mesaEl.textContent = mesa || "--";
}
actualizarMesa();

function limpiarMesaGuardada(){
  localStorage.removeItem("mesa");
  mesa="";
  actualizarMesa();
}

// CARRITO
let carrito=[];

function add(nombre,precio){
  carrito.push({nombre,precio});
  actualizarTotal();
}

function actualizarTotal(){
  let t = carrito.reduce((a,b)=>a+b.precio,0);
  document.getElementById("total").innerText = t.toFixed(2)+"€";
}

// ENVIAR
function enviarPedido(){
  if(!mesa){
    alert("Debes escanear el QR");
    return;
  }

  db.ref("comandas").push({
    mesa,
    items:carrito,
    total:carrito.reduce((a,b)=>a+b.precio,0)
  });

  carrito=[];
  actualizarTotal();
}

// LOGIN ADMIN
function abrirAdmin(){
  document.getElementById("login").classList.remove("hidden");
}

function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email,pass)
  .then(()=>{
    document.getElementById("login").classList.add("hidden");
    document.getElementById("admin").classList.remove("hidden");
  })
  .catch(()=>{
    alert("Error login");
  });
}

function logout(){
  auth.signOut();
  location.reload();
}

</script>

</body>
</html>
