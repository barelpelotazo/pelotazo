<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="p-4 text-center bg-blue-900 text-white font-black">BAR EL PELOTAZO</div>

<div class="p-3 text-center">
Mesa: <span id="mesa">--</span>
</div>

<div id="carta" class="p-2"></div>

<div class="fixed bottom-0 w-full bg-white p-4 border-t">
<div id="total" class="text-3xl font-black text-center">0.00€</div>
<button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-3 rounded mt-2">ENVIAR PEDIDO</button>
</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
 databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrito = [];
let mesa = new URLSearchParams(window.location.search).get("mesa");
document.getElementById("mesa").innerText = mesa || "--";

// Cargar carta
db.ref("carta").on("value", snap => {
 const data = snap.val() || [];
 renderCarta(data);
});

function renderCarta(data) {
 const div = document.getElementById("carta");
 div.innerHTML = "";
 data.filter(p=>p.activo!==false).forEach(p => {
 div.innerHTML += `
 <div class="bg-white p-3 m-2 rounded flex justify-between">
   <div>
     <b>${p.nombre}</b><br>
     ${p.precio.toFixed(2)}€
   </div>
   <button onclick="add('${p.nombre}', ${p.precio})" class="bg-blue-900 text-white px-3 rounded">+</button>
 </div>`;
 });
}

function add(nombre, precio) {
 carrito.push({nombre, precio});
 updateTotal();
}

function updateTotal() {
 const total = carrito.reduce((a,b)=>a+b.precio,0);
 document.getElementById("total").innerText = total.toFixed(2)+"€";
}

function enviarPedido() {
 if(!mesa) return alert("Escanea QR de mesa");
 if(carrito.length==0) return alert("Sin productos");

 db.ref("pedidos").push({
   mesa,
   items: carrito,
   total: carrito.reduce((a,b)=>a+b.precio,0),
   estado: "pendiente",
   hora: new Date().toLocaleTimeString()
 });

 carrito=[];
 updateTotal();
 alert("Pedido enviado");
}
</script>

</body>
</html>
