<!-- VERSION 12 - CLIENTE ORIGINAL + ADMIN MEJORADO -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com?v=1200"></script>
</head>

<body class="bg-gray-100">

<div class="bg-blue-900 text-white text-center p-3">
<img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
<div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="bg-red-600 text-white text-center p-2 font-bold">
Escanea el QR de tu mesa para hacer tu pedido
</div>

<div class="text-center p-2">
Mesa: <span id="mesa">--</span>
</div>

<div class="text-center text-red-600 font-bold">
Total gastado: <span id="totalMesa">0.00€</span>
</div>

<div id="carta" style="padding-bottom:140px;"></div>

<div class="text-center text-[11px] text-gray-500 pb-24">
programación y diseño 
<a href="https://rodante.es" target="_blank" class="text-blue-400">rodante</a>
</div>

<div class="fixed bottom-0 w-full bg-white p-3 border-t shadow-lg">
<div id="total" class="text-2xl text-red-600 text-center font-bold">0€</div>

<button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-2 mt-2 rounded">
Enviar pedido
</button>

<div onclick="abrirAdmin()" class="text-center text-xs mt-2 text-gray-400 cursor-pointer">
···
</div>
</div>

<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-white z-50 overflow-auto">

<div class="flex bg-black text-white">
<button onclick="tab('pedidos')" class="flex-1 p-2">Pedidos</button>
<button onclick="tab('cartaTab')" class="flex-1 p-2">Carta</button>
<button onclick="tab('caja')" class="flex-1 p-2">Caja</button>
<button onclick="cerrarAdmin()" class="p-2">X</button>
</div>

<div id="pedidos" class="p-2"></div>
<div id="cartaTab" class="p-2 hidden"></div>
<div id="caja" class="p-2 hidden"></div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
 databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrito=[];
let mesa=new URLSearchParams(location.search).get("mesa");
document.getElementById("mesa").innerText=mesa||"--";

const totalEl=document.getElementById("total");
const totalMesaEl=document.getElementById("totalMesa");

const categorias=[
"Tapas/Ración/Menú",
"Café/repostería/Postres",
"Bebidas/Refrescos",
"Tapas del día",
"Otros"
];

// TOTAL MESA
db.ref("comandas").on("value",snap=>{
 let total=0;
 let data=snap.val()||{};
 Object.values(data).forEach(p=>{
  if(p.mesa==mesa) total+=Number(p.total);
 });
 totalMesaEl.innerText=total.toFixed(2)+"€";
});

// ADMIN
function abrirAdmin(){
 if(prompt("Clave")==="1234"){
  document.getElementById("admin").classList.remove("hidden");
  cargarCartaAdmin();
 }
}
function cerrarAdmin(){
 document.getElementById("admin").classList.add("hidden");
}

function tab(t){
 pedidos.classList.add("hidden");
 cartaTab.classList.add("hidden");
 caja.classList.add("hidden");
 document.getElementById(t).classList.remove("hidden");
}

// CLIENTE (SIN CAMBIOS)
db.ref("carta").on("value",snap=>{
 let data=snap.val()||{};
 let html="";

 categorias.forEach(cat=>{
  let items=Object.values(data).filter(p=>p.categoria===cat && p.activo);
  if(!items.length) return;

  html+=`<div class="m-2 bg-white shadow">
  <div onclick="this.nextElementSibling.classList.toggle('hidden')" 
  class="p-2 bg-gray-200 font-bold flex justify-between cursor-pointer">
  ${cat}<span>▼</span></div><div class="hidden">`;

  items.forEach(p=>{
   html+=`<div class="flex justify-between p-2 border-b">
   <b>${p.nombre}</b>
   <div>${p.precio}€
   <button onclick="add('${p.nombre}',${p.precio})" class="bg-blue-600 text-white px-2 ml-2">+</button>
   </div></div>`;
  });

  html+=`</div></div>`;
 });

 carta.innerHTML=html;
});

// CARRITO
function add(n,p){
 carrito.push({nombre:n,precio:p});
 totalEl.innerText=carrito.reduce((a,b)=>a+Number(b.precio),0)+"€";
}

// ENVIAR
function enviarPedido(){
 if(!mesa){
  alert("Escanea el QR de tu mesa antes de hacer el pedido");
  return;
 }
 if(!carrito.length){
  alert("Añade productos al pedido");
  return;
 }

 db.ref("comandas").push({
  mesa,
  items:carrito,
  total:carrito.reduce((a,b)=>a+Number(b.precio),0),
  camarero:""
 });

 carrito=[];
 totalEl.innerText="0€";
}

// 🔥 ADMIN CARTA MEJORADA (VISUAL)
function cargarCartaAdmin(){
 db.ref("carta").on("value",snap=>{
  let data=snap.val()||{};
  let html="";

  categorias.forEach(cat=>{
   html+=`
   <div class="bg-white m-2 p-3 rounded shadow border-l-4 border-blue-600">
   <div class="flex justify-between items-center">
     <b class="text-lg">${cat}</b>
     <button onclick="nuevo('${cat}')" class="bg-green-600 text-white px-2 rounded">+</button>
   </div>`;

   Object.entries(data).forEach(([id,p])=>{
    if(p.categoria===cat){
     html+=`
     <div class="flex justify-between items-center border-b py-2">

     <div>
     <input value="${p.nombre}" onchange="editarNombre('${id}',this.value)" class="border px-1 w-32">
     <input value="${p.precio}" type="number" onchange="editarPrecio('${id}',this.value)" class="border px-1 w-16 ml-2"> €
     </div>

     <div class="flex gap-1">
     <button onclick="toggle('${id}',${p.activo})"
     class="${p.activo?'bg-blue-600':'bg-gray-400'} text-white px-2 rounded">
     ${p.activo?'ON':'OFF'}
     </button>

     <button onclick="borrar('${id}')" class="bg-red-600 text-white px-2 rounded">X</button>
     </div>

     </div>`;
    }
   });

   html+=`</div>`;
  });

  cartaTab.innerHTML=html;
 });
}

// CRUD
function editarNombre(id,n){db.ref("carta/"+id+"/nombre").set(n);}
function editarPrecio(id,p){db.ref("carta/"+id+"/precio").set(Number(p));}
function nuevo(cat){
 let n=prompt("Nombre");
 let p=parseFloat(prompt("Precio"));
 db.ref("carta").push({nombre:n,precio:p,categoria:cat,activo:true});
}
function toggle(id,a){db.ref("carta/"+id+"/activo").set(!a);}
function borrar(id){db.ref("carta/"+id).remove();}
</script>

</body>
</html>
