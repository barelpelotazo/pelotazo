<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
padding-bottom:140px;
}

header{
background:#000a14;
color:white;
padding:15px;
text-align:center;
border-bottom:4px solid red;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.cat{
background:white;
margin-bottom:10px;
border-radius:8px;
overflow:hidden;
}

.cat-title{
padding:14px;
font-weight:bold;
cursor:pointer;
background:#fff;
border-left:5px solid red;
}

.cat-content{
display:none;
padding:10px;
}

.cat.open .cat-content{
display:block;
}

.item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.price{
color:red;
font-weight:bold;
}

.btn{
background:#001f3f;
color:white;
border:none;
width:32px;
height:32px;
border-radius:6px;
cursor:pointer;
}

.footer-order{

position:fixed;
bottom:60px;
left:0;
width:100%;
background:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -3px 10px rgba(0,0,0,.1);

}

#total{
font-size:22px;
font-weight:bold;
color:red;
}

footer{
position:fixed;
bottom:0;
width:100%;
background:#fff;
text-align:center;
padding:10px;
font-size:12px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

footer a{
color:#1a73e8;
text-decoration:none;
}

.staff{
display:none;
padding:20px;
}

.tab{
display:inline-block;
margin-right:5px;
padding:8px 12px;
background:#ddd;
cursor:pointer;
border-radius:5px;
}

.tab.active{
background:#001f3f;
color:white;
}

.panel{
display:none;
margin-top:15px;
}

.panel.active{
display:block;
}

</style>

</head>

<body>

<header>
<h2>Bar El Pelotazo</h2>
</header>

<div id="cliente">

<div class="container">

<div id="mesa-info"></div>

<div id="menu"></div>

</div>

<div class="footer-order">

<div>
TOTAL
<div id="total">0€</div>
</div>

<button id="btn-enviar" onclick="enviarPedido()">Enviar</button>

</div>

</div>

<footer>

<a href="#" onclick="abrirStaff()">Acceso administración</a>

<br>

Creación y diseño <a href="https://rodante.es">Rodante</a>

</footer>

<div id="staff" class="staff">

<div>

<span class="tab active" onclick="tab('pedidos')">Pedidos</span> <span class="tab" onclick="tab('cocina')">Cocina</span> <span class="tab" onclick="tab('resumen')">Resumen</span> <span class="tab" onclick="tab('carta')">Carta</span> <span class="tab" onclick="tab('camareros')">Camareros</span>

</div>

<div id="pedidos" class="panel active"></div>
<div id="cocina" class="panel"></div>
<div id="resumen" class="panel"></div>
<div id="carta" class="panel"></div>

<div id="camareros" class="panel">

<h3>Camareros</h3>

<input id="nuevoCam" placeholder="Nombre camarero">

<button onclick="addCam()">Añadir</button>

<ul id="listaCam"></ul>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
databaseURL:"https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"bar-el-pelotazo-16c19"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

/* DETECTAR MESA */

const params=new URLSearchParams(location.search)
const mesa=params.get("mesa")

if(mesa){

document.getElementById("mesa-info").innerHTML="<b>Mesa "+mesa+"</b>"

}else{

document.getElementById("mesa-info").innerHTML="Carta del bar"

document.getElementById("btn-enviar").disabled=true

}

/* PRODUCTOS */

let productos=[

{n:"Cerveza",p:2.5,c:"Bebidas"},
{n:"Refresco",p:2,c:"Bebidas"},
{n:"Hamburguesa",p:7,c:"Tapas"},
{n:"Patatas bravas",p:5,c:"Tapas"}

]

let cart=[]

function render(){

let cats=[...new Set(productos.map(x=>x.c))]

let html=""

cats.forEach(cat=>{

html+="<div class='cat'>"

html+="<div class='cat-title' onclick='this.parentNode.classList.toggle(\"open\")'>"+cat+"</div>"

html+="<div class='cat-content'>"

productos.filter(p=>p.c==cat).forEach(p=>{

html+="<div class='item'>"

html+="<span>"+p.n+"</span>"

html+="<div>"

html+="<span class='price'>"+p.p+"€</span> "

html+="<button class='btn' onclick=\"add('"+p.n+"',"+p.p+")\">+</button>"

html+="</div></div>"

})

html+="</div></div>"

})

document.getElementById("menu").innerHTML=html

}

render()

function add(n,p){

cart.push({n,p})

total()

}

function total(){

let t=0
cart.forEach(i=>t+=i.p)

document.getElementById("total").innerHTML=t.toFixed(2)+"€"

}

/* ENVIAR */

function enviarPedido(){

if(!mesa){

alert("Escanee el QR de su mesa para pedir")

return

}

let pedido={

mesa:mesa,
items:cart,
hora:new Date().toLocaleTimeString()

}

db.ref("pedidos").push(pedido)

alert("Pedido enviado")

cart=[]
total()

}

/* STAFF */

function abrirStaff(){

let pass=prompt("Clave")

if(pass=="887233"){

document.getElementById("cliente").style.display="none"
document.getElementById("staff").style.display="block"

}

}

function tab(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")
event.target.classList.add("active")

}

/* CAMAREROS */

function addCam(){

let n=document.getElementById("nuevoCam").value

db.ref("camareros").push({nombre:n})

document.getElementById("nuevoCam").value=""

}

db.ref("camareros").on("value",s=>{

let html=""

s.forEach(c=>{

html+="<li>"+c.val().nombre+"</li>"

})

document.getElementById("listaCam").innerHTML=html

})

</script>

</body>
</html>
