<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- CABECERA -->
<div class="bg-blue-900 text-white text-center p-3">
  <img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
  <div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="bg-red-600 text-white text-center p-2 font-bold">
⚠️ Escanea el QR de tu mesa para hacer tu pedido
</div>

<div class="text-center p-2">
Mesa: <span id="mesa">--</span>
</div>

<!-- CARTA -->
<div id="carta"></div>

<!-- TOTAL -->
<div class="fixed bottom-0 w-full bg-white p-3 border-t shadow-lg">
  <div id="total" class="text-3xl font-black text-center text-red-600">0.00€</div>

  <button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-2 mt-2 rounded">
    Enviar pedido
  </button>

  <div onclick="abrirAdmin()" class="text-center text-[10px] text-gray-400 mt-2 cursor-pointer">
    · · ·
  </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
 databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// VARIABLES
let carrito = [];
const totalEl = document.getElementById("total");

let mesa = new URLSearchParams(location.search).get("mesa");
document.getElementById("mesa").innerText = mesa || "--";

const categorias = [
"Tapas/Ración/Menú",
"Café/repostería/Postres",
"Bebidas/Refrescos",
"Tapas del día",
"Otros"
];

// CARGAR CARTA
db.ref("carta").on("value", snap => {
 let data = snap.val() || {};
 let html = "";

 categorias.forEach(cat => {
  let items = Object.values(data).filter(p => p.categoria === cat && p.activo !== false);

  if (items.length === 0) return;

  html += `
  <div class="m-2 bg-white rounded shadow">
    <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-2 font-bold bg-gray-200 flex justify-between cursor-pointer">
      ${cat} <span>▼</span>
    </div>
    <div class="hidden">`;

  items.forEach(p => {
    html += `
    <div class="flex justify-between items-center p-3 border-b">
      <div class="font-bold">${p.nombre}</div>
      <div class="flex items-center gap-3">
        <span class="font-bold">${Number(p.precio).toFixed(2)}€</span>
        <button onclick="add('${p.nombre}', ${p.precio})"
          class="bg-blue-600 text-white w-10 h-10 text-xl rounded">
          +
        </button>
      </div>
    </div>`;
  });

  html += `</div></div>`;
 });

 document.getElementById("carta").innerHTML = html;
});

// AÑADIR
function add(nombre, precio){
 carrito.push({nombre, precio});
 actualizarTotal();
}

// TOTAL
function actualizarTotal(){
 let total = carrito.reduce((sum, item) => sum + Number(item.precio), 0);
 totalEl.innerText = total.toFixed(2) + "€";
}

// ENVIAR
function enviarPedido(){
 if(!mesa) return alert("Escanea QR");
 if(carrito.length === 0) return;

 db.ref("comandas").push({
  mesa,
  items: carrito,
  total: carrito.reduce((a,b)=>a + Number(b.precio), 0),
  estado: "pendiente",
  camarero: "",
  hora: new Date().toLocaleTimeString()
 });

 carrito = [];
 actualizarTotal();
 alert("Pedido enviado");
}

// ADMIN (simple por ahora)
function abrirAdmin(){
 let pass = prompt("Clave");
 if(pass === "1234"){
  alert("Admin OK (pedidos llegan correctamente)");
 }
}
</script>

<footer class="text-center text-xs p-8 text-blue-600">
creación y diseño <a href="https://rodante.es" target="_blank">rodante</a>
</footer>

</body>
</html>
