<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- CABECERA -->
<div class="bg-blue-900 text-white text-center p-3">
  <img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
  <div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="bg-red-600 text-white text-center p-2 font-bold">
⚠️ Escanea el QR de tu mesa para hacer tu pedido
</div>

<div class="text-center p-2">
Mesa: <span id="mesa">--</span>
</div>

<!-- CARTA -->
<div id="carta"></div>

<!-- TOTAL -->
<div class="fixed bottom-0 w-full bg-white p-3 border-t">
<div id="total" class="text-2xl font-black text-center">0.00€</div>
<button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-2 mt-2 rounded">
Enviar pedido
</button>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-white z-50 overflow-auto">

<div class="flex bg-black text-white text-sm">
<button onclick="tab('pedidos')" class="flex-1 p-2">Pedidos</button>
<button onclick="tab('cartaTab')" class="flex-1 p-2">Carta</button>
<button onclick="tab('caja')" class="flex-1 p-2">Caja</button>
<button onclick="cerrarAdmin()" class="p-2">X</button>
</div>

<div id="pedidos" class="p-2"></div>
<div id="cartaTab" class="p-2 hidden"></div>
<div id="caja" class="p-2 hidden"></div>

</div>

<script>
// 🔥 FIREBASE (TU CONFIG REAL)
const firebaseConfig = {
 apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
 databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// VARIABLES
let carrito=[];
let mesa=new URLSearchParams(location.search).get("mesa");
document.getElementById("mesa").innerText=mesa||"--";

const categorias=[
"Tapas/Ración/Menú",
"Café/repostería/Postres",
"Bebidas/Refrescos",
"Tapas del día",
"Otros"
];

// ADMIN
function abrirAdmin(){
 let pass=prompt("Clave");
 if(pass=="1234"){
  document.getElementById("admin").classList.remove("hidden");
  cargarCartaAdmin();
 }
}

function cerrarAdmin(){
 document.getElementById("admin").classList.add("hidden");
}

function tab(t){
 ["pedidos","cartaTab","caja"].forEach(id=>document.getElementById(id).classList.add("hidden"));
 document.getElementById(t).classList.remove("hidden");
}

// TOGGLE
function toggle(el){
 let cont = el.nextElementSibling;
 let flecha = el.querySelector(".flecha");
 cont.classList.toggle("hidden");
 flecha.style.transform = cont.classList.contains("hidden") ? "rotate(0deg)" : "rotate(180deg)";
}

// CARTA CLIENTE
db.ref("carta").on("value",snap=>{
 let data=snap.val()||{};
 let html="";

 categorias.forEach(cat=>{
  let items=Object.entries(data).filter(([id,p])=>p.categoria===cat && p.activo!==false);

  html+=`<div class="m-2 bg-white rounded shadow">
  <div onclick="toggle(this)" class="p-2 font-bold bg-gray-200 flex justify-between cursor-pointer">
  ${cat} <span class="flecha">▼</span></div>
  <div class="hidden">`;

  if(items.length==0){
   html+=`<div class="p-2 text-gray-400">Sin productos</div>`;
  }

  items.forEach(([id,p])=>{
   html+=`<div class="flex justify-between p-2 border-b">
   ${p.nombre} - ${p.precio}€
   <button onclick="add('${p.nombre}',${p.precio})">+</button>
   </div>`;
  });

  html+=`</div></div>`;
 });

 document.getElementById("carta").innerHTML=html;
});

// CARRITO
function add(n,p){
 carrito.push({nombre:n,precio:p});
 total.innerText=carrito.reduce((a,b)=>a+b.precio,0).toFixed(2)+"€";
}

// ENVIAR
function enviarPedido(){
 if(!mesa) return alert("Escanea QR");
 if(!carrito.length) return;

 db.ref("comandas").push({
  mesa,
  items:carrito,
  total:carrito.reduce((a,b)=>a+b.precio,0),
  estado:"pendiente",
  camarero:"",
  hora:new Date().toLocaleTimeString()
 });

 carrito=[];
 total.innerText="0.00€";
 alert("Pedido enviado");
}

// ADMIN CARTA
function cargarCartaAdmin(){
 db.ref("carta").on("value",snap=>{
  let data=snap.val()||{};
  let html="";

  categorias.forEach(cat=>{
   let items=Object.entries(data).filter(([id,p])=>p.categoria===cat);

   html+=`<div class="m-2 bg-white rounded shadow">
   <div onclick="toggle(this)" class="p-2 font-bold bg-gray-300 flex justify-between cursor-pointer">
   ${cat} <span class="flecha">▼</span></div>
   <div class="hidden p-2">

   <button onclick="nuevoProducto('${cat}')" class="bg-green-600 text-white p-1 rounded mb-2">+ Nuevo</button>`;

   items.forEach(([id,p])=>{
    html+=`<div class="flex justify-between items-center border-b p-1">
    ${p.nombre} - ${p.precio}€
    <div>
    <button onclick="editar('${id}')">✏️</button>
    <button onclick="borrar('${id}')">🗑️</button>
    <button onclick="togglePub('${id}',${p.activo!==false})">${p.activo!==false?'👁️':'🚫'}</button>
    </div>
    </div>`;
   });

   html+=`</div></div>`;
  });

  cartaTab.innerHTML=html;
 });
}

// CRUD
function nuevoProducto(cat){
 let nombre=prompt("Nombre");
 let precio=parseFloat(prompt("Precio"));
 if(!nombre||!precio) return;
 db.ref("carta").push({nombre,precio,categoria:cat,activo:true});
}

function editar(id){
 let nombre=prompt("Nombre");
 let precio=parseFloat(prompt("Precio"));
 if(!nombre||!precio) return;
 db.ref("carta/"+id).update({nombre,precio});
}

function borrar(id){
 if(confirm("Borrar producto?")){
  db.ref("carta/"+id).remove();
 }
}

function togglePub(id,estado){
 db.ref("carta/"+id).update({activo:!estado});
}
</script>

<!-- FOOTER -->
<footer class="text-center text-xs p-8 text-blue-600">
<div>creación y diseño <a href="https://rodante.es" target="_blank">rodante</a></div>
<div class="text-gray-400 mt-2 cursor-pointer" onclick="abrirAdmin()">admin</div>
</footer>

</body>
</html>
