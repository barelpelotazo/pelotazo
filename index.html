<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

:root{
--azul-oscuro:#000a14;
--azul-staff:#001f3f;
--rojo:#ff0000;
--verde:#27ae60;
--gris:#f4f7f6;
--naranja:#f39c12;
}

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:var(--gris);
padding-bottom:140px;
}

header{
background:var(--azul-oscuro);
padding:15px;
text-align:center;
border-bottom:4px solid var(--rojo);
}

h1{
color:white;
margin:0;
font-size:1rem;
}

.container{
padding:15px;
max-width:600px;
margin:auto;
}

.input-style{
width:100%;
padding:12px;
border-radius:10px;
border:2px solid var(--azul-staff);
font-size:1rem;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

/* MENU */

.cat-block{
margin-bottom:8px;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 4px rgba(0,0,0,.1);
}

.cat-header{
background:white;
padding:15px;
font-weight:bold;
cursor:pointer;
display:flex;
justify-content:space-between;
border-left:5px solid var(--rojo);
}

.cat-content{
display:none;
background:white;
padding:0 15px;
}

.cat-block.open .cat-content{
display:block;
}

.item-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #eee;
}

.price{
font-weight:900;
color:var(--rojo);
margin-right:10px;
}

.btn-plus{
background:var(--azul-staff);
color:white;
border:none;
width:35px;
height:35px;
border-radius:8px;
font-size:1.2rem;
cursor:pointer;
}

.footer-client{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -5px 15px rgba(0,0,0,.1);
}

#total-val{
font-size:2rem;
font-weight:900;
color:var(--rojo);
}

#staff-panel{
display:none;
padding:20px;
}

.staff-nav{
display:flex;
gap:5px;
margin-bottom:15px;
}

.tab-btn{
flex:1;
padding:10px;
border:none;
background:#ddd;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.tab-btn.active{
background:var(--azul-staff);
color:white;
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.pedido-card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border-left:8px solid var(--naranja);
}

footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:30px;
}

footer a{
color:#1a73e8;
text-decoration:none;
}

</style>

</head>

<body>

<header>
<h1>Bar El Pelotazo</h1>
</header>

<div id="view-client">

<div class="container">

<input id="mesa-input" class="input-style" readonly>

<select id="camarero-input" class="input-style">
<option value="">CAMARERO</option>
<option value="1">Camarero 1</option>
<option value="2">Camarero 2</option>
<option value="3">Camarero 3</option>
<option value="4">Camarero 4</option>
<option value="5">Camarero 5</option>
</select>

<div id="menu-accordion"></div>

</div>

<div class="footer-client">

<div>
<small>TOTAL</small>
<div id="total-val">0€</div>
</div>

<button onclick="enviarPedidoFirebase()" style="background:var(--verde);color:white;border:none;padding:15px;border-radius:12px;">
ENVIAR
</button>

</div>

<footer>

<a href="#" onclick="accesoStaff()">Acceso administración</a>

<br><br>

Creación y diseño <a href="https://rodante.es">Rodante</a>

</footer>

</div>

<div id="staff-panel">

<div class="staff-nav">

<button class="tab-btn active" onclick="switchTab('pedidos')">PEDIDOS</button> <button class="tab-btn" onclick="switchTab('cocina')">COCINA</button> <button class="tab-btn" onclick="switchTab('resumen')">RESUMEN</button> <button class="tab-btn" onclick="switchTab('carta')">CARTA</button>

</div>

<div id="tab-pedidos" class="tab-content active">
<div id="lista-pedidos"></div>
</div>

<div id="tab-cocina" class="tab-content">
<div id="lista-cocina"></div>
</div>

<div id="tab-resumen" class="tab-content">
<div id="lista-resumen"></div>
</div>

<div id="tab-carta" class="tab-content">
<div id="editor-carta"></div>
</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",

databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",

projectId: "bar-el-pelotazo-16c19"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.database()

/* VALIDAR QR */

const params = new URLSearchParams(window.location.search)

const mesa = params.get("mesa")
const token = params.get("token")

if(!mesa || token !== "pelotazo2026"){

document.body.innerHTML = "<h2 style='text-align:center;margin-top:100px;'>Escanee el QR de la mesa para pedir</h2>"

}

document.getElementById("mesa-input").value = "MESA " + mesa

/* PRODUCTOS */

let productos = [

{nombre:"Cerveza",precio:2.5,cat:"BEBIDAS",destino:"barra"},
{nombre:"Refresco",precio:2,cat:"BEBIDAS",destino:"barra"},
{nombre:"Hamburguesa",precio:7,cat:"TAPAS",destino:"cocina"},
{nombre:"Patatas Bravas",precio:5,cat:"TAPAS",destino:"cocina"}

]

let carrito = []

function renderMenu(){

const cats=[...new Set(productos.map(p=>p.cat))]

const menu=document.getElementById("menu-accordion")

menu.innerHTML=""

cats.forEach(cat=>{

const items=productos.filter(p=>p.cat==cat)

let html=items.map(p=>`

<div class="item-row">

<span>${p.nombre}</span>

<div>

<span class="price">${p.precio.toFixed(2)}€</span>

<button class="btn-plus" onclick="addToCart('${p.nombre}',${p.precio},'${p.destino}')">+</button>

</div>

</div>`).join("")

menu.innerHTML+=`

<div class="cat-block">

<div class="cat-header" onclick="this.parentNode.classList.toggle('open')">

${cat}<span>▼</span>

</div>

<div class="cat-content">${html}</div>

</div>`

})

}

renderMenu()

function addToCart(nombre,precio,destino){

carrito.push({nombre,precio,destino})

actualizarTotal()

}

function actualizarTotal(){

let total=0

carrito.forEach(i=>total+=i.precio)

document.getElementById("total-val").innerText=total.toFixed(2)+"€"

}

/* ENVIAR PEDIDO */

function enviarPedidoFirebase(){

const camarero=document.getElementById("camarero-input").value

if(!camarero) return alert("Seleccione camarero")

if(carrito.length==0) return alert("Añada productos")

const pedido={

mesa,

camarero,

items:carrito,

hora:new Date().toLocaleTimeString(),

timestamp:Date.now()

}

db.ref("pedidos").push(pedido)

alert("Pedido enviado")

carrito=[]

actualizarTotal()

}

/* ACCESO STAFF */

function accesoStaff(){

if(prompt("Clave staff")=="887233"){

document.getElementById("view-client").style.display="none"

document.getElementById("staff-panel").style.display="block"

}

}

function switchTab(tab){

document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"))

document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active"))

document.getElementById("tab-"+tab).classList.add("active")

event.target.classList.add("active")

}

</script>

</body>

</html>
