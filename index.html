<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  text-align: center;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.sub {
  color: #9ca3af;
  margin-bottom: 30px;
}

button {
  padding: 16px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  margin: 10px;
  cursor: pointer;
  width: 240px;
}

.cliente {
  background: #1d4ed8;
  color: white;
}

.admin {
  background: #dc2626;
  color: white;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">
  <h1>🍻 BAR EL PELOTAZO</h1>
  <div class="sub">Sistema de pedidos digital</div>

  <button class="cliente" onclick="window.location.href='app.html'">
    Entrar como cliente
  </button>

  <br>

  <button class="admin" onclick="window.location.href='app.html?modo=admin'">
    Administración
  </button>
</div>

</body>
</html>
