<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bar App V2</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.tab{display:none;padding:10px}
.active{display:block}
button{padding:10px;margin:5px;border:none;border-radius:8px;font-weight:bold}
.admin-btn{background:#1e3a8a;color:white}
input{padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc}
.producto{background:white;padding:10px;margin:5px;border-radius:10px}
</style>
</head>

<body>

<h2 style="text-align:center">BAR APP V2</h2>

<!-- CLIENTE -->
<div id="cliente">
  <h3 style="text-align:center">Carta</h3>
  <div id="cartaCliente"></div>

  <div style="text-align:center;margin-top:20px;">
    <button onclick="abrirLogin()">Acceso camarero</button>
  </div>
</div>

<!-- LOGIN CAMARERO -->
<div id="loginModal" style="display:none;text-align:center;">
  <h3>PIN Camarero</h3>
  <input id="pinLogin" placeholder="PIN">
  <button onclick="loginCamarero()">Entrar</button>
</div>

<!-- PANEL CAMARERO -->
<div id="camareroPanel" style="display:none;">
  <h3 style="text-align:center">Pedido</h3>
  <div id="cartaCamarero"></div>

  <h3>Carrito</h3>
  <div id="carrito"></div>

  <button onclick="enviarPedido()">Enviar pedido</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
  authDomain: "bar-el-pelotazo-16c19.firebaseapp.com",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19",
  storageBucket: "bar-el-pelotazo-16c19.firebasestorage.app",
  messagingSenderId: "209747310104",
  appId: "1:209747310104:web:aea60ec14671e302f9f56d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let camareros = {};
let carrito = [];
let camareroActual = null;

// CARGAR CARTA CLIENTE
db.ref("carta").on("value", snap=>{
  const data=snap.val()||{};
  let html="";
  Object.values(data).forEach(p=>{
    html+=`<div class="producto">${p.nombre} - ${p.precio}€</div>`;
  });
  document.getElementById("cartaCliente").innerHTML=html;
});

// CARGAR CAMAREROS
db.ref("camareros").on("value", snap=>{
  camareros=snap.val()||{};
});

// LOGIN CAMARERO
function abrirLogin(){
  document.getElementById("loginModal").style.display="block";
}

function loginCamarero(){
  const pin=document.getElementById("pinLogin").value;

  const encontrado = Object.values(camareros).find(c=>c.pin===pin);

  if(!encontrado){
    alert("PIN incorrecto");
    return;
  }

  camareroActual=encontrado;

  document.getElementById("loginModal").style.display="none";
  document.getElementById("cliente").style.display="none";
  document.getElementById("camareroPanel").style.display="block";

  cargarCartaCamarero();
}

// CARTA CAMARERO
function cargarCartaCamarero(){
  db.ref("carta").once("value", snap=>{
    const data=snap.val()||{};
    let html="";

    Object.values(data).forEach(p=>{
      html+=`
        <div class="producto">
          ${p.nombre} - ${p.precio}€
          <button onclick="add('${p.nombre}',${p.precio})">+</button>
        </div>
      `;
    });

    document.getElementById("cartaCamarero").innerHTML=html;
  });
}

// AÑADIR PRODUCTO
function add(nombre,precio){
  carrito.push({nombre,precio});
  renderCarrito();
}

// RENDER CARRITO
function renderCarrito(){
  let html="";
  carrito.forEach(p=>{
    html+=`<div>${p.nombre} - ${p.precio}€</div>`;
  });
  document.getElementById("carrito").innerHTML=html;
}

// ENVIAR PEDIDO
function enviarPedido(){
  if(carrito.length===0){
    alert("Añade productos");
    return;
  }

  db.ref("pedidos").push({
    camarero:camareroActual.nombre,
    items:carrito,
    timestamp:Date.now()
  });

  carrito=[];
  renderCarrito();
  alert("Pedido enviado");
}

</script>

</body>
</html>
