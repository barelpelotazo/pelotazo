<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com?v=1600"></script>
</head>

<body class="bg-gray-100">

<div class="bg-blue-900 text-white text-center p-3">
<img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
<div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="bg-red-600 text-white text-center p-2 font-bold">
Escanea el QR de tu mesa para hacer tu pedido
</div>

<div class="text-center p-2">
Mesa: <span id="mesa">--</span>
</div>

<div class="text-center text-red-600 font-bold">
Total gastado: <span id="totalMesa">0.00€</span>
</div>

<div id="carta" style="padding-bottom:140px;"></div>

<div class="text-center text-[11px] text-gray-500 pb-24">
programación y diseño 
<a href="https://rodante.es" target="_blank" class="text-blue-400">rodante</a>
</div>

<div class="fixed bottom-0 w-full bg-white p-3 border-t shadow-lg">
<div id="total" class="text-2xl text-red-600 text-center font-bold">0€</div>

<button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-2 mt-2 rounded">
Enviar pedido
</button>

<div onclick="abrirAdmin()" class="text-center text-xs mt-2 text-gray-400 cursor-pointer">
···
</div>
</div>

<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-white z-50 overflow-auto">

<div class="flex bg-black text-white">
<button onclick="tab('pedidos')" class="flex-1 p-2">Pedidos</button>
<button onclick="tab('cartaTab')" class="flex-1 p-2">Carta</button>
<button onclick="tab('caja')" class="flex-1 p-2">Caja</button>
<button onclick="cerrarAdmin()" class="p-2">X</button>
</div>

<div id="pedidos" class="p-2"></div>
<div id="cartaTab" class="p-2 hidden"></div>
<div id="caja" class="p-2 hidden"></div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
 databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 FIX MESA
let mesaParam=new URLSearchParams(location.search).get("mesa");
let mesa = mesaParam ? mesaParam.toString().trim() : null;

document.getElementById("mesa").innerText=mesa||"--";

let carrito=[];

const totalEl=document.getElementById("total");
const totalMesaEl=document.getElementById("totalMesa");

const categorias=[
"Tapas/Ración/Menú",
"Café/repostería/Postres",
"Bebidas/Refrescos",
"Tapas del día",
"Otros"
];

// 🔥 ADMIN FUNCIONES (RECUPERADAS)
function abrirAdmin(){
 if(prompt("Clave")==="1234"){
  document.getElementById("admin").classList.remove("hidden");
 }
}

function cerrarAdmin(){
 document.getElementById("admin").classList.add("hidden");
}

function tab(t){
 document.getElementById("pedidos").classList.add("hidden");
 document.getElementById("cartaTab").classList.add("hidden");
 document.getElementById("caja").classList.add("hidden");
 document.getElementById(t).classList.remove("hidden");
}

// TOTAL MESA
db.ref("comandas").on("value",snap=>{
 let total=0;
 let data=snap.val()||{};

 Object.values(data).forEach(p=>{
  if(String(p.mesa)===String(mesa)){
   total+=Number(p.total);
  }
 });

 totalMesaEl.innerText=total.toFixed(2)+"€";
});

// CLIENTE
db.ref("carta").on("value",snap=>{
 let data=snap.val()||{};
 let html="";

 categorias.forEach(cat=>{
  let items=Object.values(data).filter(p=>p.categoria===cat && p.activo);
  if(!items.length) return;

  html+=`<div class="m-2 bg-white shadow">
  <div onclick="this.nextElementSibling.classList.toggle('hidden')" 
  class="p-2 bg-gray-200 font-bold flex justify-between cursor-pointer">
  ${cat}<span>▼</span></div><div class="hidden">`;

  items.forEach(p=>{
   html+=`<div class="flex justify-between p-2 border-b">
   <b>${p.nombre}</b>
   <div>${p.precio}€
   <button onclick="add('${p.nombre}',${p.precio})" class="bg-blue-600 text-white px-2 ml-2">+</button>
   </div></div>`;
  });

  html+=`</div></div>`;
 });

 carta.innerHTML=html;
});

// CARRITO
function add(n,p){
 carrito.push({nombre:n,precio:p});
 totalEl.innerText=carrito.reduce((a,b)=>a+Number(b.precio),0)+"€";
}

// ENVIAR
function enviarPedido(){
 if(!mesa){
  alert("Escanea el QR de tu mesa");
  return;
 }
 if(!carrito.length){
  alert("Añade productos");
  return;
 }

 db.ref("comandas").push({
  mesa:String(mesa),
  items:carrito,
  total:carrito.reduce((a,b)=>a+Number(b.precio),0),
  camarero:""
 });

 carrito=[];
 totalEl.innerText="0€";
}

// PEDIDOS
db.ref("comandas").on("value",snap=>{
 let data=snap.val()||{};
 let cont=document.getElementById("pedidos");
 cont.innerHTML="";

 let mesas={};

 Object.keys(data).forEach(id=>{
  let p=data[id];
  let mesaKey=String(p.mesa).trim();

  if(!mesas[mesaKey]){
   mesas[mesaKey]={total:0,productos:{}};
  }

  mesas[mesaKey].total+=Number(p.total);

  p.items.forEach(i=>{
   mesas[mesaKey].productos[i.nombre]=(mesas[mesaKey].productos[i.nombre]||0)+1;
  });
 });

 Object.keys(mesas).forEach((m,i)=>{
  cont.innerHTML+=`
  <div class="p-3 m-2 rounded ${i%2?'bg-gray-200':'bg-white'} shadow">
  <b>Mesa ${m}</b><br>
  ${Object.keys(mesas[m].productos).map(k=>`- ${k} x${mesas[m].productos[k]}`).join("<br>")}
  <div class="text-red-600 font-bold">${mesas[m].total.toFixed(2)}€</div>

  <button onclick="cobrar('${m}')" class="bg-green-700 text-white w-full mt-2 p-2">
  COBRAR
  </button>
  </div>`;
 });
});

// COBRAR
function cobrar(m){
 db.ref("comandas").once("value",snap=>{
  let d=snap.val();

  Object.keys(d).forEach(id=>{
   if(String(d[id].mesa)===String(m)){
    db.ref("caja").push(d[id]);
    db.ref("comandas/"+id).remove();
   }
  });
 });
}
</script>

</body>
</html>
