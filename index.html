<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bar App V3</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
button{padding:10px;margin:5px;border:none;border-radius:8px;font-weight:bold}
input,select{padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc}
.producto{background:white;padding:10px;margin:5px;border-radius:10px}
</style>
</head>

<body>

<h2 style="text-align:center">BAR APP V3</h2>

<!-- CLIENTE -->
<div id="cliente">
  <h3 style="text-align:center">Carta</h3>
  <div id="cartaCliente"></div>

  <div style="text-align:center;margin-top:20px;">
    <button onclick="abrirLogin()">Acceso camarero</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginModal" style="display:none;text-align:center;">
  <h3>PIN Camarero</h3>
  <input id="pinLogin">
  <button onclick="loginCamarero()">Entrar</button>
</div>

<!-- CAMARERO -->
<div id="camareroPanel" style="display:none;">
  <h3 style="text-align:center">Pedido</h3>

  <button onclick="abrirExtra()" style="background:purple;color:white">
    + EXTRA
  </button>

  <div id="cartaCamarero"></div>

  <h3>Carrito</h3>
  <div id="carrito"></div>
  <h3 id="total"></h3>

  <button onclick="enviarPedido()">Enviar pedido</button>
</div>

<!-- MODAL EXTRA -->
<div id="extraModal" style="display:none;text-align:center;">
  <h3>Nuevo producto</h3>
  <input id="extraNombre" placeholder="Nombre">
  <input id="extraPrecio" type="number" placeholder="Precio">

  <select id="extraDestino">
    <option value="cocina">Cocina</option>
    <option value="barra">Barra</option>
  </select>

  <button onclick="agregarExtra()">Añadir</button>
  <button onclick="cerrarExtra()">Cancelar</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
  authDomain: "bar-el-pelotazo-16c19.firebaseapp.com",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let camareros = {};
let carrito = [];
let camareroActual = null;

// CARTA CLIENTE
db.ref("carta").on("value", snap=>{
  let html="";
  Object.values(snap.val()||{}).forEach(p=>{
    html+=`<div class="producto">${p.nombre} - ${p.precio}€</div>`;
  });
  cartaCliente.innerHTML=html;
});

// CAMAREROS
db.ref("camareros").on("value", snap=>{
  camareros=snap.val()||{};
});

// LOGIN
function abrirLogin(){
  loginModal.style.display="block";
}

function loginCamarero(){
  const pin=pinLogin.value;
  const c=Object.values(camareros).find(x=>x.pin===pin);

  if(!c){alert("PIN incorrecto");return;}

  camareroActual=c;
  cliente.style.display="none";
  loginModal.style.display="none";
  camareroPanel.style.display="block";

  cargarCartaCamarero();
}

// CARTA CAMARERO
function cargarCartaCamarero(){
  db.ref("carta").once("value", snap=>{
    let html="";
    Object.values(snap.val()||{}).forEach(p=>{
      html+=`
        <div class="producto">
          ${p.nombre} - ${p.precio}€
          <button onclick="add('${p.nombre}',${p.precio},true)">+</button>
        </div>
      `;
    });
    cartaCamarero.innerHTML=html;
  });
}

// ADD
function add(nombre,precio,cocina){
  carrito.push({nombre,precio,cocina});
  render();
}

// EXTRA
function abrirExtra(){
  extraModal.style.display="block";
}
function cerrarExtra(){
  extraModal.style.display="none";
}
function agregarExtra(){
  const n=extraNombre.value;
  const p=parseFloat(extraPrecio.value);
  const d=extraDestino.value;

  if(!n||isNaN(p)){alert("Datos incorrectos");return;}

  carrito.push({
    nombre:n,
    precio:p,
    cocina:d==="cocina"
  });

  cerrarExtra();
  render();
}

// RENDER
function render(){
  let html="";
  let total=0;

  carrito.forEach((p,i)=>{
    total+=p.precio;
    html+=`
      <div>
        ${p.nombre} - ${p.precio}€
        <button onclick="del(${i})">❌</button>
      </div>
    `;
  });

  carritoEl=carrito;
  document.getElementById("carrito").innerHTML=html;
  document.getElementById("total").innerText="TOTAL: "+total+"€";
}

// DELETE
function del(i){
  carrito.splice(i,1);
  render();
}

// ENVIAR
function enviarPedido(){
  if(!carrito.length){alert("Vacío");return;}

  db.ref("pedidos").push({
    camarero:camareroActual.nombre,
    items:carrito,
    timestamp:Date.now()
  });

  carrito=[];
  render();
  alert("Pedido enviado");
}

</script>

</body>
</html>
