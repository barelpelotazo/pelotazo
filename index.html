<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="bg-blue-900 text-white text-center p-3">
  <img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
  <div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="bg-red-600 text-white text-center p-2 font-bold">
  Escanea el QR de tu mesa para hacer tu pedido
</div>

<div class="text-center p-2">
  Mesa: <span id="mesa">--</span>
</div>

<div class="text-center text-red-600 font-bold">
  Total gastado: <span id="totalMesa">0.00€</span>
</div>

<div id="carta" style="padding-bottom:140px;"></div>

<div class="fixed bottom-0 w-full bg-white p-3 border-t shadow-lg">
  <div id="total" class="text-2xl text-red-600 text-center font-bold">0€</div>

  <button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-3 mt-2 rounded text-lg font-bold">
    Enviar pedido
  </button>

  <div onclick="abrirAdmin()" class="text-center text-xs mt-2 text-gray-400 cursor-pointer">
    ···
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-gray-100 z-50 overflow-auto">

  <div class="flex bg-black text-white">
    <button onclick="tab('pedidos')" class="flex-1 p-3">Pedidos</button>
    <button onclick="tab('cartaTab')" class="flex-1 p-3">Carta</button>
    <button onclick="tab('caja')" class="flex-1 p-3">Caja</button>
    <button onclick="cerrarAdmin()" class="p-3">X</button>
  </div>

  <div id="pedidos" class="p-2"></div>
  <div id="cartaTab" class="p-2 hidden"></div>
  <div id="caja" class="p-2 hidden"></div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ELEMENTOS
const mesaEl = document.getElementById("mesa");
const totalEl = document.getElementById("total");
const totalMesaEl = document.getElementById("totalMesa");
const cartaEl = document.getElementById("carta");
const pedidosEl = document.getElementById("pedidos");
const cartaTabEl = document.getElementById("cartaTab");
const cajaEl = document.getElementById("caja");
const adminEl = document.getElementById("admin");

// VARIABLES
let mesa = new URLSearchParams(location.search).get("mesa");
let carrito = [];

mesaEl.innerText = mesa || "--";

const categorias = [
  "Tapas/Ración/Menú",
  "Café/repostería/Postres",
  "Bebidas/Refrescos",
  "Tapas del día",
  "Otros"
];

// ADMIN
function abrirAdmin(){
  if(prompt("Clave")==="1234"){
    adminEl.classList.remove("hidden");
    cargarCartaAdmin();
  }
}

function cerrarAdmin(){
  adminEl.classList.add("hidden");
}

function tab(t){
  pedidosEl.classList.add("hidden");
  cartaTabEl.classList.add("hidden");
  cajaEl.classList.add("hidden");
  document.getElementById(t).classList.remove("hidden");
}

// TOTAL MESA
db.ref("comandas").on("value", snap => {
  let total = 0;
  let data = snap.val() || {};

  Object.values(data).forEach(p => {
    if(String(p.mesa) === String(mesa)){
      total += Number(p.total || 0);
    }
  });

  totalMesaEl.innerText = total.toFixed(2) + "€";
});

// CLIENTE / CARTA
db.ref("carta").on("value", snap => {
  let data = snap.val() || {};
  let html = "";

  categorias.forEach(cat => {
    let items = Object.values(data).filter(p => p.categoria === cat && p.activo);

    if(!items.length) return;

    html += `
      <div class="m-2 bg-white shadow rounded overflow-hidden">
        <div onclick="this.nextElementSibling.classList.toggle('hidden')"
             class="p-3 bg-gray-200 font-bold flex justify-between text-lg cursor-pointer">
          ${cat}<span>▼</span>
        </div>
        <div class="hidden">
    `;

    items.forEach(p => {
      html += `
        <div class="flex justify-between items-center p-3 border-b">
          <b class="text-lg">${p.nombre}</b>
          <div class="flex items-center gap-3">
            <span class="text-xl font-bold">${Number(p.precio).toFixed(2)}€</span>
            <button onclick="add('${String(p.nombre).replace(/'/g,"\\'")}',${Number(p.precio)})"
                    class="bg-blue-600 text-white px-4 py-2 rounded text-2xl leading-none font-bold">
              +
            </button>
          </div>
        </div>
      `;
    });

    html += `</div></div>`;
  });

  cartaEl.innerHTML = html;
});

// CARRITO
function add(n,p){
  carrito.push({nombre:n,precio:p});
  totalEl.innerText = carrito.reduce((a,b)=>a+Number(b.precio),0).toFixed(2) + "€";
}

// ENVIAR
function enviarPedido(){
  if(!mesa){
    alert("Escanea QR");
    return;
  }

  if(!carrito.length){
    alert("Añade productos");
    return;
  }

  db.ref("comandas").push({
    mesa: String(mesa),
    items: carrito,
    total: carrito.reduce((a,b)=>a+Number(b.precio),0),
    camarero: ""
  });

  carrito = [];
  totalEl.innerText = "0.00€";
}

// PEDIDOS
db.ref("comandas").on("value", snap => {
  let data = snap.val() || {};
  pedidosEl.innerHTML = "";

  let mesas = {};

  Object.keys(data).forEach(id => {
    let p = data[id];
    let m = String(p.mesa);

    if(!mesas[m]){
      mesas[m] = {
        total: 0,
        productos: {},
        ids: [],
        camarero: p.camarero || ""
      };
    }

    mesas[m].total += Number(p.total || 0);
    mesas[m].ids.push(id);

    if(p.camarero){
      mesas[m].camarero = p.camarero;
    }

    (p.items || []).forEach(i => {
      mesas[m].productos[i.nombre] = (mesas[m].productos[i.nombre] || 0) + 1;
    });
  });

  Object.keys(mesas).forEach(m => {
    pedidosEl.innerHTML += `
      <div class="p-4 m-3 rounded-xl bg-white shadow-md border">
        <b class="text-lg">Mesa ${m}</b>

        <div class="mt-2 text-sm">
          ${Object.keys(mesas[m].productos).map(k => `• ${k} x${mesas[m].productos[k]}`).join("<br>")}
        </div>

        <div class="text-red-600 font-black text-lg mt-3">
          ${mesas[m].total.toFixed(2)}€
        </div>

        <select onchange="setCamarero('${m}',this.value)"
                class="w-full mt-3 p-3 border rounded bg-gray-50 text-lg">
          <option value="">Camarero</option>
          <option value="1" ${mesas[m].camarero==="1"?"selected":""}>1</option>
          <option value="2" ${mesas[m].camarero==="2"?"selected":""}>2</option>
          <option value="3" ${mesas[m].camarero==="3"?"selected":""}>3</option>
          <option value="4" ${mesas[m].camarero==="4"?"selected":""}>4</option>
          <option value="5" ${mesas[m].camarero==="5"?"selected":""}>5</option>
          <option value="6" ${mesas[m].camarero==="6"?"selected":""}>6</option>
          <option value="7" ${mesas[m].camarero==="7"?"selected":""}>7</option>
        </select>

        <button onclick="cobrar('${m}')"
                class="bg-green-600 text-white w-full mt-3 p-3 rounded shadow text-lg font-bold">
          COBRAR
        </button>
      </div>
    `;
  });
});

// CAMARERO
function setCamarero(m,c){
  db.ref("comandas").once("value", snap => {
    let d = snap.val() || {};

    Object.keys(d).forEach(id => {
      if(String(d[id].mesa) === String(m)){
        db.ref("comandas/" + id + "/camarero").set(c);
      }
    });
  });
}

// COBRAR
function cobrar(m){
  db.ref("comandas").once("value", snap => {
    let d = snap.val() || {};
    let tieneCamarero = false;

    Object.values(d).forEach(p => {
      if(String(p.mesa) === String(m) && p.camarero){
        tieneCamarero = true;
      }
    });

    if(!tieneCamarero){
      alert("Selecciona camarero antes de cobrar");
      return;
    }

    Object.keys(d).forEach(id => {
      if(String(d[id].mesa) === String(m)){
        db.ref("caja").push(d[id]);
        db.ref("comandas/" + id).remove();
      }
    });
  });
}

// CAJA
db.ref("caja").on("value", snap => {
  let d = snap.val() || {};
  let total = 0;
  let cam = {};

  Object.values(d).forEach(p => {
    total += Number(p.total || 0);
    let nombreCamarero = p.camarero || "Sin asignar";
    cam[nombreCamarero] = (cam[nombreCamarero] || 0) + Number(p.total || 0);
  });

  let html = `
    <div class="bg-white p-3 m-3 rounded-xl shadow">
      <b class="text-lg">Total: ${total.toFixed(2)}€</b><br><br>
  `;

  Object.keys(cam).forEach(c => {
    html += `Camarero ${c}: ${cam[c].toFixed(2)}€<br>`;
  });

  html += `</div>`;

  cajaEl.innerHTML = html;
});

// CARTA ADMIN
function cargarCartaAdmin(){
  db.ref("carta").on("value", snap => {
    let data = snap.val() || {};
    let html = "";

    categorias.forEach(cat => {
      html += `
        <div class="bg-white p-3 m-3 rounded-xl shadow border">
          <b>${cat}</b>
          <button onclick="nuevo('${cat}')" class="ml-2 bg-green-500 text-white px-2 rounded">+</button><br>
      `;

      Object.entries(data).forEach(([id,p]) => {
        if(p.categoria === cat){
          html += `
            <div class="flex items-center mt-2">
              <input class="border p-1 rounded mr-2" value="${p.nombre}" onchange="editarNombre('${id}',this.value)">
              <input class="border p-1 rounded mr-2 w-20" type="number" value="${p.precio}" onchange="editarPrecio('${id}',this.value)">
              <button onclick="toggle('${id}',${p.activo})" class="px-2 mr-1 rounded ${p.activo ? 'bg-blue-600' : 'bg-gray-400'} text-white">
                ${p.activo ? 'ON' : 'OFF'}
              </button>
              <button onclick="borrar('${id}')" class="bg-red-600 text-white px-2 rounded">X</button>
            </div>
          `;
        }
      });

      html += `</div>`;
    });

    cartaTabEl.innerHTML = html;
  });
}

// CRUD CARTA
function editarNombre(id,n){
  db.ref("carta/" + id + "/nombre").set(n);
}

function editarPrecio(id,p){
  db.ref("carta/" + id + "/precio").set(Number(p));
}

function nuevo(cat){
  let n = prompt("Nombre");
  let p = parseFloat(prompt("Precio"));
  db.ref("carta").push({
    nombre:n,
    precio:p,
    categoria:cat,
    activo:true
  });
}

function toggle(id,a){
  db.ref("carta/" + id + "/activo").set(!a);
}

function borrar(id){
  db.ref("carta/" + id).remove();
}
</script>

</body>
</html>
