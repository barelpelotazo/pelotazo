<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="bg-blue-900 text-white text-center p-3">
<img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
<div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="bg-red-600 text-white text-center p-2 font-bold">
Escanea el QR de tu mesa para hacer tu pedido
</div>

<div class="text-center p-2">Mesa: <span id="mesa">--</span></div>

<div class="text-center text-red-600 font-bold">
Total gastado: <span id="totalMesa">0.00€</span>
</div>

<div id="carta" style="padding-bottom:160px;"></div>

<!-- FOOTER -->
<div class="text-center text-[11px] text-gray-500 pb-28">
  creacion y diseño 
  <span onclick="abrirRodante()" class="text-blue-400 cursor-pointer">rodante</span>
</div>

<!-- POPUP -->
<div id="popupRodante" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
  <div class="bg-white p-5 rounded-xl shadow text-center">
    <b>rodante</b><br>
    <a href="https://rodante.es" target="_blank" class="text-blue-500">ir a rodante.es</a><br><br>
    <button onclick="cerrarRodante()">cerrar</button>
  </div>
</div>

<!-- BARRA -->
<div class="fixed bottom-0 w-full bg-white p-3 border-t shadow">
<div id="total" class="text-2xl text-red-600 text-center font-bold">0€</div>

<button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-2 mt-2 rounded">
Enviar pedido
</button>

<div onclick="abrirAdmin()" class="text-center text-xs mt-2 text-gray-400">···</div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-gray-100 z-50 overflow-auto">

<div class="flex bg-black text-white">
<button onclick="tab('pedidos')" class="flex-1 p-2">Pedidos</button>
<button onclick="tab('cocina')" class="flex-1 p-2">Cocina</button>
<button onclick="tab('cartaTab')" class="flex-1 p-2">Carta</button>
<button onclick="tab('caja')" class="flex-1 p-2">Caja</button>
<button onclick="cerrarAdmin()" class="p-2">X</button>
</div>

<div id="pedidos" class="p-2"></div>
<div id="cocina" class="p-2 hidden"></div>
<div id="cartaTab" class="p-2 hidden"></div>
<div id="caja" class="p-2 hidden"></div>

</div>

<script>
// POPUP
function abrirRodante(){popupRodante.classList.remove("hidden")}
function cerrarRodante(){popupRodante.classList.add("hidden")}

// FIREBASE
const firebaseConfig={
 apiKey:"AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
 databaseURL:"https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
 projectId:"bar-el-pelotazo-16c19"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// VARIABLES
let mesa=new URLSearchParams(location.search).get("mesa");
let carrito=[];
mesaEl.innerText=mesa||"--";

// ADMIN
function abrirAdmin(){
 if(prompt("Clave")==="1234"){
  admin.classList.remove("hidden");
  cargarCartaAdmin();
 }
}
function cerrarAdmin(){admin.classList.add("hidden")}
function tab(t){
 pedidos.classList.add("hidden");
 cocina.classList.add("hidden");
 cartaTab.classList.add("hidden");
 caja.classList.add("hidden");
 document.getElementById(t).classList.remove("hidden");
}

// TOTAL
db.ref("comandas").on("value",snap=>{
 let total=0;
 let d=snap.val()||{};
 Object.values(d).forEach(p=>{
  if(String(p.mesa)===String(mesa)) total+=Number(p.total);
 });
 totalMesa.innerText=total.toFixed(2)+"€";
});

// CARTA CLIENTE
db.ref("carta").on("value",snap=>{
 let data=snap.val()||{};
 let html="";
 let cats=["Tapas/Ración/Menú","Café/repostería/Postres","Bebidas/Refrescos","Tapas del día","Otros"];

 cats.forEach(cat=>{
  let items=Object.values(data).filter(p=>p.categoria===cat && p.activo);
  if(!items.length) return;

  html+=`<div class="m-2 bg-white shadow rounded">
  <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-2 bg-gray-200 font-bold flex justify-between">
  ${cat}<span>▼</span></div><div class="hidden">`;

  items.forEach(p=>{
   html+=`<div class="flex justify-between p-2 border-b">
   <b>${p.nombre}</b>
   <div>${p.precio}€
   <button onclick="add('${p.nombre}',${p.precio})" class="bg-blue-600 text-white px-2 ml-2 rounded">+</button>
   </div></div>`;
  });

  html+=`</div></div>`;
 });

 carta.innerHTML=html;
});

// ADD
function add(n,p){
 carrito.push({nombre:n,precio:p});
 total.innerText=carrito.reduce((a,b)=>a+Number(b.precio),0)+"€";
}

// ENVIAR
function enviarPedido(){
 if(!mesa){alert("Escanea QR");return;}
 if(!carrito.length){alert("Añade productos");return;}

 db.ref("comandas").push({
  mesa:String(mesa),
  items:carrito,
  total:carrito.reduce((a,b)=>a+Number(b.precio),0),
  camarero:""
 });

 carrito=[];
 total.innerText="0€";
}

// PEDIDOS + COCINA
db.ref("comandas").on("value",snap=>{
 let d=snap.val()||{};
 pedidos.innerHTML="";
 cocina.innerHTML="";

 let cartaData={};
 db.ref("carta").once("value").then(s=>{
  cartaData=s.val()||{};
 });

 Object.values(d).forEach((p,i)=>{
  let bloque=`<div class="p-3 m-2 rounded ${i%2?'bg-blue-50':'bg-white'} shadow">
  <b>Mesa ${p.mesa}</b><br>
  ${p.items.map(x=>`• ${x.nombre}`).join("<br>")}
  <div class="text-red-600 font-bold">${p.total}€</div>
  </div>`;

  pedidos.innerHTML+=bloque;

  let cocinaItems=p.items.filter(it=>{
   return Object.values(cartaData).find(c=>c.nombre===it.nombre && c.cocina);
  });

  if(cocinaItems.length){
   cocina.innerHTML+=`<div class="p-3 m-2 bg-yellow-100 rounded shadow">
   <b>Mesa ${p.mesa}</b><br>
   ${cocinaItems.map(x=>`🍳 ${x.nombre}`).join("<br>")}
   </div>`;
  }
 });
});

// CARTA ADMIN + COCINA
function cargarCartaAdmin(){
 db.ref("carta").on("value",snap=>{
  let data=snap.val()||{};
  let html="";
  let cats=["Tapas/Ración/Menú","Café/repostería/Postres","Bebidas/Refrescos","Tapas del día","Otros"];

  cats.forEach(cat=>{
   html+=`<div class="bg-white p-3 m-2 shadow">
   <b>${cat}</b>
   <button onclick="nuevo('${cat}')">+</button><br>`;

   Object.entries(data).forEach(([id,p])=>{
    if(p.categoria===cat){
     html+=`
     <input value="${p.nombre}" onchange="editarNombre('${id}',this.value)">
     <input type="number" value="${p.precio}" onchange="editarPrecio('${id}',this.value)">
     
     <button onclick="toggle('${id}',${p.activo})">${p.activo?'ON':'OFF'}</button>

     <button onclick="toggleCocina('${id}',${p.cocina||false})"
     class="${p.cocina?'bg-orange-500':'bg-gray-300'} text-white px-2">
     🍳
     </button>

     <button onclick="borrar('${id}')">X</button><br>`;
    }
   });

   html+=`</div>`;
  });

  cartaTab.innerHTML=html;
 });
}

// FUNCIONES
function editarNombre(id,n){db.ref("carta/"+id+"/nombre").set(n)}
function editarPrecio(id,p){db.ref("carta/"+id+"/precio").set(Number(p))}
function toggle(id,a){db.ref("carta/"+id+"/activo").set(!a)}
function toggleCocina(id,a){db.ref("carta/"+id+"/cocina").set(!a)}
function borrar(id){db.ref("carta/"+id).remove()}
function nuevo(cat){
 let n=prompt("Nombre");
 let p=parseFloat(prompt("Precio"));
 db.ref("carta").push({nombre:n,precio:p,categoria:cat,activo:true,cocina:false});
}
</script>

</body>
</html>
