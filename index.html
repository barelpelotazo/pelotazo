<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar El Pelotazo - Carta Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@300;400;700&display=swap');
        
        body { font-family: 'Roboto', sans-serif; }
        .font-pizarra { font-family: 'Permanent+Marker', cursive; }
        .bg-pizarra { background-color: #1a1a1a; }
        .item-card { border-bottom: 1px dashed #e2e8f0; }
        .disabled-btn { background-color: #4b5563 !important; opacity: 0.6; cursor: not-allowed; }
        
        /* Efecto de tiza para el logo */
        .chalk-text {
            color: white;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-32">

    <!-- Header Estilo Original -->
    <header class="bg-pizarra text-white pt-10 pb-8 px-6 shadow-2xl text-center border-b-4 border-red-600">
        <div class="mb-2">
            <span class="text-5xl font-pizarra chalk-text block">BAR EL</span>
            <span class="text-6xl font-pizarra text-red-500 block transform -rotate-2">PELOTAZO</span>
        </div>
        <div id="status-mesa" class="inline-block mt-4 px-4 py-1 rounded-full bg-white/10 text-xs tracking-widest uppercase">
            Escanea el QR de tu mesa
        </div>
    </header>

    <!-- Info de Mesa (Solo visible si hay mesa) -->
    <div class="max-w-md mx-auto -mt-4 px-4 relative z-10">
        <div class="bg-white p-3 rounded-xl shadow-lg border border-slate-200 flex items-center justify-between">
            <span class="font-bold text-slate-500 uppercase text-xs">Ubicación:</span>
            <select id="numero-mesa" class="bg-transparent border-none font-black text-red-600 text-lg focus:ring-0">
                <option value="">SIN MESA</option>
                <option value="1">MESA 1</option>
                <option value="2">MESA 2</option>
                <option value="3">MESA 3</option>
                <option value="4">MESA 4</option>
                <option value="5">MESA 5</option>
                <option value="6">MESA 6</option>
                <option value="7">MESA 7</option>
                <option value="8">MESA 8</option>
                <option value="9">MESA 9</option>
                <option value="10">MESA 10</option>
            </select>
        </div>
    </div>

    <!-- Menú -->
    <main class="max-w-md mx-auto p-4 mt-4 space-y-8">
        
        <!-- Categoría: Bebidas -->
        <section>
            <h2 class="font-pizarra text-2xl text-slate-800 mb-4 flex items-center">
                <span class="bg-red-600 w-2 h-8 mr-3"></span> BEBIDAS FRÍAS
            </h2>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <div class="p-4 item-card flex justify-between items-center">
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-800">Caña de Cerveza</h3>
                        <p class="text-xs text-slate-400">Muy fría, recién tirada</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-700">1.50€</span>
                        <button onclick="agregarAlCarrito('Caña', 1.50)" class="bg-slate-800 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold active:scale-90">+</button>
                    </div>
                </div>
                <div class="p-4 item-card flex justify-between items-center">
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-800">Refresco Variado</h3>
                        <p class="text-xs text-slate-400">Lata 33cl</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-700">2.00€</span>
                        <button onclick="agregarAlCarrito('Refresco', 2.00)" class="bg-slate-800 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold active:scale-90">+</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Categoría: Comida -->
        <section>
            <h2 class="font-pizarra text-2xl text-slate-800 mb-4 flex items-center">
                <span class="bg-red-600 w-2 h-8 mr-3"></span> PARA PICAR
            </h2>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <div class="p-4 item-card flex justify-between items-center">
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-800">Patatas Bravas</h3>
                        <p class="text-xs text-slate-400">Receta de la casa</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-700">5.00€</span>
                        <button onclick="agregarAlCarrito('Bravas', 5.00)" class="bg-slate-800 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold active:scale-90">+</button>
                    </div>
                </div>
                <div class="p-4 item-card flex justify-between items-center">
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-800">Pincho de Tortilla</h3>
                        <p class="text-xs text-slate-400">Con o sin cebolla</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-700">3.50€</span>
                        <button onclick="agregarAlCarrito('Tortilla', 3.50)" class="bg-slate-800 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold active:scale-90">+</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Carrito Inferior -->
    <footer class="fixed bottom-0 left-0 right-0 bg-pizarra text-white p-5 shadow-[0_-10px_20px_rgba(0,0,0,0.2)] z-50">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div>
                <span class="text-[10px] uppercase tracking-tighter text-slate-400 block">Total Pedido</span>
                <span id="total-display" class="text-3xl font-pizarra text-red-500">0.00€</span>
            </div>
            <button id="enviar-pedido" onclick="confirmarPedido()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-all uppercase tracking-widest">
                Enviar Comanda
            </button>
        </div>
    </footer>

    <script>
        // --- CONFIGURACIÓN ---
        const firebaseConfig = {
            databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- LÓGICA DE MESA Y SEGURIDAD ---
        const urlParams = new URLSearchParams(window.location.search);
        const mesaDetectada = urlParams.get('mesa');
        const selectorMesa = document.getElementById('numero-mesa');
        const btnEnviar = document.getElementById('enviar-pedido');
        const statusText = document.getElementById('status-mesa');

        let pedidoActual = [];
        let total = 0;

        window.onload = () => {
            if (mesaDetectada && mesaDetectada > 0 && mesaDetectada <= 10) {
                selectorMesa.value = mesaDetectada;
                selectorMesa.disabled = true;
                statusText.innerHTML = `🟢 PEDIDO EN VIVO: MESA ${mesaDetectada}`;
                statusText.style.color = "#4ade80";
            } else {
                // Bloqueo estricto
                btnEnviar.disabled = true;
                btnEnviar.classList.add('disabled-btn');
                btnEnviar.innerText = "ESCANEA QR MESA";
                selectorMesa.disabled = true;
                statusText.innerHTML = "🔴 BLOQUEADO: ESCANEA QR EN MESA";
                statusText.style.color = "#f87171";
            }
        };

        function agregarAlCarrito(nombre, precio) {
            pedidoActual.push({ nombre, precio });
            total += precio;
            document.getElementById('total-display').innerText = total.toFixed(2) + "€";
        }

        function confirmarPedido() {
            if (pedidoActual.length === 0) return alert("Selecciona algo primero.");
            if (confirm(`¿Enviar pedido de Mesa ${mesaDetectada} a cocina?`)) {
                enviarPedidoAFirebase();
            }
        }

        function enviarPedidoAFirebase() {
            const nuevoPedidoRef = database.ref('pedidos').push();
            nuevoPedidoRef.set({
                mesa: mesaDetectada,
                productos: pedidoActual,
                total: total,
                estado: "pendiente",
                hora: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
            })
            .then(() => {
                alert("¡Pedido enviado! Lo marchamos ahora mismo.");
                pedidoActual = [];
                total = 0;
                document.getElementById('total-display').innerText = "0.00€";
            })
            .catch(() => alert("Error de conexión. Avisa al camarero."));
        }
    </script>
</body>
</html>
