<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bar App PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
button{padding:12px;margin:5px;border:none;border-radius:10px;font-weight:bold;font-size:16px}
.producto{background:white;padding:12px;margin:6px;border-radius:12px;font-size:18px}
.pedido{background:#fff;padding:15px;margin:10px;border-radius:12px;border-left:6px solid #333;font-size:18px}
</style>
</head>

<body>

<div id="app"></div>

<script>

const modo = new URLSearchParams(window.location.search).get("modo") || "cliente";

const firebaseConfig = {
  apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
  authDomain: "bar-el-pelotazo-16c19.firebaseapp.com",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrito = [];
let camareros = {};
let camareroActual = null;

// ===================== CLIENTE =====================
if(modo==="cliente"){
  app.innerHTML = `
    <h2 style="text-align:center">Carta</h2>
    <div id="carta"></div>
  `;

  db.ref("carta").on("value", snap=>{
    let html="";
    Object.values(snap.val()||{}).forEach(p=>{
      html+=`<div class="producto">${p.nombre} - ${Number(p.precio||0).toFixed(2)}€</div>`;
    });
    document.getElementById("carta").innerHTML=html;
  });
}

// ===================== CAMARERO =====================
if(modo==="camarero"){

  app.innerHTML = `
    <h2>PIN Camarero</h2>
    <input id="pin">
    <button onclick="login()">Entrar</button>
    <div id="panel" style="display:none"></div>
  `;

  db.ref("camareros").on("value", s=>camareros=s.val()||{});

  window.login = function(){
    const pin = document.getElementById("pin").value;
    const c = Object.values(camareros).find(x=>x.pin===pin);
    if(!c){alert("PIN incorrecto");return;}

    camareroActual=c;

    panel.style.display="block";
    panel.innerHTML=`
      <button onclick="extra()">+ EXTRA</button>
      <div id="carta"></div>
      <h3>Carrito</h3>
      <div id="carrito"></div>
      <h3 id="total"></h3>
      <button onclick="enviar()">Enviar pedido</button>
    `;

    db.ref("carta").once("value", snap=>{
      let html="";
      Object.values(snap.val()||{}).forEach(p=>{
        html+=`
          <div class="producto">
            ${p.nombre} ${Number(p.precio||0).toFixed(2)}€
            <button onclick="add('${p.nombre}',${Number(p.precio||0)},${!!p.cocina})">+</button>
          </div>`;
      });
      document.getElementById("carta").innerHTML=html;
    });
  }

  window.add = function(n,p,c){
    carrito.push({nombre:n,precio:p,cocina:c});
    render();
  }

  window.render = function(){
    let html="",total=0;
    carrito.forEach((p,i)=>{
      total+=p.precio;
      html+=`${p.nombre} ${p.precio}€ <button onclick="del(${i})">❌</button><br>`;
    });
    carritoEl.innerHTML=html;
    totalEl.innerText="TOTAL "+total.toFixed(2)+"€";
  }

  window.del = function(i){
    carrito.splice(i,1);render();
  }

  window.extra = function(){
    const n=prompt("Nombre");
    const p=parseFloat(prompt("Precio"));
    const c=confirm("Aceptar = cocina, Cancelar = barra");

    if(!n||isNaN(p)) return;

    carrito.push({nombre:n,precio:p,cocina:c});
    render();
  }

  window.enviar = function(){
    db.ref("pedidos").push({
      camarero:camareroActual.nombre,
      items:carrito,
      timestamp:Date.now()
    });
    carrito=[];render();
  }
}

// ===================== COCINA =====================
if(modo==="cocina"){
  app.innerHTML = `<h2 style="text-align:center">COCINA</h2><div id="lista"></div>`;

  db.ref("pedidos").on("value", snap=>{
    let html="";
    Object.entries(snap.val()||{}).forEach(([id,p])=>{
      const items=p.items.filter(i=>i.cocina && !i.hecho);

      if(items.length){
        html+=`
          <div class="pedido">
            <b>${p.camarero}</b><br>
            ${items.map(i=>i.nombre).join("<br>")}
            <br><button onclick="hecho('${id}',true)">✔ HECHO</button>
          </div>`;
      }
    });
    lista.innerHTML=html;
  });
}

// ===================== BARRA =====================
if(modo==="barra"){
  app.innerHTML = `<h2 style="text-align:center">BARRA</h2><div id="lista"></div>`;

  db.ref("pedidos").on("value", snap=>{
    let html="";
    Object.entries(snap.val()||{}).forEach(([id,p])=>{
      const items=p.items.filter(i=>!i.cocina && !i.hecho);

      if(items.length){
        html+=`
          <div class="pedido">
            <b>${p.camarero}</b><br>
            ${items.map(i=>i.nombre).join("<br>")}
            <br><button onclick="hecho('${id}',false)">✔ HECHO</button>
          </div>`;
      }
    });
    lista.innerHTML=html;
  });
}

// ===================== HECHO =====================
window.hecho = function(id,cocina){
  db.ref("pedidos/"+id+"/items").once("value", snap=>{
    const items=snap.val();
    items.forEach(i=>{
      if(i.cocina===cocina){
        i.hecho=true;
      }
    });
    db.ref("pedidos/"+id+"/items").set(items);
  });
}

</script>

</body>
</html>
