<!-- VERSION 20.1 - ESTABLE + COCINA SEGURA + FOOTER FIJO -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-blue-900 text-white text-center p-3">
  <img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
  <div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="bg-red-600 text-white text-center p-2 font-bold">
  Escanea el QR de tu mesa para hacer tu pedido
</div>

<div class="text-center p-2">
  Mesa: <span id="mesa">--</span>
</div>

<div class="text-center text-red-600 font-bold">
  Total gastado: <span id="totalMesa">0.00€</span>
</div>

<!-- CARTA -->
<div id="carta" style="padding-bottom:180px;"></div>

<!-- FOOTER FIJO -->
<div class="text-center text-[11px] text-gray-500 pb-32">
  creacion y diseño
  <a href="https://rodante.es" target="_blank" class="text-blue-400">
    rodante
  </a>
</div>

<!-- BARRA -->
<div class="fixed bottom-0 w-full bg-white p-3 border-t shadow-lg">
  <div id="total" class="text-2xl text-red-600 text-center font-bold">0€</div>

  <button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-2 mt-2 rounded">
    Enviar pedido
  </button>

  <div onclick="abrirAdmin()" class="text-center text-xs mt-2 text-gray-400 cursor-pointer">
    ···
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-gray-100 z-50 overflow-auto">

  <div class="flex bg-black text-white">
    <button onclick="tab('pedidos')" class="flex-1 p-3">Pedidos</button>
    <button onclick="tab('cartaTab')" class="flex-1 p-3">Carta</button>
    <button onclick="tab('caja')" class="flex-1 p-3">Caja</button>
    <button onclick="cerrarAdmin()" class="p-3">X</button>
  </div>

  <div id="pedidos" class="p-2"></div>
  <div id="cartaTab" class="p-2 hidden"></div>
  <div id="caja" class="p-2 hidden"></div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// VARIABLES
let mesa = new URLSearchParams(location.search).get("mesa");
let carrito = [];

document.getElementById("mesa").innerText = mesa || "--";

const totalEl = document.getElementById("total");
const totalMesaEl = document.getElementById("totalMesa");

const categorias = [
  "Tapas/Ración/Menú",
  "Café/repostería/Postres",
  "Bebidas/Refrescos",
  "Tapas del día",
  "Otros"
];

// ADMIN
function abrirAdmin(){
  if(prompt("Clave")==="1234"){
    document.getElementById("admin").classList.remove("hidden");
    cargarCartaAdmin();
  }
}
function cerrarAdmin(){
  document.getElementById("admin").classList.add("hidden");
}

function tab(t){
  document.getElementById("pedidos").classList.add("hidden");
  document.getElementById("cartaTab").classList.add("hidden");
  document.getElementById("caja").classList.add("hidden");
  document.getElementById(t).classList.remove("hidden");
}

// TOTAL MESA
db.ref("comandas").on("value", snap => {
  let total = 0;
  let data = snap.val() || {};
  Object.values(data).forEach(p => {
    if (String(p.mesa) === String(mesa)) {
      total += Number(p.total);
    }
  });
  totalMesaEl.innerText = total.toFixed(2) + "€";
});

// CLIENTE
db.ref("carta").on("value", snap => {
  let data = snap.val() || {};
  let html = "";

  categorias.forEach(cat => {
    let items = Object.values(data).filter(p => p.categoria === cat && p.activo);
    if (!items.length) return;

    html += `<div class="m-2 bg-white shadow rounded">
      <div onclick="this.nextElementSibling.classList.toggle('hidden')"
      class="p-2 bg-gray-200 font-bold flex justify-between">
      ${cat}<span>▼</span></div><div class="hidden">`;

    items.forEach(p => {
      html += `<div class="flex justify-between p-2 border-b">
        <b>${p.nombre}</b>
        <div>${p.precio}€
          <button onclick="add('${p.nombre.replace(/'/g, "\\'")}',${Number(p.precio)})" class="bg-blue-600 text-white px-2 ml-2 rounded">+</button>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("carta").innerHTML = html;
});

// CARRITO
function add(n, p){
  carrito.push({nombre:n, precio:Number(p)});
  totalEl.innerText = carrito.reduce((a,b)=>a + Number(b.precio), 0).toFixed(2) + "€";
}

// ENVIAR
function enviarPedido(){
  if(!mesa){
    alert("Escanea el QR de tu mesa antes de hacer el pedido");
    return;
  }
  if(!carrito.length){
    alert("Añade productos al pedido");
    return;
  }

  db.ref("comandas").push({
    mesa: String(mesa),
    items: carrito,
    total: carrito.reduce((a,b)=>a + Number(b.precio), 0),
    camarero: ""
  });

  carrito = [];
  totalEl.innerText = "0€";
}

// PEDIDOS
db.ref("comandas").on("value", snap => {
  let data = snap.val() || {};
  let cont = document.getElementById("pedidos");
  cont.innerHTML = "";

  let mesas = {};

  Object.keys(data).forEach(id => {
    let p = data[id];
    let m = String(p.mesa);

    if(!mesas[m]){
      mesas[m] = { total:0, productos:{}, ids:[] };
    }

    mesas[m].total += Number(p.total);

    (p.items || []).forEach(i => {
      mesas[m].productos[i.nombre] = (mesas[m].productos[i.nombre] || 0) + 1;
    });
  });

  Object.keys(mesas).forEach((m, i) => {
    cont.innerHTML += `
      <div class="p-4 m-3 rounded-xl bg-white shadow-md border">
        <b class="text-lg">Mesa ${m}</b>

        <div class="mt-2 text-sm">
          ${Object.keys(mesas[m].productos).map(k => `• ${k} x${mesas[m].productos[k]}`).join("<br>")}
        </div>

        <div class="text-red-600 font-black text-lg mt-3">
          ${mesas[m].total.toFixed(2)}€
        </div>
      </div>`;
  });
});

// CAJA
db.ref("caja").on("value", snap => {
  let d = snap.val() || {};
  let total = 0;

  Object.values(d).forEach(p => {
    total += Number(p.total);
  });

  document.getElementById("caja").innerHTML = `<div class="bg-white p-3 m-3 rounded-xl shadow">
    <b>Total: ${total.toFixed(2)}€</b>
  </div>`;
});

// CARTA ADMIN (CON 🍳)
function cargarCartaAdmin(){
  db.ref("carta").on("value", snap => {
    let data = snap.val() || {};
    let html = "";

    categorias.forEach(cat => {
      html += `<div class="bg-white p-3 m-3 rounded-xl shadow border">
        <b>${cat}</b>
        <button onclick="nuevo('${cat.replace(/'/g, "\\'")}')">+</button><br>`;

      Object.entries(data).forEach(([id,p]) => {
        if(p.categoria === cat){
          html += `
            <div class="flex items-center mt-2">
              <input class="border p-1 rounded mr-2" value="${String(p.nombre ?? "").replace(/"/g, "&quot;")}" onchange="editarNombre('${id}',this.value)">
              <input class="border p-1 rounded mr-2 w-20" type="number" value="${Number(p.precio || 0)}" onchange="editarPrecio('${id}',this.value)">

              <button onclick="toggle('${id}',${!!p.activo})"
              class="px-2 mr-1 rounded ${p.activo ? 'bg-blue-600' : 'bg-gray-400'} text-white">
                ${p.activo ? 'ON' : 'OFF'}
              </button>

              <button onclick="toggleCocina('${id}',${!!p.cocina})"
              class="px-2 mr-1 rounded ${p.cocina ? 'bg-orange-500' : 'bg-gray-300'} text-white">
                🍳
              </button>

              <button onclick="borrar('${id}')" class="bg-red-600 text-white px-2 rounded">X</button>
            </div>`;
        }
      });

      html += `</div>`;
    });

    document.getElementById("cartaTab").innerHTML = html;
  });
}

// CRUD
function editarNombre(id,n){
  db.ref("carta/"+id+"/nombre").set(n);
}
function editarPrecio(id,p){
  db.ref("carta/"+id+"/precio").set(Number(p));
}
function toggle(id,a){
  db.ref("carta/"+id+"/activo").set(!a);
}
function toggleCocina(id,a){
  db.ref("carta/"+id+"/cocina").set(!a);
}
function borrar(id){
  db.ref("carta/"+id).remove();
}
function nuevo(cat){
  let n = prompt("Nombre");
  if(!n) return;
  let p = parseFloat(prompt("Precio"));
  if(isNaN(p)) return;

  db.ref("carta").push({
    nombre:n,
    precio:p,
    categoria:cat,
    activo:true,
    cocina:false
  });
}
</script>

</body>
</html>
