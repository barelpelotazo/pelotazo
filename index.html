<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar El Pelotazo - Carta Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto+Condensed:wght@400;700&display=swap');
        
        :root {
            --pizarra: #1a1a1a;
            --tiza: #ffffff;
            --pelotazo-rojo: #e11d48;
        }

        body { 
            font-family: 'Roboto Condensed', sans-serif; 
            background-color: #f1f5f9;
        }

        .font-pizarra { font-family: 'Permanent+Marker', cursive; }
        
        .header-pizarra {
            background-color: var(--pizarra);
            border-bottom: 6px solid var(--pelotazo-rojo);
            position: relative;
        }

        /* Estilo del logotipo original */
        .logo-container {
            padding: 40px 20px;
        }

        .logo-el {
            font-size: 3.5rem;
            color: var(--tiza);
            line-height: 1;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        .logo-pelotazo {
            font-size: 5rem;
            color: var(--pelotazo-rojo);
            line-height: 0.8;
            transform: rotate(-3deg);
            display: block;
            text-shadow: 3px 3px 0px var(--tiza);
        }

        .categoria-titulo {
            background: var(--pizarra);
            color: var(--tiza);
            transform: skewX(-10deg);
            padding: 5px 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn-mas {
            background-color: var(--pizarra);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-mas:active { transform: scale(0.9); background-color: var(--pelotazo-rojo); }

        .footer-comanda {
            background-color: var(--pizarra);
            border-top: 4px solid var(--pelotazo-rojo);
        }

        .disabled-btn {
            background-color: #4b5563 !important;
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }
    </style>
</head>
<body class="pb-32">

    <!-- Header con Logotipo Original -->
    <header class="header-pizarra shadow-2xl">
        <div class="logo-container text-center">
            <span class="font-pizarra logo-el">BAR EL</span>
            <span class="font-pizarra logo-pelotazo">PELOTAZO</span>
            
            <div id="status-mesa" class="mt-6 inline-block px-4 py-1 rounded border border-dashed border-white/30 text-[10px] uppercase tracking-[0.2em] text-white/80">
                Escanea el QR de tu mesa
            </div>
        </div>
    </header>

    <!-- Indicador de Mesa -->
    <div class="max-w-md mx-auto -mt-5 px-4">
        <div class="bg-white p-3 rounded shadow-xl flex items-center justify-between border-l-4 border-red-600">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Ubicación</span>
            <select id="numero-mesa" class="font-black text-xl text-red-600 border-none bg-transparent focus:ring-0">
                <option value="">---</option>
                <option value="1">MESA 1</option>
                <option value="2">MESA 2</option>
                <option value="3">MESA 3</option>
                <option value="4">MESA 4</option>
                <option value="5">MESA 5</option>
                <option value="6">MESA 6</option>
                <option value="7">MESA 7</option>
                <option value="8">MESA 8</option>
                <option value="9">MESA 9</option>
                <option value="10">MESA 10</option>
            </select>
        </div>
    </div>

    <!-- Carta -->
    <main class="max-w-md mx-auto p-4 mt-6 space-y-10">
        
        <!-- Sección 1 -->
        <section>
            <div class="categoria-titulo font-pizarra text-xl">PARA REFRESCAR</div>
            <div class="bg-white rounded-lg shadow-sm">
                <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-slate-800">Caña de Cerveza</h3>
                        <p class="text-xs text-slate-400 italic">Bien tirada y muy fría</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-700">1.50€</span>
                        <button onclick="agregarAlCarrito('Caña', 1.50)" class="btn-mas">+</button>
                    </div>
                </div>
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-slate-800">Tinto de Verano</h3>
                        <p class="text-xs text-slate-400 italic">Con mucho hielo y limón</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-700">2.50€</span>
                        <button onclick="agregarAlCarrito('Tinto', 2.50)" class="btn-mas">+</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Sección 2 -->
        <section>
            <div class="categoria-titulo font-pizarra text-xl">RACIONES EL PELOTAZO</div>
            <div class="bg-white rounded-lg shadow-sm">
                <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-slate-800">Patatas Bravas</h3>
                        <p class="text-xs text-slate-400 italic">Salsa secreta picante</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-700">5.50€</span>
                        <button onclick="agregarAlCarrito('Bravas', 5.50)" class="btn-mas">+</button>
                    </div>
                </div>
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-slate-800">Pincho Tortilla</h3>
                        <p class="text-xs text-slate-400 italic">Un clásico del bar</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-700">3.00€</span>
                        <button onclick="agregarAlCarrito('Tortilla', 3.00)" class="btn-mas">+</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Barra de Pedido Inferior -->
    <footer class="fixed bottom-0 left-0 right-0 footer-comanda p-5 z-50">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="text-white">
                <p class="text-[10px] uppercase text-red-500 font-bold">Total Cuenta</p>
                <p id="total-display" class="text-3xl font-pizarra tracking-tight">0.00€</p>
            </div>
            <button id="enviar-pedido" onclick="confirmarPedido()" class="bg-red-600 text-white px-6 py-4 rounded font-bold uppercase tracking-tighter text-sm shadow-inner active:bg-red-800 transition-colors">
                Enviar a Cocina
            </button>
        </div>
    </footer>

    <script>
        // Configuración Firebase (Usando tu proyecto)
        const firebaseConfig = {
            databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Variables de Estado
        let carrito = [];
        let total = 0;

        // Lógica de Mesa Segura
        const urlParams = new URLSearchParams(window.location.search);
        const mesaParam = urlParams.get('mesa');
        const selectMesa = document.getElementById('numero-mesa');
        const botonEnviar = document.getElementById('enviar-pedido');
        const textoStatus = document.getElementById('status-mesa');

        window.onload = () => {
            if (mesaParam && mesaParam > 0 && mesaParam <= 10) {
                // Modo Cliente en Mesa
                selectMesa.value = mesaParam;
                selectMesa.disabled = true;
                textoStatus.innerText = "● CONECTADO - MESA " + mesaParam;
                textoStatus.style.color = "#4ade80";
            } else {
                // Modo Lectura (Sin poder pedir)
                botonEnviar.disabled = true;
                botonEnviar.classList.add('disabled-btn');
                botonEnviar.innerText = "ESCANEA QR MESA";
                selectMesa.disabled = true;
                textoStatus.innerText = "⚠️ SOLO LECTURA - ESCANEA QR";
                textoStatus.style.color = "#f87171";
            }
        };

        function agregarAlCarrito(nombre, precio) {
            carrito.push({ nombre, precio });
            total += precio;
            document.getElementById('total-display').innerText = total.toFixed(2) + "€";
        }

        function confirmarPedido() {
            if (carrito.length === 0) return alert("¡Añade algo a la comanda!");
            
            const txt = `¿Confirmas el envío de la comanda de la Mesa ${mesaParam}?\nTotal: ${total.toFixed(2)}€`;
            if (confirm(txt)) {
                enviarPedido();
            }
        }

        function enviarPedido() {
            const ref = database.ref('pedidos').push();
            ref.set({
                mesa: mesaParam,
                productos: carrito,
                total: total,
                estado: "pendiente",
                hora: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
            })
            .then(() => {
                alert("¡Comanda enviada con éxito! Marchando...");
                carrito = [];
                total = 0;
                document.getElementById('total-display').innerText = "0.00€";
            })
            .catch(() => alert("Error al conectar con cocina."));
        }
    </script>
</body>
</html>
