<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar El Pelotazo - Sistema Pro</title>
    <!-- Firebase SDK Legacy (Más estable para HTML directo) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --azul: #001f3f; --rojo: #e11d48; }
        body { background-color: #f8fafc; font-family: 'sans-serif'; padding-bottom: 180px; }
        .header-pelotazo { background-color: var(--azul); border-bottom: 4px solid var(--rojo); }
        .categoria-btn { background-color: var(--azul); transition: all 0.3s; }
        .categoria-btn:active { transform: scale(0.98); }
        .producto-card { transition: transform 0.2s; border: 1px solid #e2e8f0; }
        .producto-card:active { transform: scale(0.98); }
        .admin-panel { border: 2px solid #22c55e; }
        .comanda-card { border-left: 8px solid var(--rojo); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        /* Animación para nuevos pedidos */
        .nuevo-pedido { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { background-color: #fff; } 50% { background-color: #fef3c7; } 100% { background-color: #fff; } }
    </style>
</head>
<body>

    <!-- CABECERA -->
    <header class="header-pelotazo text-white p-6 flex flex-col items-center shadow-2xl">
        <div onclick="intentarAdmin()" class="cursor-pointer">
            <img src="logo%20pelotazo%20png.png" alt="Logo" class="w-24 h-24 rounded-full border-2 border-white bg-white p-1 shadow-lg">
        </div>
        <h1 class="mt-4 text-3xl font-black italic tracking-tighter uppercase">BAR EL PELOTAZO</h1>
        <div id="mesa-tag" class="mt-4 bg-white text-[#001f3f] px-8 py-2 rounded shadow-xl border-l-8 border-[#001f3f]">
            <span class="font-bold uppercase text-xs block text-center">Mesa</span>
            <span id="num-mesa-display" class="text-3xl font-black block text-center">--</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- PANEL DE ADMINISTRACIÓN (OCULTO POR DEFECTO) -->
        <div id="panel-admin" class="hidden space-y-6">
            <div class="bg-white p-4 rounded-2xl shadow-xl admin-panel">
                <h2 class="font-black text-green-700 mb-4 flex items-center gap-2"><i class="fas fa-plus-circle"></i> NUEVO ARTÍCULO</h2>
                <div class="space-y-3">
                    <input type="text" id="new-nombre" placeholder="Nombre del plato" class="w-full p-3 border rounded-xl">
                    <div class="flex gap-2">
                        <input type="number" id="new-precio" placeholder="Precio" class="w-1/2 p-3 border rounded-xl">
                        <select id="new-cat" class="w-1/2 p-3 border rounded-xl bg-white">
                            <option>Raciones</option>
                            <option>Bebidas</option>
                            <option>Tapas</option>
                            <option>Bocadillos</option>
                        </select>
                    </div>
                    <label class="flex items-center gap-2 p-3 bg-gray-50 rounded-xl cursor-pointer font-bold text-sm">
                        <input type="checkbox" id="new-cocina" class="w-5 h-5"> ¿ENVIAR A COCINA?
                    </label>
                    <button onclick="crearProducto()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-lg">GUARDAR EN CARTA</button>
                </div>
            </div>

            <div class="bg-[#001f3f] p-4 rounded-2xl shadow-xl">
                <h2 class="font-black text-white mb-4 flex items-center gap-2"><i class="fas fa-bell"></i> COMANDAS RECIBIDAS</h2>
                <div id="lista-pedidos" class="space-y-4">
                    <!-- Pedidos en vivo -->
                </div>
            </div>
            <hr class="border-2 border-dashed">
            <h2 class="font-black text-center text-gray-400">EDITAR CARTA ACTUAL</h2>
        </div>

        <!-- CATEGORÍAS (PESTAÑAS DESPLEGABLES) -->
        <div id="contenedor-menu" class="space-y-3">
            <!-- RACIONES -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                <button onclick="toggleCat('Raciones')" class="categoria-btn w-full flex justify-between items-center p-4 text-white font-bold uppercase text-xs tracking-widest">
                    <span>Raciones</span>
                    <i id="icon-Raciones" class="fas fa-chevron-down"></i>
                </button>
                <div id="cat-Raciones" class="hidden p-2 space-y-2"></div>
            </div>

            <!-- BEBIDAS -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                <button onclick="toggleCat('Bebidas')" class="categoria-btn w-full flex justify-between items-center p-4 text-white font-bold uppercase text-xs tracking-widest">
                    <span>Bebidas</span>
                    <i id="icon-Bebidas" class="fas fa-chevron-down"></i>
                </button>
                <div id="cat-Bebidas" class="hidden p-2 space-y-2"></div>
            </div>

            <!-- TAPAS -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                <button onclick="toggleCat('Tapas')" class="categoria-btn w-full flex justify-between items-center p-4 text-white font-bold uppercase text-xs tracking-widest">
                    <span>Tapas</span>
                    <i id="icon-Tapas" class="fas fa-chevron-down"></i>
                </button>
                <div id="cat-Tapas" class="hidden p-2 space-y-2"></div>
            </div>

            <!-- BOCADILLOS -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                <button onclick="toggleCat('Bocadillos')" class="categoria-btn w-full flex justify-between items-center p-4 text-white font-bold uppercase text-xs tracking-widest">
                    <span>Bocadillos</span>
                    <i id="icon-Bocadillos" class="fas fa-chevron-down"></i>
                </button>
                <div id="cat-Bocadillos" class="hidden p-2 space-y-2"></div>
            </div>
        </div>
    </main>

    <!-- FOOTER CLIENTE -->
    <footer id="footer-cliente" class="fixed bottom-0 w-full bg-white p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.15)] z-50 border-t-2 border-gray-100">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-end mb-4">
                <span class="text-gray-400 font-bold text-xs uppercase tracking-widest">Total Comanda</span>
                <span id="total-vocal" class="text-5xl font-black text-red-600 tracking-tighter">0.00<small class="text-xl">€</small></span>
            </div>
            <button onclick="lanzarPedido()" class="w-full bg-[#27ae60] text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">
                REALIZAR PEDIDO
            </button>
        </div>
    </footer>

    <script>
        // CONFIGURACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
            databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bar-el-pelotazo-16c19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let carrito = [];
        let productosData = {};
        let isAdmin = false;
        let clickCount = 0;
        let numMesa = new URLSearchParams(window.location.search).get('mesa') || "";
        const CLAVE_MAESTRA = "V887233R";

        // INICIO
        window.onload = () => {
            if(numMesa) document.getElementById('num-mesa-display').innerText = numMesa.toUpperCase();
            
            // Cargar Productos
            db.ref('productos').on('value', snap => {
                productosData = snap.val() || {};
                renderMenu();
            });

            // Sonido de aviso para pedidos (solo si es admin)
            db.ref('pedidos').limitToLast(1).on('child_added', snap => {
                if(isAdmin) {
                    reproducirCampana();
                }
                actualizarComandas();
            });
        };

        function reproducirCampana() {
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
            audio.play().catch(e => console.log("Sonido bloqueado"));
        }

        // RENDERIZAR MENÚ
        function renderMenu() {
            const cats = ["Raciones", "Bebidas", "Tapas", "Bocadillos"];
            cats.forEach(c => document.getElementById(`cat-${c}`).innerHTML = "");

            Object.entries(productosData).forEach(([id, p]) => {
                const container = document.getElementById(`cat-${p.categoria}`);
                if(!container) return;

                const card = document.createElement('div');
                card.className = `producto-card p-4 rounded-xl flex justify-between items-center ${!p.activo ? 'bg-gray-100 opacity-50' : 'bg-white'}`;
                
                // Si el cliente no es admin y el producto está inactivo, no se muestra
                if(!isAdmin && !p.activo) return;

                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="font-black uppercase text-sm">${p.nombre}</span>
                            ${p.esCocina ? '<i class="fas fa-utensils text-orange-500 text-xs"></i>' : ''}
                        </div>
                        <span class="text-red-600 font-black text-lg">${p.precio.toFixed(2)}€</span>
                    </div>
                    <div class="flex gap-1">
                        ${isAdmin ? `
                            <button onclick="toggleActivo('${id}', ${p.activo})" class="p-2 ${p.activo ? 'text-blue-600' : 'text-gray-400'}"><i class="fas ${p.activo ? 'fa-eye' : 'fa-eye-slash'}"></i></button>
                            <button onclick="toggleCocina('${id}', ${p.esCocina})" class="p-2 ${p.esCocina ? 'text-orange-600' : 'text-gray-300'}"><i class="fas fa-utensils"></i></button>
                            <button onclick="borrarProd('${id}')" class="p-2 text-red-600"><i class="fas fa-trash"></i></button>
                        ` : `
                            <button onclick="addCarrito('${id}')" class="bg-[#001f3f] text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg">
                                <i class="fas fa-plus"></i>
                            </button>
                        `}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // FUNCIONES CARRITO
        function addCarrito(id) {
            const p = productosData[id];
            carrito.push(p);
            const total = carrito.reduce((acc, item) => acc + item.precio, 0);
            document.getElementById('total-vocal').innerHTML = `${total.toFixed(2)}<small class="text-xl">€</small>`;
        }

        function lanzarPedido() {
            if(!numMesa) return alert("Por favor, escanea el QR de tu mesa");
            if(carrito.length === 0) return alert("Añade algún artículo");

            db.ref('pedidos').push({
                mesa: numMesa,
                items: carrito,
                total: carrito.reduce((a,b) => a+b.precio, 0),
                timestamp: Date.now()
            }).then(() => {
                alert("¡Pedido enviado! Suena la campana en barra.");
                carrito = [];
                document.getElementById('total-vocal').innerHTML = `0.00<small class="text-xl">€</small>`;
            });
        }

        // FUNCIONES ADMIN
        function intentarAdmin() {
            clickCount++;
            if(clickCount === 3) {
                const pass = prompt("ACCESO GERENCIA - CLAVE:");
                if(pass === CLAVE_MAESTRA) {
                    isAdmin = true;
                    document.getElementById('panel-admin').classList.remove('hidden');
                    document.getElementById('footer-cliente').classList.add('hidden');
                    renderMenu();
                    actualizarComandas();
                }
                clickCount = 0;
            }
            setTimeout(() => clickCount = 0, 3000);
        }

        function toggleCat(cat) {
            const div = document.getElementById(`cat-${cat}`);
            const icon = document.getElementById(`icon-${cat}`);
            div.classList.toggle('hidden');
            icon.classList.toggle('fa-chevron-down');
            icon.classList.toggle('fa-chevron-up');
        }

        function crearProducto() {
            const nombre = document.getElementById('new-nombre').value;
            const precio = parseFloat(document.getElementById('new-precio').value);
            const categoria = document.getElementById('new-cat').value;
            const esCocina = document.getElementById('new-cocina').checked;

            if(!nombre || !precio) return alert("Rellena nombre y precio");

            db.ref('productos').push({
                nombre, precio, categoria, esCocina, activo: true, admin_key: CLAVE_MAESTRA
            });
            
            document.getElementById('new-nombre').value = "";
            document.getElementById('new-precio').value = "";
        }

        function borrarProd(id) { if(confirm("¿Borrar?")) db.ref('productos').child(id).remove(); }
        function toggleActivo(id, val) { db.ref(`productos/${id}`).update({activo: !val}); }
        function toggleCocina(id, val) { db.ref(`productos/${id}`).update({esCocina: !val}); }

        function actualizarComandas() {
            if(!isAdmin) return;
            db.ref('pedidos').limitToLast(10).once('value', snap => {
                const peds = snap.val() || {};
                const cont = document.getElementById('lista-pedidos');
                cont.innerHTML = "";
                
                Object.values(peds).reverse().forEach(p => {
                    const div = document.createElement('div');
                    div.className = "bg-white text-black p-4 rounded-xl comanda-card";
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-black bg-yellow-400 px-3 py-1 rounded text-lg uppercase">MESA ${p.mesa}</span>
                            <span class="text-xs font-bold text-gray-400">${new Date(p.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div class="space-y-1 border-y border-dashed py-2 my-2 text-sm">
                            ${p.items.map(it => `
                                <div class="flex justify-between">
                                    <span>• ${it.nombre} ${it.esCocina ? '<span class="text-[9px] font-black text-orange-600">[COCINA]</span>' : ''}</span>
                                    <span class="font-bold">${it.precio.toFixed(2)}€</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="text-right font-black text-red-600 text-xl">TOTAL: ${p.total.toFixed(2)}€</div>
                    `;
                    cont.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
