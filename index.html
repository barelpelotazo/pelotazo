<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar App V8 Caja</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f0f2f5}
.card{background:white;padding:15px;margin:10px;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:10px}
.producto{background:white;border-radius:12px;padding:10px;text-align:center}
.producto button{background:#2563eb;color:white;width:100%}
.carrito{background:white;margin:10px;padding:10px;border-radius:12px}
.total{position:fixed;bottom:0;width:100%;background:#111;color:white;text-align:center;font-size:22px;padding:15px}
.pedido{background:white;margin:10px;padding:15px;border-radius:12px;border-left:8px solid #2563eb}
.hecho{background:#16a34a;color:white;width:100%}
.caja{background:#fff;margin:10px;padding:15px;border-radius:12px}
</style>
</head>

<body>
<div id="app"></div>

<script>
const params = new URLSearchParams(location.search);
const modo = params.get("modo") || "cliente";
const mesa = params.get("mesa") || "0";

const firebaseConfig = {
  apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
  authDomain: "bar-el-pelotazo-16c19.firebaseapp.com",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrito=[];
let camareros={};
let camareroActual=null;

// CLIENTE
if(modo==="cliente"){
  app.innerHTML=`<h2>Mesa ${mesa}</h2>
  <button onclick="location.href='?modo=camarero&mesa=${mesa}'">Entrar camarero</button>
  <div id="carta"></div>`;

  db.ref("carta").on("value", snap=>{
    let html="";
    Object.values(snap.val()||{}).forEach(p=>{
      html+=`<div class="card">${p.nombre}<br>${Number(p.precio||0).toFixed(2)}€</div>`;
    });
    carta.innerHTML=html;
  });
}

// CAMARERO
if(modo==="camarero"){
  app.innerHTML=`<h2>Mesa ${mesa}</h2>
  <input id="pin"><button onclick="login()">Entrar</button>
  <div id="panel"></div>`;

  db.ref("camareros").on("value", s=>camareros=s.val()||{});

  window.login=function(){
    const pin=pin.value;
    const c=Object.values(camareros).find(x=>x.pin===pin);
    if(!c){alert("PIN incorrecto");return;}
    camareroActual=c;

    panel.innerHTML=`
      <div id="carta" class="grid"></div>
      <div class="carrito" id="carrito"></div>
      <button onclick="enviar()">Enviar</button>
      <div class="total" id="total"></div>
    `;

    db.ref("carta").once("value", snap=>{
      let html="";
      Object.values(snap.val()||{}).forEach(p=>{
        html+=`<div class="producto">
        ${p.nombre}<br>${Number(p.precio||0).toFixed(2)}€
        <button onclick="add('${p.nombre}',${Number(p.precio||0)},${!!p.cocina})">+</button>
        </div>`;
      });
      carta.innerHTML=html;
    });
  }

  window.add=function(n,p,c){
    carrito.push({nombre:n,precio:p,cocina:c});
    render();
  }

  window.render=function(){
    let html="",total=0;
    carrito.forEach(p=>{total+=p.precio;html+=p.nombre+"<br>";});
    carrito.innerHTML=html;
    totalEl.innerText="TOTAL "+total.toFixed(2)+"€";
  }

  window.enviar=function(){
    db.ref("pedidos").push({
      mesa:mesa,
      camarero:camareroActual.nombre,
      items:carrito,
      timestamp:Date.now()
    });
    carrito=[];render();
  }
}

// CAJA
if(modo==="caja"){
  app.innerHTML=`<h2>CAJA</h2><div id="lista"></div>`;

  db.ref("pedidos").on("value", snap=>{
    let mesas={};

    Object.values(snap.val()||{}).forEach(p=>{
      if(!mesas[p.mesa]) mesas[p.mesa]=0;
      p.items.forEach(i=>{
        mesas[p.mesa]+=Number(i.precio||0);
      });
    });

    let html="";
    Object.entries(mesas).forEach(([m,total])=>{
      html+=`
      <div class="caja">
        Mesa ${m}<br>
        TOTAL: ${total.toFixed(2)}€
        <button onclick="cerrar('${m}')">Cerrar mesa</button>
      </div>`;
    });

    lista.innerHTML=html;
  });
}

// CERRAR MESA
window.cerrar=function(mesaCerrar){
  db.ref("pedidos").once("value", snap=>{
    const data=snap.val()||{};
    Object.entries(data).forEach(([id,p])=>{
      if(p.mesa==mesaCerrar){
        db.ref("pedidos/"+id).remove();
      }
    });
  });
}
</script>
</body>
</html>
