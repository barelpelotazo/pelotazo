<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- CABECERA -->
<div class="bg-blue-900 text-white text-center p-3">
<img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
<div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="bg-red-600 text-white text-center p-2 font-bold">
⚠️ Escanea el QR de tu mesa para hacer tu pedido
</div>

<div class="text-center p-2">
Mesa: <span id="mesa">--</span>
</div>

<!-- TOTAL MESA -->
<div class="text-center text-red-600 font-black text-xl">
Total mesa: <span id="totalMesa">0.00€</span>
</div>

<!-- CARTA -->
<div id="carta"></div>

<!-- TOTAL PEDIDO -->
<div class="fixed bottom-0 w-full bg-white p-3 border-t shadow-lg">
<div class="text-center text-gray-500 text-sm">Pedido actual</div>
<div id="total" class="text-3xl font-black text-center text-red-600">0.00€</div>

<button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-2 mt-2 rounded">
Enviar pedido
</button>

<!-- BOTÓN ADMIN -->
<div id="adminBtn" class="text-center text-[10px] text-gray-400 mt-2 cursor-pointer">
···
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-white z-50 overflow-auto">

<div class="flex bg-black text-white text-sm">
<button class="flex-1 p-2">Pedidos</button>
<button onclick="cerrarAdmin()" class="p-2">X</button>
</div>

<div id="pedidos" class="p-2"></div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
 databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// VARIABLES
let carrito=[];
let mesa=new URLSearchParams(location.search).get("mesa");

document.getElementById("mesa").innerText=mesa||"--";

let totalEl=document.getElementById("total");
let totalMesaEl=document.getElementById("totalMesa");

const categorias=[
"Tapas/Ración/Menú",
"Café/repostería/Postres",
"Bebidas/Refrescos",
"Tapas del día",
"Otros"
];

// 🔓 ADMIN BOTÓN (más fiable)
document.getElementById("adminBtn").addEventListener("click",()=>{
 let pass = prompt("Clave admin");
 if(pass==="1234"){
  document.getElementById("admin").classList.remove("hidden");
 }
});

function cerrarAdmin(){
 document.getElementById("admin").classList.add("hidden");
}

// 🔴 TOTAL MESA
db.ref("comandas").on("value",snap=>{
 let data=snap.val()||{};
 let total=0;

 Object.values(data).forEach(p=>{
  if(p.mesa==mesa){
   total+=Number(p.total);
  }
 });

 totalMesaEl.innerText=total.toFixed(2)+"€";
});

// CARTA
db.ref("carta").on("value",snap=>{
 let data=snap.val()||{};
 let html="";

 categorias.forEach(cat=>{
  let items=Object.values(data).filter(p=>p.categoria===cat && p.activo!==false);
  if(items.length===0) return;

  html+=`<div class="m-2 bg-white rounded shadow">
  <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-2 font-bold bg-gray-200 flex justify-between cursor-pointer">
  ${cat} <span>▼</span></div><div class="hidden">`;

  items.forEach(p=>{
   html+=`
   <div class="flex justify-between items-center p-3 border-b">
   <div class="font-bold">${p.nombre}</div>
   <div class="flex items-center gap-3">
   <span class="font-bold">${Number(p.precio).toFixed(2)}€</span>
   <button onclick="add('${p.nombre}',${p.precio})" class="bg-blue-600 text-white w-10 h-10 text-xl rounded">+</button>
   </div>
   </div>`;
  });

  html+=`</div></div>`;
 });

 carta.innerHTML=html;
});

// CARRITO
function add(n,p){
 carrito.push({nombre:n,precio:p});
 let total=carrito.reduce((a,b)=>a+Number(b.precio),0);
 totalEl.innerText=total.toFixed(2)+"€";
}

// ENVIAR
function enviarPedido(){
 if(!mesa) return alert("Escanea QR");
 if(!carrito.length) return;

 db.ref("comandas").push({
  mesa,
  items:carrito,
  total:carrito.reduce((a,b)=>a+Number(b.precio),0),
  camarero:""
 });

 carrito=[];
 totalEl.innerText="0.00€";

 alert("Pedido enviado correctamente");
}

// ADMIN PEDIDOS
db.ref("comandas").on("value",snap=>{
 let data=snap.val();
 let cont=document.getElementById("pedidos");
 cont.innerHTML="";
 if(!data) return;

 let mesas={};

 Object.keys(data).forEach(id=>{
  let p=data[id];
  if(!mesas[p.mesa]) mesas[p.mesa]=[];
  mesas[p.mesa].push({...p,id});
 });

 Object.keys(mesas).forEach(m=>{
  let totalMesa=mesas[m].reduce((a,b)=>a+b.total,0);

  cont.innerHTML+=`
  <div class="bg-white p-3 m-2 rounded shadow">
  <div class="font-bold text-lg">Mesa ${m}</div>
  <div class="text-red-600 font-black text-xl">${totalMesa.toFixed(2)}€</div>`;

  mesas[m].forEach(p=>{
   let lista=p.items.map(i=>`- ${i.nombre}`).join("<br>");

   cont.innerHTML+=`
   <div class="border p-2 mt-2 rounded">
   ${lista}

   <select onchange="db.ref('comandas/${p.id}/camarero').set(this.value)">
   <option value="">Camarero</option>
   <option>1</option><option>2</option><option>3</option>
   <option>4</option><option>5</option><option>6</option><option>7</option>
   </select>
   </div>`;
  });

  cont.innerHTML+=`
  <button onclick="cobrar('${m}')" class="bg-green-700 text-white w-full mt-2 p-2 rounded">
  COBRAR
  </button></div>`;
 });
});

// COBRAR
function cobrar(mesa){
 db.ref("comandas").once("value",snap=>{
  let data=snap.val();

  Object.keys(data).forEach(id=>{
   if(data[id].mesa==mesa){
    if(!data[id].camarero){
     alert("Selecciona camarero");
     return;
    }
    db.ref("comandas/"+id).remove();
   }
  });
 });
}
</script>

<footer class="text-center text-xs p-8 text-blue-600">
creación y diseño <a href="https://rodante.es" target="_blank">rodante</a>
</footer>

</body>
</html>
