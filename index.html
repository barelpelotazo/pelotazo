<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Café Bar El Pelotazo - Sistema Integral</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { 
            --azul-oscuro: #000a14; --azul-staff: #001f3f; --rojo: #ff0000;
            --verde: #27ae60; --gris-bg: #f8f9fa; --naranja: #f39c12;
            --cocina: #8e44ad; --texto: #1a1a1a; --sombra: 0 4px 12px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--gris-bg); padding-bottom: 50px; color: var(--texto); }
        
        /* Navegación */
        .staff-nav { display: flex; background: var(--azul-oscuro); position: sticky; top: 0; z-index: 1000; padding: 5px; gap: 3px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px 3px; border: none; background: rgba(255,255,255,0.1); color: white; border-radius: 5px; font-weight: bold; font-size: 0.65rem; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .tab-btn.active { background: var(--rojo); }

        .container { padding: 12px; max-width: 900px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Comandas */
        .selector-box { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px solid var(--azul-staff); box-shadow: var(--sombra); }
        .pedido-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 8px solid #ccc; box-shadow: var(--sombra); position: relative; }
        .pedido-card.estado-atendido { border-left-color: #3498db; }
        .pedido-card.estado-pendiente { border-left-color: var(--naranja); background: #fffdf5; }
        
        .cocina-status { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .status-ready { background: var(--verde); color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .item-line { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
        .item-cocina { color: var(--cocina); font-weight: bold; }
        .item-done { text-decoration: line-through; color: #bbb; }

        .badge-camarero { background: #e7f3ff; color: #004085; padding: 5px; border-radius: 5px; font-weight: 800; display: block; margin-bottom: 10px; text-align: center; font-size: 0.75rem; }
        
        .btn-accion { border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 0.7rem; text-transform: uppercase; flex: 1; }
        .btn-atender { background: var(--azul-staff); }
        .btn-cobrar-pend { background: var(--naranja); }
        .btn-finalizar { background: var(--verde); }
        .btn-cocina { background: var(--cocina); }

        /* Pantalla Cocina */
        .cocina-card { background: #2c3e50; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-top: 10px solid var(--cocina); }
        .cocina-item { font-size: 1.4rem; margin: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

        /* Caja y Editor */
        .caja-row { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; border: 1px solid #ddd; }
        .admin-section { background: white; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #ddd; }
        .admin-header { background: #f1f3f5; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; }
        
        .check-cocina { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; color: var(--cocina); font-weight: bold; }
    </style>
</head>
<body>

<div id="view-client">
    <div style="text-align:center; padding:50px;">
        <h2>Cargando Sistema...</h2>
        <button onclick="accesoStaff()" style="padding:15px 30px; background:var(--azul-oscuro); color:white; border:none; border-radius:10px; font-weight:bold;">ACCESO ADMINISTRACIÓN</button>
    </div>
</div>

<div id="staff-panel" style="display:none;">
    <div class="staff-nav">
        <button class="tab-btn active" onclick="switchTab('pedidos')">🔔 Comandas</button>
        <button class="tab-btn" onclick="switchTab('cocina')">🍳 Cocina</button>
        <button class="tab-btn" onclick="switchTab('caja')">💰 Caja</button>
        <button class="tab-btn" onclick="switchTab('admin')">⚙️ Carta</button>
        <button class="tab-btn" style="background:#444;" onclick="location.reload()">Salir</button>
    </div>

    <div class="container">
        <!-- PESTAÑA COMANDAS (CAMAREROS) -->
        <div id="tab-pedidos" class="tab-content active">
            <div class="selector-box">
                <select id="staff-identity" style="width:100%; padding:12px; font-weight:bold; border-radius:8px;">
                    <option value="">-- Identifícate Camarero --</option>
                    <option value="1">Camarero 1</option>
                    <option value="2">Camarero 2</option>
                    <option value="3">Camarero 3</option>
                    <option value="4">Camarero 4</option>
                    <option value="5">Camarero 5</option>
                    <option value="6">Camarero 6</option>
                    <option value="7">Camarero 7</option>
                </select>
            </div>
            <div id="lista-comandas"></div>
        </div>

        <!-- PESTAÑA SOLO COCINA (TABLET COCINA) -->
        <div id="tab-cocina" class="tab-content">
            <h2 style="text-align:center; color:var(--cocina);">PANEL DE ELABORACIÓN</h2>
            <div id="lista-cocina"></div>
        </div>

        <!-- PESTAÑA CIERRE DE CAJA -->
        <div id="tab-caja" class="tab-content">
            <h2 style="text-align:center;">Ventas por Camarero</h2>
            <div id="reporte-camareros"></div>
            <div id="total-global-caja" style="background:var(--azul-oscuro); color:white; padding:20px; border-radius:10px; text-align:center; font-size:1.5rem; font-weight:900; margin-top:20px;">Total: 0.00€</div>
            <button onclick="limpiarCaja()" style="width:100%; margin-top:20px; padding:15px; background:var(--rojo); color:white; border:none; border-radius:8px; font-weight:bold;">BORRAR HISTORIAL / NUEVO TURNO</button>
        </div>

        <!-- PESTAÑA EDICIÓN CARTA -->
        <div id="tab-admin" class="tab-content">
            <h3 style="margin-top:0;">Configurar Productos</h3>
            <p style="font-size:0.8rem; color:#666;">Marca <span style="color:var(--cocina);font-weight:bold;">C</span> para productos que deben ir a la tablet de cocina.</p>
            <div id="editor-carta"></div>
            <button onclick="guardarCarta()" style="position:fixed; bottom:20px; right:20px; width:70px; height:70px; border-radius:50%; background:var(--verde); color:white; border:none; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.3); z-index:1100;">GUARDAR</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
        databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "bar-el-pelotazo-16c19"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cartaLocal = [];
    const categorias = ["Tapas/Ración/Menú", "Café/repostería/Postres", "Bebidas/Refrescos", "Tapas del día", "Otros"];

    // 1. CARGAR CARTA
    db.ref('carta').on('value', snap => {
        cartaLocal = snap.val() || [];
        renderEditor();
    });

    function renderEditor() {
        const div = document.getElementById('editor-carta');
        div.innerHTML = "";
        categorias.forEach(cat => {
            let items = cartaLocal.filter(i => i.cat === cat);
            div.innerHTML += `
                <div class="admin-section">
                    <div class="admin-header"><span>${cat}</span> <button onclick="addProd('${cat}')">+</button></div>
                    <div style="padding:10px;">
                        ${items.map((p, idx) => `
                            <div style="display:flex; gap:5px; margin-bottom:10px; align-items:center; border-bottom:1px solid #eee; padding-bottom:5px;">
                                <input type="text" value="${p.nombre}" style="flex:2" onchange="updateProd('${p.nombre}','nombre',this.value)">
                                <input type="number" value="${p.price}" style="width:60px" onchange="updateProd('${p.nombre}','price',this.value)">
                                <label class="check-cocina">
                                    <input type="checkbox" ${p.esCocina ? 'checked' : ''} onchange="updateProd('${p.nombre}','esCocina',this.checked)"> C
                                </label>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        });
    }

    function addProd(cat) {
        const nom = prompt("Nombre del producto:");
        if(nom) {
            cartaLocal.push({nombre: nom, price: 1.5, cat: cat, esCocina: false});
            renderEditor();
        }
    }

    function updateProd(origNom, field, val) {
        const p = cartaLocal.find(i => i.nombre === origNom);
        if(p) p[field] = field === 'price' ? parseFloat(val) : val;
    }

    function guardarCarta() {
        db.ref('carta').set(cartaLocal).then(() => alert("Carta Actualizada"));
    }

    // 2. GESTIÓN DE PEDIDOS (VISTA CAMAREROS Y COCINA)
    db.ref('pedidos').on('value', snap => {
        const pedidos = snap.val() || {};
        renderComandas(pedidos);
        renderCocina(pedidos);
        renderCaja(pedidos);
    });

    function renderComandas(pedidos) {
        const div = document.getElementById('lista-comandas');
        div.innerHTML = "";
        
        Object.keys(pedidos).forEach(id => {
            const p = pedidos[id];
            if (p.estado === 'cobrado') return;

            const totalPedido = p.items.reduce((acc, cur) => acc + cur.precio, 0);
            const comidaLista = p.cocinaListo === true;

            div.innerHTML += `
                <div class="pedido-card ${p.camarero ? (p.estado === 'pendiente' ? 'estado-pendiente' : 'estado-atendido') : ''}">
                    ${comidaLista ? '<div class="cocina-status status-ready">🍽️ ¡COMIDA LISTA!</div>' : ''}
                    ${p.camarero ? `<span class="badge-camarero">Atendido por: Camarero ${p.camarero}</span>` : ''}
                    <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px;">
                        <span>MESA ${p.mesa}</span>
                        <span>${totalPedido.toFixed(2)}€</span>
                    </div>
                    <div style="font-size:0.9rem; margin-bottom:15px;">
                        ${p.items.map(i => {
                            // Buscar si el producto es de cocina en la carta actual
                            const info = cartaLocal.find(c => c.nombre === i.nombre);
                            const esCocina = info ? info.esCocina : false;
                            return `<div class="item-line ${esCocina ? 'item-cocina' : ''}">
                                <span>${i.nombre}</span>
                                <span>${esCocina ? '👨‍🍳' : '🍺'}</span>
                            </div>`;
                        }).join('')}
                    </div>
                    <div style="display:flex; gap:5px;">
                        ${!p.camarero ? 
                            `<button class="btn-accion btn-atender" onclick="cambiarEstado('${id}', 'atendido')">ATENDER</button>` : 
                            (p.estado !== 'pendiente' ? 
                                `<button class="btn-accion btn-cobrar-pend" onclick="cambiarEstado('${id}', 'pendiente')">PEDIR CUENTA</button>` : 
                                `<button class="btn-accion btn-finalizar" onclick="cambiarEstado('${id}', 'cobrado')">COBRADO</button>`
                            )
                        }
                    </div>
                </div>`;
        });
    }

    function renderCocina(pedidos) {
        const div = document.getElementById('lista-cocina');
        div.innerHTML = "";
        
        Object.keys(pedidos).forEach(id => {
            const p = pedidos[id];
            // Solo mostrar en cocina si no está cobrado y tiene platos de cocina y no ha sido marcado como listo por cocina
            const platosCocina = p.items.filter(i => {
                const info = cartaLocal.find(c => c.nombre === i.nombre);
                return info && info.esCocina;
            });

            if (p.estado !== 'cobrado' && platosCocina.length > 0 && !p.cocinaListo) {
                div.innerHTML += `
                    <div class="cocina-card">
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid rgba(255,255,255,0.2); padding-bottom:10px;">
                            <span style="font-size:1.8rem; font-weight:900;">MESA ${p.mesa}</span>
                            <span style="font-size:1rem;">${p.hora}</span>
                        </div>
                        <div style="padding:15px 0;">
                            ${platosCocina.map(i => `<div class="cocina-item">● ${i.nombre}</div>`).join('')}
                        </div>
                        <button onclick="marcarCocinaListo('${id}')" style="width:100%; padding:20px; background:var(--verde); color:white; border:none; border-radius:10px; font-size:1.2rem; font-weight:bold; cursor:pointer;">
                            ✅ PLATO LISTO - AVISAR CAMARERO
                        </button>
                    </div>`;
            }
        });
        if(div.innerHTML === "") div.innerHTML = "<h3 style='text-align:center; color:#ccc; margin-top:50px;'>NO HAY PLATOS PENDIENTES</h3>";
    }

    function marcarCocinaListo(id) {
        db.ref('pedidos/' + id).update({ cocinaListo: true });
    }

    // 3. CAJA
    function renderCaja(pedidos) {
        const divReporte = document.getElementById('reporte-camareros');
        const divTotal = document.getElementById('total-global-caja');
        let totales = {};
        let granTotal = 0;

        Object.values(pedidos).forEach(p => {
            if (p.estado === 'cobrado' && p.camarero) {
                const monto = p.items.reduce((acc, cur) => acc + cur.precio, 0);
                totales[p.camarero] = (totales[p.camarero] || 0) + monto;
                granTotal += monto;
            }
        });

        divReporte.innerHTML = "";
        for (let i = 1; i <= 7; i++) {
            const suma = totales[i] || 0;
            divReporte.innerHTML += `
                <div class="caja-row">
                    <b>Camarero ${i}</b>
                    <span style="font-weight:900;">${suma.toFixed(2)}€</span>
                </div>`;
        }
        divTotal.innerText = `Total Caja: ${granTotal.toFixed(2)}€`;
    }

    function cambiarEstado(id, nuevoEstado) {
        const idStaff = document.getElementById('staff-identity').value;
        if (!idStaff && nuevoEstado === 'atendido') return alert("Por favor, selecciona tu número de camarero arriba");
        
        let updates = { estado: nuevoEstado };
        if (nuevoEstado === 'atendido') updates.camarero = idStaff;
        db.ref('pedidos/' + id).update(updates);
    }

    function limpiarCaja() {
        if(confirm("¿Seguro? Se borrarán todos los pedidos cobrados para el nuevo turno.")) {
            db.ref('pedidos').once('value', snap => {
                const data = snap.val();
                if(!data) return;
                Object.keys(data).forEach(key => {
                    if(data[key].estado === 'cobrado') db.ref('pedidos/' + key).remove();
                });
            });
        }
    }

    function accesoStaff() {
        const pass = prompt("CÓDIGO:");
        if(pass === "887233") {
            document.getElementById('view-client').style.display='none';
            document.getElementById('staff-panel').style.display='block';
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.innerText.toLowerCase().includes(tab.toLowerCase()));
        if(btn) btn.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }
</script>
</body>
</html>
