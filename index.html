<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentUid = null;
let authReady = false;
let adminAbiertoTrasLogin = false;

function iniciarSesionAnonima(){
  return auth.signInAnonymously().catch((error) => {
    console.error("Error login anónimo:", error);
  });
}

iniciarSesionAnonima();

auth.onAuthStateChanged((user) => {
  currentUid = user ? user.uid : null;
  authReady = !!user;

  if(adminAbiertoTrasLogin && currentUid){
    db.ref("admins/" + currentUid).once("value").then((snap) => {
      if(snap.val() === true){
        adminAbiertoTrasLogin = false;
        cerrarLoginAdmin();
        adminEl.classList.remove("hidden");
        cargarCartaAdmin();
      } else {
        adminAbiertoTrasLogin = false;
        mostrarErrorLoginAdmin("Usuario sin permisos de administración");
        auth.signOut().then(() => iniciarSesionAnonima());
      }
    }).catch(() => {
      adminAbiertoTrasLogin = false;
      mostrarErrorLoginAdmin("Error comprobando permisos");
    });
  }
});

// ELEMENTOS
const mesaEl = document.getElementById("mesa");
const totalEl = document.getElementById("total");
const totalMesaEl = document.getElementById("totalMesa");
const cartaEl = document.getElementById("carta");
const pedidosEl = document.getElementById("pedidos");
const cocinaTabEl = document.getElementById("cocinaTab");
const cartaTabEl = document.getElementById("cartaTab");
const cajaEl = document.getElementById("caja");
const adminEl = document.getElementById("admin");
const adminLoginModalEl = document.getElementById("adminLoginModal");
const adminEmailEl = document.getElementById("adminEmail");
const adminPasswordEl = document.getElementById("adminPassword");
const adminLoginErrorEl = document.getElementById("adminLoginError");

// VARIABLES
const paramsMesa = new URLSearchParams(window.location.search);
const mesaQR = paramsMesa.get("mesa");

if(mesaQR){
  localStorage.setItem("mesa", String(mesaQR));
}

let mesa = localStorage.getItem("mesa") || "";
let carrito = [];
let totalMesaPendiente = 0;
let cartaCache = {};
let ultimoConteoComandas = 0;
let audioHabilitado = false;
let idsAnteriores = [];

function actualizarMesaVisual(){
  mesaEl.textContent = mesa ? String(mesa) : "--";
}

function calcularTotalCarrito(){
  return carrito.reduce((a,b)=>a+Number(b.precio || 0),0);
}

function actualizarTotalesVisuales(){
  totalMesaEl.innerText = totalMesaPendiente.toFixed(2) + "€";
  const totalMostrar = carrito.length ? calcularTotalCarrito() : totalMesaPendiente;
  totalEl.innerText = totalMostrar.toFixed(2) + "€";
}

function limpiarMesaGuardada(){
  localStorage.removeItem("mesa");
  mesa = "";
  actualizarMesaVisual();
actualizarTotalesVisuales();
}

actualizarMesaVisual();

const categorias = [
  "Tapas/Ración/Menú",
  "Café/repostería/Postres",
  "Bebidas/Refrescos",
  "Tapas del día",
  "Otros"
];

const coloresCategoria = {
  "Tapas/Ración/Menú": {
    caja: "bg-red-50 border-red-200",
    cabecera: "bg-red-100 text-red-800"
  },
  "Café/repostería/Postres": {
    caja: "bg-amber-50 border-amber-200",
    cabecera: "bg-amber-100 text-amber-800"
  },
  "Bebidas/Refrescos": {
    caja: "bg-blue-50 border-blue-200",
    cabecera: "bg-blue-100 text-blue-800"
  },
  "Tapas del día": {
    caja: "bg-green-50 border-green-200",
    cabecera: "bg-green-100 text-green-800"
  },
  "Otros": {
    caja: "bg-purple-50 border-purple-200",
    cabecera: "bg-purple-100 text-purple-800"
  }
};

// AUDIO
document.addEventListener("click", activarAudio, { once: true });
document.addEventListener("touchstart", activarAudio, { once: true });

function activarAudio(){
  audioHabilitado = true;
}

function sonarPedido(){
  if(!audioHabilitado) return;

  try{
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if(!AudioContextClass) return;

    const ctx = new AudioContextClass();
    const tiempos = [0, 0.18, 0.36, 0.54];
    const frecuencias = [900, 1200, 1500, 1200];

    tiempos.forEach((t, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "square";
      osc.frequency.value = frecuencias[i];

      gain.gain.setValueAtTime(0.001, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.75, ctx.currentTime + t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.14);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.16);
    });
  }catch(e){}
}

// ADMIN
function abrirAdmin(){
  if(!authReady){
    alert("Esperando conexión segura...");
    return;
  }

  db.ref("admins/" + currentUid).once("value")
    .then((snap) => {
      if(snap.val() === true){
        adminEl.classList.remove("hidden");
        cargarCartaAdmin();
      } else {
        abrirLoginAdmin();
      }
    })
    .catch(() => {
      alert("Error comprobando permisos");
    });
}

function cerrarAdmin(){
  adminEl.classList.add("hidden");
}

function abrirLoginAdmin(){
  adminLoginModalEl.classList.remove("hidden");
  adminLoginErrorEl.classList.add("hidden");
  adminLoginErrorEl.textContent = "";
  adminPasswordEl.value = "";
  adminEmailEl.value = "bar@pelotazo.es";
}

function cerrarLoginAdmin(){
  adminLoginModalEl.classList.add("hidden");
  adminLoginErrorEl.classList.add("hidden");
  adminLoginErrorEl.textContent = "";
}

function mostrarErrorLoginAdmin(texto){
  adminLoginErrorEl.textContent = texto;
  adminLoginErrorEl.classList.remove("hidden");
}

function loginAdmin(){
  const email = String(adminEmailEl.value || "").trim();
  const password = String(adminPasswordEl.value || "");

  if(!email || !password){
    mostrarErrorLoginAdmin("Introduce usuario y contraseña");
    return;
  }

  adminLoginErrorEl.classList.add("hidden");
  adminLoginErrorEl.textContent = "";
  adminAbiertoTrasLogin = true;

  auth.signInWithEmailAndPassword(email, password)
    .catch((error) => {
      adminAbiertoTrasLogin = false;
      let texto = "No se pudo iniciar sesión";
      if(error && error.code === "auth/wrong-password") texto = "Contraseña incorrecta";
      if(error && error.code === "auth/user-not-found") texto = "Usuario no encontrado";
      if(error && error.code === "auth/invalid-email") texto = "Usuario no válido";
      mostrarErrorLoginAdmin(texto);
    });
}

function logoutAdmin(){
  cerrarAdmin();
  auth.signOut().then(() => {
    iniciarSesionAnonima();
  });
}

function tab(t){
  pedidosEl.classList.add("hidden");
  cocinaTabEl.classList.add("hidden");
  cartaTabEl.classList.add("hidden");
  cajaEl.classList.add("hidden");
  document.getElementById(t).classList.remove("hidden");
}

// UTILS
function formatHora(timestamp, horaTexto){
  if(horaTexto) return horaTexto;
  if(!timestamp) return "--:--";

  const d = new Date(Number(timestamp));
  if(isNaN(d.getTime())) return "--:--";

  const h = String(d.getHours()).padStart(2,"0");
  const m = String(d.getMinutes()).padStart(2,"0");
  return h + ":" + m;
}

function esCocina(valor){
  return valor === true || valor === "true" || valor === 1 || valor === "1";
}

function productoMarcadoEnCarta(nombreProducto){
  return Object.values(cartaCache || {}).some(p =>
    String(p.nombre || "").trim().toLowerCase() === String(nombreProducto || "").trim().toLowerCase() &&
    esCocina(p.cocina)
  );
}

function itemVaACocina(item){
  return esCocina(item.cocina) || productoMarcadoEnCarta(item.nombre);
}

function pedidoTieneCocinaPendiente(pedido){
  return (pedido.items || []).some(item => {
    return itemVaACocina(item) && !esCocina(item.cocinaHecho);
  });
}

function pedidoListoParaServir(pedido){
  const items = pedido.items || [];
  const tieneItemsCocina = items.some(item => itemVaACocina(item));
  if(!tieneItemsCocina) return false;

  return items
    .filter(item => itemVaACocina(item))
    .every(item => esCocina(item.cocinaHecho));
}

function pedidoEntregado(pedido){
  return pedido.entregado === true || pedido.entregado === "true" || pedido.entregado === 1 || pedido.entregado === "1";
}

function claveFechaHoy(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dia = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dia}`;
}

// TOTAL MESA
db.ref("comandas").on("value", snap => {
  let total = 0;
  let data = snap.val() || {};

  Object.values(data).forEach(p => {
    if(String(p.mesa) === String(mesa)){
      total += Number(p.total || 0);
    }
  });

  totalMesaPendiente = total;
  actualizarTotalesVisuales();
});

// CLIENTE / CARTA
db.ref("carta").on("value", snap => {
  let data = snap.val() || {};
  cartaCache = data;
  let html = "";

  categorias.forEach(cat => {
    let items = Object.values(data).filter(p => p.categoria === cat && p.activo);
    if(!items.length) return;

    html += `
      <div class="m-2 bg-white shadow rounded overflow-hidden">
        <div onclick="this.nextElementSibling.classList.toggle('hidden')"
             class="p-3 bg-gray-200 font-bold flex justify-between text-lg cursor-pointer">
          ${cat}<span>▼</span>
        </div>
        <div class="hidden">
    `;

    items.forEach(p => {
      const nombreSeguro = String(p.nombre).replace(/'/g,"\\'");
      const precioSeguro = Number(p.precio || 0);
      const cocinaSeguro = esCocina(p.cocina) ? "true" : "false";

      html += `
        <div class="flex justify-between items-center p-3 border-b">
          <b class="text-lg">${p.nombre}</b>
          <div class="flex items-center gap-3">
            <span class="text-lg font-bold">${precioSeguro.toFixed(2)}€</span>
            <button onclick="add('${nombreSeguro}',${precioSeguro},${cocinaSeguro})"
                    class="bg-blue-600 text-white px-3 py-1 rounded text-lg leading-none font-bold min-w-[42px]">
              +
            </button>
          </div>
        </div>
      `;
    });

    html += `</div></div>`;
  });

  cartaEl.innerHTML = html;
});

// CARRITO
function add(n,p,cocina){
  carrito.push({
    nombre:n,
    precio:Number(p),
    cocina:esCocina(cocina),
    cocinaHecho:false
  });
  actualizarTotalesVisuales();
}

// ENVIAR
function enviarPedido(){
  if(!mesa){
    alert("Debes escanear el QR de la mesa");
    return;
  }

  if(!carrito.length){
    alert("Añade productos");
    return;
  }

  const ahora = new Date();
  const horaTexto =
    String(ahora.getHours()).padStart(2,"0") + ":" +
    String(ahora.getMinutes()).padStart(2,"0");

  db.ref("comandas").push({
    mesa: String(mesa),
    items: carrito,
    total: carrito.reduce((a,b)=>a+Number(b.precio),0),
    camarero: "",
    timestamp: firebase.database.ServerValue.TIMESTAMP,
    horaTexto: horaTexto,

  });

  carrito = [];
  actualizarTotalesVisuales();

// PEDIDOS
db.ref("comandas").on("value", snap => {
  let data = snap.val() || {};
  pedidosEl.innerHTML = "";

  const idsActuales = Object.keys(data);
  const nuevosIds = idsActuales.filter(id => !idsAnteriores.includes(id));

  if(ultimoConteoComandas !== 0 && idsActuales.length > ultimoConteoComandas){
    sonarPedido();
  }
  ultimoConteoComandas = idsActuales.length;

  let mesas = {};

  Object.keys(data).forEach(id => {
    let p = data[id];
    let m = String(p.mesa);

    if(!mesas[m]){
      mesas[m] = {
        total: 0,
        camarero: p.camarero || "",
        hora: Number(p.timestamp || 0),
        horaTexto: p.horaTexto || "",
        cocinaPendiente: false,
        tieneSinEntregar: false,
        comandas: []
      };
    }

    mesas[m].total += Number(p.total || 0);

    if(p.camarero){
      mesas[m].camarero = p.camarero;
    }

    if(Number(p.timestamp || 0) > Number(mesas[m].hora || 0)){
      mesas[m].hora = Number(p.timestamp || 0);
    }

    if(p.horaTexto){
      mesas[m].horaTexto = p.horaTexto;
    }

    const cocinaPendientePedido = pedidoTieneCocinaPendiente(p);
    const listoPedido = pedidoListoParaServir(p);
    const entregadoPedido = pedidoEntregado(p);

    if(cocinaPendientePedido){
      mesas[m].cocinaPendiente = true;
    }

    if(!entregadoPedido){
      mesas[m].tieneSinEntregar = true;
    }

    let productos = {};
    (p.items || []).forEach(i => {
      const esDeCocina = itemVaACocina(i);

      if(!productos[i.nombre]){
        productos[i.nombre] = {
          cantidad: 0,
          cocina: esDeCocina,
          cocinaHecho: esDeCocina ? esCocina(i.cocinaHecho) : false
        };
      }

      productos[i.nombre].cantidad += 1;
      if(esDeCocina && !esCocina(i.cocinaHecho)){
        productos[i.nombre].cocinaHecho = false;
      }
    });

    mesas[m].comandas.push({
      id: id,
      productos: productos,
      total: Number(p.total || 0),
      hora: Number(p.timestamp || 0),
      horaTexto: p.horaTexto || "",
      nuevo: nuevosIds.includes(id),
      cocinaPendiente: cocinaPendientePedido,
      listo: listoPedido,
      entregado: entregadoPedido
    });
  });

  Object.keys(mesas).forEach(m => {
    mesas[m].comandas.sort((a,b) => Number(a.hora || 0) - Number(b.hora || 0));

    const borde = mesas[m].cocinaPendiente ? "border-2 border-orange-500" : "border";
    const etiquetaCocina = mesas[m].cocinaPendiente
      ? `<div class="mt-2 inline-block bg-orange-100 text-orange-700 px-2 py-1 rounded text-sm font-bold">COCINA PENDIENTE</div>`
      : "";

    const detalleComandas = mesas[m].comandas.map(c => {
      let estadoHtml = "";
      if(c.entregado){
        estadoHtml = `<div class="mt-2 inline-block bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">ENTREGADO</div>`;
      } else if(c.listo){
        estadoHtml = `<div class="mt-2 inline-block bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">LISTO PARA SERVIR</div>`;
      } else if(c.cocinaPendiente){
        estadoHtml = `<div class="mt-2 inline-block bg-orange-100 text-orange-700 px-2 py-1 rounded text-xs font-bold">Cocina pendiente</div>`;
      }

      const botonEntregado = c.entregado
        ? ""
        : `<button onclick="marcarEntregado('${c.id}')" class="w-full mt-3 bg-emerald-600 text-white p-2 rounded text-sm font-bold">ENTREGADO</button>`;

      return `
      <div class="mt-3 border rounded-lg p-3 ${c.nuevo ? 'flash bg-yellow-50 border-yellow-300' : 'bg-gray-50 border-gray-200'}">
        <div class="flex justify-between items-center gap-3">
          <span class="text-sm font-bold ${c.nuevo ? 'text-yellow-700' : 'text-gray-600'}">
            ${c.nuevo ? 'NUEVO PEDIDO' : 'Pedido'}
          </span>
          <span class="text-sm text-gray-500 font-semibold">Hora ${formatHora(c.hora, c.horaTexto)}</span>
        </div>

        ${estadoHtml}

        <div class="mt-2 text-base leading-7">
          ${Object.keys(c.productos).map(k => {
            const prod = c.productos[k];
            let etiqueta = '';
            if(prod.cocina){
              etiqueta = prod.cocinaHecho
                ? `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">LISTO</span>`
                : `<span class="bg-orange-100 text-orange-700 px-2 py-1 rounded text-xs font-bold">COCINA</span>`;
            } else {
              etiqueta = `<span class="bg-sky-100 text-sky-700 px-2 py-1 rounded text-xs font-bold">BARRA</span>`;
            }

            return `
              <div class="flex items-center justify-between gap-2 py-1">
                <div>
                  • <span class="font-semibold">${k}</span> x${prod.cantidad}
                </div>
                ${etiqueta}
              </div>
            `;
          }).join("")}
        </div>

        <div class="text-red-600 font-black text-lg mt-2">
          ${c.total.toFixed(2)}€
        </div>

        ${botonEntregado}
      </div>
      `;
    }).join("");

    pedidosEl.innerHTML += `
      <div class="p-4 m-3 rounded-xl bg-white shadow-md ${borde}">
        <div class="flex justify-between items-center gap-3">
          <b class="text-2xl">Mesa ${m}</b>
          <span class="text-base text-gray-500 font-semibold">Hora ${formatHora(mesas[m].hora, mesas[m].horaTexto)}</span>
        </div>

        ${etiquetaCocina}
        ${detalleComandas}

        <div class="text-red-600 font-black text-2xl mt-4">
          Total mesa: ${mesas[m].total.toFixed(2)}€
        </div>

        <select onchange="setCamarero('${m}',this.value)"
                class="w-full mt-3 p-3 border rounded bg-gray-50 text-lg">
          <option value="">Camarero</option>
          <option value="1" ${mesas[m].camarero==="1"?"selected":""}>1</option>
          <option value="2" ${mesas[m].camarero==="2"?"selected":""}>2</option>
          <option value="3" ${mesas[m].camarero==="3"?"selected":""}>3</option>
          <option value="4" ${mesas[m].camarero==="4"?"selected":""}>4</option>
          <option value="5" ${mesas[m].camarero==="5"?"selected":""}>5</option>
          <option value="6" ${mesas[m].camarero==="6"?"selected":""}>6</option>
          <option value="7" ${mesas[m].camarero==="7"?"selected":""}>7</option>
        </select>

        <button onclick="cobrar('${m}')"
                class="bg-green-600 text-white w-full mt-3 p-3 rounded shadow text-lg font-bold">
          COBRAR
        </button>
      </div>
    `;
  });

  if(!Object.keys(mesas).length){
    pedidosEl.innerHTML = `<div class="text-center text-gray-500 p-6 text-lg">No hay pedidos</div>`;
  }

  idsAnteriores = idsActuales;
  renderCocina(data);
});

// CAMARERO
function setCamarero(m,c){
  db.ref("comandas").once("value", snap => {
    let d = snap.val() || {};

    Object.keys(d).forEach(id => {
      if(String(d[id].mesa) === String(m)){
        db.ref("comandas/" + id + "/camarero").set(c);
      }
    });
  });
}

function marcarEntregado(id){
  db.ref("comandas/" + id + "/entregado").set(true);
}

// COBRAR
function cobrar(m){
  db.ref("comandas").once("value", snap => {
    let d = snap.val() || {};
    let tieneCamarero = false;
    let hayCocinaPendiente = false;
    let haySinEntregar = false;

    Object.values(d).forEach(p => {
      if(String(p.mesa) === String(m)){
        if(p.camarero) tieneCamarero = true;
        if(pedidoTieneCocinaPendiente(p)) hayCocinaPendiente = true;
        if(!pedidoEntregado(p)) haySinEntregar = true;
      }
    });

    if(!tieneCamarero){
      alert("Selecciona camarero antes de cobrar");
      return;
    }

    if(hayCocinaPendiente){
      alert("No puedes cobrar: hay productos pendientes en cocina");
      return;
    }

    if(haySinEntregar){
      alert("No puedes cobrar: hay pedidos sin entregar");
      return;
    }

    Object.keys(d).forEach(id => {
      if(String(d[id].mesa) === String(m)){
        db.ref("caja").push(d[id]);
        db.ref("comandas/" + id).remove();
      }
    });
  });
}

// COCINA
function renderCocina(data){
  let comandasCocina = [];

  Object.keys(data).forEach(idPedido => {
    let pedido = data[idPedido];
    let mesaPedido = String(pedido.mesa || "");
    let items = pedido.items || [];
    let pendientes = [];

    items.forEach((item, index) => {
      const vaACocina = itemVaACocina(item);
      const cocinaHecha = esCocina(item.cocinaHecho);

      if(vaACocina && !cocinaHecha){
        pendientes.push({
          indexItem: index,
          nombre: item.nombre || "Producto"
        });
      }
    });

    if(pendientes.length){
      comandasCocina.push({
        idPedido: idPedido,
        mesa: mesaPedido,
        hora: Number(pedido.timestamp || 0),
        horaTexto: pedido.horaTexto || "",
        pendientes: pendientes
      });
    }
  });

  comandasCocina.sort((a,b) => Number(a.hora || 0) - Number(b.hora || 0));

  let html = "";

  comandasCocina.forEach(comanda => {
    let agrupados = {};

    comanda.pendientes.forEach(i => {
      agrupados[i.nombre] = (agrupados[i.nombre] || 0) + 1;
    });

    html += `
      <div class="p-4 m-3 rounded-xl bg-white shadow-md border-2 border-orange-400">
        <div class="flex justify-between items-center gap-3 mb-3">
          <div class="text-orange-600 font-black text-2xl">Mesa ${comanda.mesa}</div>
          <span class="text-lg text-gray-500 font-semibold">Hora ${formatHora(comanda.hora, comanda.horaTexto)}</span>
        </div>

        <div class="mb-2 inline-block bg-orange-100 text-orange-700 px-2 py-1 rounded text-xs font-bold">
          Pedido ${comanda.idPedido.slice(-6).toUpperCase()}
        </div>

        <div class="text-xl leading-9">
          ${Object.keys(agrupados).map(k => `• <span class="font-semibold">${k}</span> x${agrupados[k]}`).join("<br>")}
        </div>

        <button onclick="marcarCocinaPedido('${comanda.idPedido}')"
                class="bg-orange-600 text-white w-full mt-4 p-3 rounded shadow text-lg font-bold">
          MARCAR COCINA HECHA
        </button>
      </div>
    `;
  });

  if(!html){
    html = `<div class="text-center text-gray-500 p-6 text-lg">No hay pedidos pendientes en cocina</div>`;
  }

  cocinaTabEl.innerHTML = html;
}

function marcarCocinaPedido(idPedido){
  db.ref("comandas/" + idPedido).once("value", snap => {
    let pedido = snap.val();
    if(!pedido) return;

    let updates = {};
    let cambios = 0;

    (pedido.items || []).forEach((item, index) => {
      const vaACocina = itemVaACocina(item);
      const cocinaHecha = esCocina(item.cocinaHecho);

      if(vaACocina && !cocinaHecha){
        updates["items/" + index + "/cocinaHecho"] = true;
        cambios++;
      }
    });

    if(!cambios) return;

    db.ref("comandas/" + idPedido).update(updates);
  });
}

// CAJA
db.ref("caja").on("value", snap => {
  let d = snap.val() || {};
  let total = 0;
  let cam = {};
  let tickets = {};

  Object.values(d).forEach(p => {
    total += Number(p.total || 0);
    let nombreCamarero = p.camarero || "Sin asignar";

    cam[nombreCamarero] = (cam[nombreCamarero] || 0) + Number(p.total || 0);

    if(!tickets[nombreCamarero]) tickets[nombreCamarero] = [];
    tickets[nombreCamarero].push({
      mesa: p.mesa,
      total: Number(p.total || 0),
      horaTexto: p.horaTexto || ""
    });
  });

  let html = `
    <div class="bg-white p-3 m-3 rounded-xl shadow">
      <b class="text-xl">Total: ${total.toFixed(2)}€</b><br><br>
  `;

  Object.keys(cam).forEach(c => {
    html += `
      <div class="border rounded-lg p-3 mb-3 bg-gray-50">
        <div class="font-black text-lg mb-2">Camarero ${c}: ${cam[c].toFixed(2)}€</div>
        <div class="text-sm leading-7">
          ${tickets[c].map(t => `• Mesa ${t.mesa} - ${t.total.toFixed(2)}€ ${t.horaTexto ? '- ' + t.horaTexto : ''}`).join("<br>")}
        </div>
      </div>
    `;
  });

  html += `
      <button onclick="borrarCaja()" class="w-full mt-4 bg-red-600 text-white p-3 rounded text-lg font-bold">
        BORRAR DÍA
      </button>
    </div>
  `;

  cajaEl.innerHTML = html;
});

function borrarCaja(){
  if(!confirm("¿Seguro que quieres borrar la caja del día?")) return;

  db.ref("caja").once("value", snap => {
    const data = snap.val() || {};
    const fecha = claveFechaHoy();

    db.ref("cierres/" + fecha).push({
      fecha: fecha,
      timestamp: Date.now(),
      caja: data
    }).then(() => {
      return db.ref("caja").remove();
    });
  });
}

// CARTA ADMIN
function cargarCartaAdmin(){
  db.ref("carta").on("value", snap => {
    let data = snap.val() || {};
    cartaCache = data;
    let html = "";

    categorias.forEach(cat => {
      const color = coloresCategoria[cat] || {
        caja: "bg-white border-gray-200",
        cabecera: "bg-gray-100 text-gray-800"
      };

      html += `
        <div class="${color.caja} p-3 m-3 rounded-xl shadow border">
          <div class="${color.cabecera} px-3 py-2 rounded-lg font-bold flex items-center justify-between">
            <span>${cat}</span>
            <button onclick="nuevo('${cat}')" class="ml-2 bg-green-500 text-white px-2 py-1 rounded text-xs">
              +
            </button>
          </div>
      `;

      Object.entries(data).forEach(([id,p]) => {
        if(p.categoria === cat){
          html += `
            <div class="mt-3 border rounded p-2 bg-white">
              <div class="flex items-center flex-wrap gap-2">
                <input class="border p-1 rounded flex-1 min-w-[140px] text-sm" value="${p.nombre}" onchange="editarNombre('${id}',this.value)">
                <input class="border p-1 rounded w-24 text-sm" type="number" value="${p.precio}" onchange="editarPrecio('${id}',this.value)">
              </div>

              <div class="flex flex-wrap gap-2 mt-2">
                <button onclick="toggle('${id}',${p.activo})" class="px-2 py-1 rounded text-xs ${p.activo ? 'bg-blue-600' : 'bg-gray-400'} text-white">
                  ${p.activo ? 'ON' : 'OFF'}
                </button>

                <button onclick="toggleCocina('${id}',${esCocina(p.cocina) ? 'true' : 'false'})" class="px-2 py-1 rounded text-xs ${esCocina(p.cocina) ? 'bg-orange-600' : 'bg-gray-400'} text-white">
                  ${esCocina(p.cocina) ? 'COCINA SI' : 'COCINA NO'}
                </button>

                <button onclick="borrar('${id}')" class="bg-red-600 text-white px-2 py-1 rounded text-xs">
                  X
                </button>
              </div>
            </div>
          `;
        }
      });

      html += `</div>`;
    });

    cartaTabEl.innerHTML = html;
  });
}

// CRUD CARTA
function editarNombre(id,n){
  db.ref("carta/" + id + "/nombre").set(n);
}

function editarPrecio(id,p){
  db.ref("carta/" + id + "/precio").set(Number(p));
}

function nuevo(cat){
  let n = prompt("Nombre");
  if(!n) return;

  let p = parseFloat(prompt("Precio"));
  if(isNaN(p)) p = 0;

  db.ref("carta").push({
    nombre:n,
    precio:p,
    categoria:cat,
    activo:true,
    cocina:false
  });
}

function toggle(id,a){
  db.ref("carta/" + id + "/activo").set(!a);
}

function toggleCocina(id,a){
  db.ref("carta/" + id + "/cocina").set(!a);
}

function borrar(id){
  db.ref("carta/" + id).remove();
}
</script>
