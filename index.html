<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com?v=20"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-blue-900 text-white text-center p-3">
<img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
<div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="text-center p-2">
Mesa: <span id="mesa">--</span>
</div>

<!-- CARTA CLIENTE -->
<div id="carta"></div>

<!-- TOTAL -->
<div class="fixed bottom-0 w-full bg-white p-3 border-t">
<div id="total" class="text-2xl text-red-600 text-center font-bold">0€</div>

<button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-2 mt-2 rounded">
Enviar pedido
</button>

<div onclick="abrirAdmin()" class="text-center text-xs mt-2 text-gray-400 cursor-pointer">
···
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-white z-50 overflow-auto">

<div class="flex bg-black text-white">
<button onclick="tab('pedidos')" class="flex-1 p-2">Pedidos</button>
<button onclick="tab('cartaTab')" class="flex-1 p-2">Carta</button>
<button onclick="cerrarAdmin()" class="p-2">X</button>
</div>

<div id="pedidos" class="p-2"></div>
<div id="cartaTab" class="p-2 hidden"></div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
 databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrito=[];
let mesa=new URLSearchParams(location.search).get("mesa");
document.getElementById("mesa").innerText=mesa||"--";

let totalEl=document.getElementById("total");

const categorias=[
"Tapas/Ración/Menú",
"Café/repostería/Postres",
"Bebidas/Refrescos",
"Tapas del día",
"Otros"
];

// ADMIN
function abrirAdmin(){
 let pass=prompt("Clave");
 if(pass==="1234"){
  document.getElementById("admin").classList.remove("hidden");
  cargarCartaAdmin();
 }
}

function cerrarAdmin(){
 document.getElementById("admin").classList.add("hidden");
}

function tab(t){
 pedidos.classList.add("hidden");
 cartaTab.classList.add("hidden");
 document.getElementById(t).classList.remove("hidden");
}

// CARTA CLIENTE
db.ref("carta").on("value",snap=>{
 let data=snap.val()||{};
 let html="";

 categorias.forEach(cat=>{
  let items=Object.entries(data).filter(([id,p])=>p.categoria===cat && p.activo);

  if(items.length===0) return;

  html+=`
  <div class="m-2 bg-white rounded shadow">
    <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-2 font-bold bg-gray-200 flex justify-between cursor-pointer">
      ${cat} <span>▼</span>
    </div>
    <div class="hidden">`;

  items.forEach(([id,p])=>{
    html+=`
    <div class="flex justify-between p-2 border-b">
      <b>${p.nombre}</b>
      <div>
        ${p.precio}€
        <button onclick="add('${p.nombre}',${p.precio})" class="bg-blue-600 text-white px-2 ml-2">+</button>
      </div>
    </div>`;
  });

  html+=`</div></div>`;
 });

 carta.innerHTML=html;
});

// CARRITO
function add(n,p){
 carrito.push({nombre:n,precio:p});
 totalEl.innerText=carrito.reduce((a,b)=>a+Number(b.precio),0)+"€";
}

// ENVIAR
function enviarPedido(){
 if(!mesa||!carrito.length) return;

 db.ref("comandas").push({
  mesa,
  items:carrito,
  total:carrito.reduce((a,b)=>a+Number(b.precio),0)
 });

 carrito=[];
 totalEl.innerText="0€";
}

// ADMIN CARTA
function cargarCartaAdmin(){
 db.ref("carta").on("value",snap=>{
  let data=snap.val()||{};
  let html="";

  categorias.forEach(cat=>{
    let items=Object.entries(data).filter(([id,p])=>p.categoria===cat);

    html+=`
    <div class="m-2 bg-white p-2 rounded shadow">
    <b>${cat}</b>

    <button onclick="nuevo('${cat}')" class="bg-green-600 text-white px-2 ml-2">+</button><br>`;

    items.forEach(([id,p])=>{
      html+=`
      ${p.nombre} (${p.precio}€)
      <button onclick="toggle('${id}',${p.activo})">👁️</button>
      <button onclick="borrar('${id}')">🗑️</button><br>`;
    });

    html+=`</div>`;
  });

  cartaTab.innerHTML=html;
 });
}

function nuevo(cat){
 let n=prompt("Nombre");
 let p=parseFloat(prompt("Precio"));
 db.ref("carta").push({nombre:n,precio:p,categoria:cat,activo:true});
}

function toggle(id,a){
 db.ref("carta/"+id+"/activo").set(!a);
}

function borrar(id){
 db.ref("carta/"+id).remove();
}

// PEDIDOS
db.ref("comandas").on("value",snap=>{
 let data=snap.val()||{};
 pedidos.innerHTML=JSON.stringify(data);
});
</script>

</body>
</html>
