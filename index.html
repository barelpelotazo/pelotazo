<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar El Pelotazo - Gestión Profesional</title>
    <!-- Firebase SDK Legacy -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --azul-bar: #001f3f;
            --rojo-vivo: #ff0000;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding-bottom: 260px; 
        }
        header {
            background-color: var(--azul-bar);
            color: white;
            padding: 20px 10px;
            text-align: center;
        }
        .cat-btn {
            width: 100%; text-align: left; padding: 18px; background: white;
            margin-bottom: 10px; border-radius: 8px; font-weight: 900;
            color: var(--azul-bar); border-left: 8px solid var(--azul-bar);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-transform: uppercase;
        }
        .cat-content { display: none; margin-bottom: 20px; }
        .item-row {
            background: white; margin: 4px 0; padding: 14px; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;
        }
        .btn-add { background-color: var(--azul-bar); color: white; width: 38px; height: 38px; border-radius: 8px; font-size: 1.4rem; font-weight: bold; }

        footer {
            position: fixed; bottom: 0; width: 100%; background: #fff;
            padding: 15px; border-top: 3px solid var(--azul-bar);
            box-sizing: border-box; z-index: 100;
        }
        #total-cuenta { font-size: 3.2rem; font-weight: 900; color: var(--rojo-vivo); text-align: center; }
        
        /* PANEL ADMIN */
        #panel-staff { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #eef2f7; z-index: 2000; overflow-y: auto; padding-bottom: 50px; }
        .tab-admin { flex: 1; padding: 12px 5px; text-align: center; font-size: 10px; font-weight: 900; text-transform: uppercase; background: #f1f5f9; border-radius: 4px; border-bottom: 3px solid transparent; }
        .tab-admin.active { background: white; border-bottom-color: var(--azul-bar); color: var(--azul-bar); }
        
        .badge-cocina { background: #fee2e2; color: #b91c1c; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; }
        .badge-barra { background: #dcfce7; color: #15803d; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="vista-cliente">
        <header>
            <img src="logo%20pelotazo%20png.png" alt="Logo" class="max-w-[80px] mx-auto mb-2 block">
            <h1 class="text-xl font-black uppercase tracking-widest">Bar El Pelotazo</h1>
        </header>

        <div id="aviso-qr" class="text-red-600 font-black text-center p-4 text-xs animate-pulse" style="display:none">
            ⚠️ ESCANEA EL QR DE TU MESA PARA PEDIR ⚠️
        </div>

        <div class="p-3">
            <div class="w-full p-4 bg-white rounded shadow border-l-8 border-blue-900 text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Mesa</p>
                <p id="mesa-val" class="text-blue-900 text-3xl font-black">--</p>
            </div>
        </div>

        <div id="carta-categorias" class="px-3 mt-2"></div>

        <footer>
            <div id="total-cuenta">0.00€</div>
            <button onclick="enviarPedido()" id="btn-pedido" class="w-full bg-green-600 text-white p-5 rounded-xl font-black uppercase text-lg shadow-lg">PEDIR AHORA</button>
            <div class="text-center mt-3 text-[10px] text-gray-500 border-t pt-2">
                Creación y diseño de <a href="https://rodante.es" target="_blank" class="font-bold text-blue-900 underline">rodante.es</a>
            </div>
            <div class="text-center mt-2">
                <span onclick="abrirAdmin()" class="text-[9px] text-gray-300 cursor-pointer italic">Acceso Administración</span>
            </div>
        </footer>
    </div>

    <!-- PANEL STAFF -->
    <div id="panel-staff">
        <div class="bg-blue-950 text-white p-4 flex justify-between items-center sticky top-0 z-50">
            <h2 class="font-black uppercase text-sm">Panel de Control</h2>
            <button class="bg-red-600 px-4 py-2 rounded font-bold text-xs" onclick="location.reload()">CERRAR</button>
        </div>
        
        <nav class="flex p-2 gap-1 bg-white shadow-sm sticky top-[56px] z-50 overflow-x-auto">
            <button class="tab-admin active" id="t-com" onclick="cambiarSeccion('pedidos', 'Comandas')">Comandas</button>
            <button class="tab-admin" id="t-coc" onclick="cambiarSeccion('pedidos', 'Cocina')">Cocina</button>
            <button class="tab-admin" id="t-bar" onclick="cambiarSeccion('pedidos', 'Barra')">Barra</button>
            <button class="tab-admin" id="t-dia" onclick="cambiarSeccion('dia')">Caja</button>
            <button class="tab-admin" id="t-edi" onclick="cambiarSeccion('editar')">Editar Carta</button>
        </nav>

        <div class="p-4">
            <div id="sec-pedidos">
                <div id="lista-pedidos-admin" class="space-y-4"></div>
            </div>

            <div id="sec-dia" style="display:none">
                <div class="bg-white p-8 rounded-xl shadow-lg text-center border-l-8 border-green-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">Caja de hoy</p>
                    <div id="caja-hoy" class="text-5xl font-black text-green-600">0.00€</div>
                </div>
            </div>

            <div id="sec-editar" style="display:none">
                <div class="mb-6 flex gap-2">
                    <input type="text" id="nueva-cat-nombre" placeholder="Nombre nueva categoría..." class="flex-1 p-3 border rounded-lg text-sm">
                    <button onclick="crearCategoria()" class="bg-blue-900 text-white px-4 rounded-lg font-bold text-xs">+ AÑADIR</button>
                </div>
                
                <div id="editor-categorias" class="space-y-6"></div>
                
                <button onclick="guardarCarta()" class="w-full mt-8 bg-green-600 text-white p-6 rounded-2xl font-black uppercase shadow-2xl sticky bottom-4">
                    🚀 PUBLICAR CAMBIOS EN LA WEB
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
            databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bar-el-pelotazo-16c19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let carrito = [];
        let mesa = null;
        let carta = [];
        let categorias = [];
        let filtroAdmin = 'Comandas';
        const CLAVE = "V887233R";

        function init() {
            const params = new URLSearchParams(window.location.search);
            mesa = params.get('mesa');
            if(mesa) {
                document.getElementById('mesa-val').innerText = mesa;
            } else {
                document.getElementById('mesa-val').innerText = "SIN MESA";
                document.getElementById('aviso-qr').style.display = 'block';
                document.getElementById('btn-pedido').style.opacity = '0.3';
            }
            cargarDatos();
        }

        function cargarDatos() {
            // Cargar Categorías
            db.ref('categorias').on('value', snap => {
                categorias = snap.val() || ["Tapas/Ración/Menú", "Café/repostería/Postres", "Bebidas/Refrescos", "Tapas del día", "Otros"];
                renderCarta();
                renderEditor();
            });
            // Cargar Productos
            db.ref('carta').on('value', snap => {
                carta = snap.val() || [];
                renderCarta();
                renderEditor();
            });
        }

        function renderCarta() {
            const container = document.getElementById('carta-categorias');
            container.innerHTML = "";
            categorias.forEach((cat, idx) => {
                const items = carta.filter(p => p && p.categoria === cat && p.activo !== false);
                if (items.length === 0) return;
                const cid = `c-${idx}`;
                container.innerHTML += `
                    <div class="mb-3">
                        <button class="cat-btn shadow-sm" onclick="document.getElementById('${cid}').style.display = (document.getElementById('${cid}').style.display=='block'?'none':'block')">
                            ${cat} <span class="text-[10px] opacity-30">▼</span>
                        </button>
                        <div id="${cid}" class="cat-content space-y-1">
                            ${items.map(p => `
                                <div class="item-row bg-white">
                                    <span class="font-bold text-gray-700 text-sm">${p.nombre}</span>
                                    <div class="flex items-center gap-3">
                                        <span class="font-black text-gray-900">${Number(p.precio).toFixed(2)}€</span>
                                        <button class="btn-add" onclick="agregar('${p.nombre}', ${p.precio}, '${p.destino || 'Barra'}')">+</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
        }

        function agregar(n, p, d) {
            carrito.push({nombre: n, precio: p, destino: d});
            const total = carrito.reduce((s, i) => s + i.precio, 0);
            document.getElementById('total-cuenta').innerText = total.toFixed(2) + "€";
        }

        function enviarPedido() {
            if(!mesa) return alert("Escanea el QR.");
            if(carrito.length === 0) return alert("Carrito vacío.");
            db.ref('pedidos').push({
                mesa, items: carrito, total: carrito.reduce((s,i)=>s+i.precio,0),
                hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                timestamp: Date.now()
            }).then(() => {
                alert("✅ ¡Pedido enviado!");
                carrito = [];
                document.getElementById('total-cuenta').innerText = "0.00€";
            });
        }

        // --- ADMINISTRACIÓN ---
        function abrirAdmin() {
            if(prompt("Clave:") === CLAVE) document.getElementById('panel-staff').style.display = 'block';
        }

        function cambiarSeccion(sec, filtro = 'Comandas') {
            filtroAdmin = filtro;
            document.getElementById('sec-pedidos').style.display = sec === 'pedidos' ? 'block' : 'none';
            document.getElementById('sec-dia').style.display = sec === 'dia' ? 'block' : 'none';
            document.getElementById('sec-editar').style.display = sec === 'editar' ? 'block' : 'none';
            
            document.querySelectorAll('.tab-admin').forEach(t => t.classList.remove('active'));
            if(filtro === 'Comandas') document.getElementById('t-com').classList.add('active');
            if(filtro === 'Cocina') document.getElementById('t-coc').classList.add('active');
            if(filtro === 'Barra') document.getElementById('t-bar').classList.add('active');
            if(sec === 'dia') document.getElementById('t-dia').classList.add('active');
            if(sec === 'editar') document.getElementById('t-edi').classList.add('active');
            
            if(sec === 'pedidos') actualizarPedidosAdmin();
        }

        function actualizarPedidosAdmin() {
            db.ref('pedidos').on('value', snap => {
                const div = document.getElementById('lista-pedidos-admin');
                div.innerHTML = "";
                let caja = 0;
                const data = snap.val();
                if(!data) return div.innerHTML = "<p class='text-center opacity-30 mt-10 font-bold uppercase'>Sin pedidos</p>";

                Object.keys(data).reverse().forEach(id => {
                    const p = data[id];
                    caja += Number(p.total);

                    // Filtrado por destino
                    let itemsFiltrados = p.items;
                    if(filtroAdmin === 'Cocina') itemsFiltrados = p.items.filter(i => i.destino === 'Cocina');
                    if(filtroAdmin === 'Barra') itemsFiltrados = p.items.filter(i => i.destino === 'Barra');

                    if(itemsFiltrados.length === 0) return;

                    div.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-md border-l-8 border-blue-900">
                            <div class="flex justify-between items-center mb-2 border-b pb-2">
                                <span class="font-black text-blue-950">MESA ${p.mesa}</span>
                                <span class="text-[10px] text-gray-400 font-bold">${p.hora}</span>
                            </div>
                            <div class="space-y-1 mb-4">
                                ${itemsFiltrados.map(i => `
                                    <div class="flex justify-between text-sm">
                                        <span>${i.nombre}</span>
                                        <span class="${i.destino==='Cocina'?'badge-cocina':'badge-barra'}">${i.destino || 'Barra'}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-black text-red-600">${Number(p.total).toFixed(2)}€</span>
                                <button onclick="finalizar('${id}')" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-[10px]">CERRAR</button>
                            </div>
                        </div>`;
                });
                document.getElementById('caja-hoy').innerText = caja.toFixed(2) + "€";
            });
        }

        function finalizar(id) { db.ref('pedidos/'+id).remove(); }

        // --- EDITOR DE CARTA ---
        function renderEditor() {
            const div = document.getElementById('editor-categorias');
            div.innerHTML = "";
            categorias.forEach((cat, cIdx) => {
                const items = carta.filter(p => p && p.categoria === cat);
                div.innerHTML += `
                    <div class="bg-white rounded-xl shadow border overflow-hidden">
                        <div class="bg-blue-900 p-3 flex justify-between items-center">
                            <input type="text" value="${cat}" class="bg-transparent text-white font-black text-xs uppercase outline-none" onchange="renombrarCat(${cIdx}, this.value)">
                            <div class="flex gap-2">
                                <button onclick="nuevoProd('${cat}')" class="bg-white text-blue-900 text-[9px] px-2 py-1 rounded font-bold">+ ITEM</button>
                                <button onclick="borrarCat(${cIdx})" class="text-white opacity-50 text-xs">🗑️</button>
                            </div>
                        </div>
                        <div class="p-2 space-y-2">
                            ${items.map(p => {
                                const i = carta.indexOf(p);
                                return `
                                <div class="p-3 bg-gray-50 rounded-lg border text-xs space-y-2">
                                    <input type="text" value="${p.nombre}" onchange="updProd(${i},'nombre',this.value)" class="w-full p-2 border rounded font-bold">
                                    <div class="flex gap-2 items-center">
                                        <input type="number" step="0.1" value="${p.precio}" onchange="updProd(${i},'precio',this.value)" class="w-20 p-2 border rounded font-black">
                                        <select onchange="updProd(${i},'destino',this.value)" class="flex-1 p-2 border rounded font-bold ${p.destino==='Cocina'?'text-red-600':'text-green-600'}">
                                            <option value="Barra" ${p.destino==='Barra'?'selected':''}>BARRA</option>
                                            <option value="Cocina" ${p.destino==='Cocina'?'selected':''}>COCINA</option>
                                        </select>
                                        <button onclick="borrarProd(${i})" class="text-red-600 px-2">🗑️</button>
                                    </div>
                                    <label class="flex items-center gap-2 text-[10px] font-bold">
                                        <input type="checkbox" ${p.activo!==false?'checked':''} onchange="updProd(${i},'activo',this.checked)"> VISIBLE EN CARTA
                                    </label>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            });
        }

        function crearCategoria() {
            const n = document.getElementById('nueva-cat-nombre').value;
            if(n) { categorias.push(n); document.getElementById('nueva-cat-nombre').value=""; renderEditor(); }
        }
        function renombrarCat(i, v) { 
            const viejo = categorias[i];
            categorias[i] = v;
            carta.forEach(p => { if(p.categoria === viejo) p.categoria = v; });
            renderEditor(); 
        }
        function borrarCat(i) { if(confirm("¿Borrar categoría y todos sus productos?")) { categorias.splice(i,1); renderEditor(); } }
        
        function nuevoProd(cat) { carta.push({nombre:"Nuevo Producto", precio:0, categoria:cat, activo:true, destino:"Barra"}); renderEditor(); }
        function updProd(i, c, v) { if(c==='precio') v=parseFloat(v); carta[i][c]=v; }
        function borrarProd(i) { carta.splice(i,1); renderEditor(); }

        function guardarCarta() {
            db.ref('categorias').set(categorias);
            db.ref('carta').set(carta.filter(p=>p!=null)).then(() => alert("✅ ¡CARTA PUBLICADA CON ÉXITO!"));
        }

        window.onload = init;
    </script>
</body>
</html>
