<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar El Pelotazo - Carta Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .category-card { transition: all 0.3s ease; }
        .category-card:active { transform: scale(0.98); }
        .disabled-btn { background-color: #9ca3af !important; cursor: not-allowed; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <!-- Header -->
    <header class="bg-red-600 text-white p-6 shadow-lg text-center">
        <h1 class="text-3xl font-bold italic">BAR EL PELOTAZO</h1>
        <p class="text-sm opacity-90 mt-1" id="status-mesa">Escanea el QR de tu mesa para pedir</p>
    </header>

    <!-- Selector de Mesa (Bloqueado por defecto) -->
    <div class="max-w-md mx-auto mt-4 px-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between">
            <span class="font-bold text-slate-700">Mesa:</span>
            <select id="numero-mesa" class="bg-slate-100 border-none rounded-lg p-2 font-bold text-red-600 focus:ring-2 focus:ring-red-500">
                <option value="">Seleccionar...</option>
                <option value="1">Mesa 1</option>
                <option value="2">Mesa 2</option>
                <option value="3">Mesa 3</option>
                <option value="4">Mesa 4</option>
                <option value="5">Mesa 5</option>
                <option value="6">Mesa 6</option>
                <option value="7">Mesa 7</option>
                <option value="8">Mesa 8</option>
                <option value="9">Mesa 9</option>
                <option value="10">Mesa 10</option>
            </select>
        </div>
    </div>

    <!-- Menú de Productos -->
    <main class="max-w-md mx-auto p-4 space-y-6">
        <!-- Sección Bebidas -->
        <section>
            <h2 class="text-xl font-bold text-slate-800 mb-3 border-b-2 border-red-500 pb-1">Refrescos y Cervezas</h2>
            <div class="space-y-3">
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-slate-100">
                    <div>
                        <h3 class="font-bold">Caña de Cerveza</h3>
                        <p class="text-slate-500 text-sm">1.50€</p>
                    </div>
                    <button onclick="agregarAlCarrito('Caña', 1.50)" class="bg-red-500 text-white w-10 h-10 rounded-full font-bold shadow-md active:bg-red-700">+</button>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-slate-100">
                    <div>
                        <h3 class="font-bold">Refresco 33cl</h3>
                        <p class="text-slate-500 text-sm">2.00€</p>
                    </div>
                    <button onclick="agregarAlCarrito('Refresco', 2.00)" class="bg-red-500 text-white w-10 h-10 rounded-full font-bold shadow-md active:bg-red-700">+</button>
                </div>
            </div>
        </section>

        <!-- Sección Raciones -->
        <section>
            <h2 class="text-xl font-bold text-slate-800 mb-3 border-b-2 border-red-500 pb-1">Raciones y Tapas</h2>
            <div class="space-y-3">
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-slate-100">
                    <div>
                        <h3 class="font-bold">Patatas Bravas</h3>
                        <p class="text-slate-500 text-sm">5.00€</p>
                    </div>
                    <button onclick="agregarAlCarrito('Bravas', 5.00)" class="bg-red-500 text-white w-10 h-10 rounded-full font-bold shadow-md active:bg-red-700">+</button>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-slate-100">
                    <div>
                        <h3 class="font-bold">Tortilla de Patatas</h3>
                        <p class="text-slate-500 text-sm">3.50€</p>
                    </div>
                    <button onclick="agregarAlCarrito('Tortilla', 3.50)" class="bg-red-500 text-white w-10 h-10 rounded-full font-bold shadow-md active:bg-red-700">+</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Barra Inferior de Pedido -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="text-slate-800">
                <p class="text-xs uppercase font-bold text-slate-400">Total a pagar</p>
                <p class="text-2xl font-black text-red-600" id="total-display">0.00€</p>
            </div>
            <button id="enviar-pedido" onclick="confirmarPedido()" class="bg-red-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-red-200 active:scale-95 transition-all">
                PEDIR AHORA
            </button>
        </div>
    </footer>

    <script>
        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- LÓGICA DE SEGURIDAD QR Y MESA ---
        const urlParams = new URLSearchParams(window.location.search);
        const mesaDetectada = urlParams.get('mesa');
        const selectorMesa = document.getElementById('numero-mesa');
        const btnEnviar = document.getElementById('enviar-pedido');
        const statusMesaText = document.getElementById('status-mesa');

        let pedidoActual = [];
        let total = 0;

        // Al cargar, validamos si viene de un QR
        window.onload = () => {
            if (mesaDetectada && mesaDetectada > 0 && mesaDetectada <= 10) {
                selectorMesa.value = mesaDetectada;
                selectorMesa.disabled = true; // El cliente no puede cambiar la mesa
                statusMesaText.innerText = "Pidiendo desde Mesa " + mesaDetectada;
                statusMesaText.classList.add('text-green-300', 'font-bold');
            } else {
                // Bloqueo de seguridad si no hay mesa en URL
                btnEnviar.disabled = true;
                btnEnviar.classList.add('disabled-btn');
                btnEnviar.innerText = "ESCANEA TU QR";
                selectorMesa.disabled = true;
                statusMesaText.innerText = "⚠️ DEBES ESCANEAR EL QR DE TU MESA";
                statusMesaText.classList.add('text-yellow-300');
            }
        };

        function agregarAlCarrito(nombre, precio) {
            pedidoActual.push({ nombre, precio });
            total += precio;
            document.getElementById('total-display').innerText = total.toFixed(2) + "€";
        }

        function confirmarPedido() {
            if (pedidoActual.length === 0) {
                alert("El carrito está vacío.");
                return;
            }

            const confirmacion = confirm(`¿Enviar pedido a cocina por ${total.toFixed(2)}€?`);
            
            if (confirmacion) {
                enviarPedidoAFirebase();
            }
        }

        function enviarPedidoAFirebase() {
            const nuevoPedidoRef = database.ref('pedidos').push();
            nuevoPedidoRef.set({
                mesa: mesaDetectada,
                productos: pedidoActual,
                total: total,
                estado: "pendiente",
                hora: new Date().toLocaleTimeString()
            })
            .then(() => {
                alert("¡Pedido enviado! En breve te lo serviremos.");
                pedidoActual = [];
                total = 0;
                document.getElementById('total-display').innerText = "0.00€";
            })
            .catch((error) => {
                alert("Error al enviar el pedido. Por favor, avisa al camarero.");
                console.error(error);
            });
        }
    </script>
</body>
</html>
