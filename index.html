<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar El Pelotazo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com?v=60"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-blue-900 text-white text-center p-3">
<img src="logo pelotazo png.png" class="mx-auto mb-2" style="max-height:60px;">
<div class="font-black text-lg">Bar El Pelotazo</div>
</div>

<div class="bg-red-600 text-white text-center p-2 font-bold">
Escanea el QR de tu mesa para hacer tu pedido
</div>

<div class="text-center p-2">
Mesa: <span id="mesa">--</span>
</div>

<!-- TOTAL MESA -->
<div class="text-center text-red-600 font-bold">
Total mesa: <span id="totalMesa">0.00€</span>
</div>

<!-- CARTA -->
<div id="carta"></div>

<!-- TOTAL PEDIDO -->
<div class="fixed bottom-0 w-full bg-white p-3 border-t">
<div id="total" class="text-3xl text-red-600 text-center font-bold">0.00€</div>

<button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-2 mt-2 rounded">
Enviar pedido
</button>

<div onclick="abrirAdmin()" class="text-center text-xs text-gray-400 mt-2 cursor-pointer">
···
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed top-0 left-0 w-full h-full bg-white z-50 overflow-auto">

<div class="flex bg-black text-white">
<button class="flex-1 p-2">Pedidos</button>
<button onclick="cerrarAdmin()" class="p-2">X</button>
</div>

<div id="pedidos" class="p-2"></div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
 databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "bar-el-pelotazo-16c19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// VARIABLES
let carrito=[];
let mesa=new URLSearchParams(location.search).get("mesa");

document.getElementById("mesa").innerText=mesa||"--";

let totalEl=document.getElementById("total");
let totalMesaEl=document.getElementById("totalMesa");

// ADMIN
function abrirAdmin(){
 let pass=prompt("Clave");
 if(pass==="1234"){
  document.getElementById("admin").classList.remove("hidden");
 }
}

function cerrarAdmin(){
 document.getElementById("admin").classList.add("hidden");
}

// TOTAL MESA
db.ref("comandas").on("value",snap=>{
 let data=snap.val()||{};
 let total=0;

 Object.values(data).forEach(p=>{
  if(p.mesa==mesa){
   total+=Number(p.total);
  }
 });

 totalMesaEl.innerText=total.toFixed(2)+"€";
});

// CARTA (ARREGLADA)
db.ref("carta").on("value",snap=>{
 let data=snap.val()||{};
 let html="";

 const categorias=[
 "Tapas/Ración/Menú",
 "Café/repostería/Postres",
 "Bebidas/Refrescos",
 "Tapas del día",
 "Otros"
 ];

 categorias.forEach(cat=>{
  let items=Object.values(data).filter(p=>p.categoria===cat && p.activo!==false);

  if(items.length===0) return;

  html+=`
  <div class="m-2 bg-white rounded shadow">
  <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-2 font-bold bg-gray-200 flex justify-between cursor-pointer">
  ${cat} <span>▼</span></div>
  <div class="hidden">`;

  items.forEach(p=>{
   html+=`
   <div class="flex justify-between p-2 border-b">
   <b>${p.nombre}</b>
   <div>
   ${p.precio}€
   <button onclick="add('${p.nombre}',${p.precio})" class="bg-blue-600 text-white px-2 ml-2 rounded">+</button>
   </div>
   </div>`;
  });

  html+=`</div></div>`;
 });

 document.getElementById("carta").innerHTML=html;
});

// CARRITO
function add(n,p){
 carrito.push({nombre:n,precio:p});
 let total=carrito.reduce((a,b)=>a+Number(b.precio),0);
 totalEl.innerText=total.toFixed(2)+"€";
}

// ENVIAR
function enviarPedido(){
 if(!mesa) return alert("Escanea QR");
 if(!carrito.length) return;

 db.ref("comandas").push({
  mesa,
  items:carrito,
  total:carrito.reduce((a,b)=>a+Number(b.precio),0),
  camarero:""
 });

 carrito=[];
 totalEl.innerText="0.00€";
}

// PEDIDOS AGRUPADOS POR MESA
db.ref("comandas").on("value",snap=>{
 let data=snap.val();
 let cont=document.getElementById("pedidos");
 cont.innerHTML="";
 if(!data) return;

 let mesas={};

 Object.keys(data).forEach(id=>{
  let p=data[id];
  if(!mesas[p.mesa]) mesas[p.mesa]={total:0,prod:{},ids:[]};
  mesas[p.mesa].total+=Number(p.total);
  mesas[p.mesa].ids.push(id);

  p.items.forEach(i=>{
   mesas[p.mesa].prod[i.nombre]=(mesas[p.mesa].prod[i.nombre]||0)+1;
  });
 });

 Object.keys(mesas).forEach(m=>{
  cont.innerHTML+=`
  <div class="bg-white p-3 m-2 rounded shadow">

  <b>Mesa ${m}</b><br>

  ${Object.keys(mesas[m].prod).map(k=>`- ${k} x${mesas[m].prod[k]}`).join("<br>")}

  <div class="text-red-600 font-bold mt-2">${mesas[m].total.toFixed(2)}€</div>

  <select onchange="setCamarero('${m}',this.value)" class="w-full mt-2">
  <option value="">Seleccionar camarero</option>
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option><option>7</option>
  </select>

  <button onclick="cobrar('${m}')" class="bg-green-700 text-white w-full mt-2 p-2 rounded">
  COBRAR
  </button>

  </div>`;
 });
});

// CAMARERO
function setCamarero(m,c){
 db.ref("comandas").once("value",snap=>{
  let d=snap.val();
  Object.keys(d).forEach(id=>{
   if(d[id].mesa==m){
    db.ref("comandas/"+id+"/camarero").set(c);
   }
  });
 });
}

// COBRAR CON VALIDACIÓN
function cobrar(m){
 db.ref("comandas").once("value",snap=>{
  let d=snap.val();

  let ok=true;

  Object.keys(d).forEach(id=>{
   if(d[id].mesa==m && !d[id].camarero){
    ok=false;
   }
  });

  if(!ok){
   alert("Selecciona camarero antes de cobrar");
   return;
  }

  Object.keys(d).forEach(id=>{
   if(d[id].mesa==m){
    db.ref("comandas/"+id).remove();
   }
  });
 });
}
</script>

</body>
</html>
