<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar App V1 Limpio</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.tab{display:none;padding:10px}
.active{display:block}
button{padding:10px;margin:5px;border:none;border-radius:8px;font-weight:bold}
.admin-btn{background:#1e3a8a;color:white}
input{padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc}
</style>
</head>
<body>

<h2 style="text-align:center">BAR APP V1 LIMPIO</h2>

<div id="adminLogin" style="text-align:center">
  <input id="pass" placeholder="Password admin">
  <button onclick="login()">Entrar</button>
</div>

<div id="admin" style="display:none">
  <div>
    <button onclick="show('camareros')" class="admin-btn">Camareros</button>
    <button onclick="show('carta')" class="admin-btn">Carta</button>
  </div>

  <div id="camareros" class="tab">
    <h3>Camareros</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="pin" placeholder="PIN">
    <button onclick="crearCamarero()">Crear</button>
    <div id="listaCamareros"></div>
  </div>

  <div id="carta" class="tab">
    <h3>Carta (solo vista)</h3>
    <div id="listaCarta"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAxI0dtf4RdxNDYlmk_dVYhF5NyZOg8B2w",
  authDomain: "bar-el-pelotazo-16c19.firebaseapp.com",
  databaseURL: "https://bar-el-pelotazo-16c19-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bar-el-pelotazo-16c19",
  storageBucket: "bar-el-pelotazo-16c19.firebasestorage.app",
  messagingSenderId: "209747310104",
  appId: "1:209747310104:web:aea60ec14671e302f9f56d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function login(){
  const pass=document.getElementById("pass").value;
  if(pass==="1234"){
    document.getElementById("adminLogin").style.display="none";
    document.getElementById("admin").style.display="block";
    cargarCamareros();
    cargarCarta();
  }else{
    alert("Incorrecto");
  }
}

function show(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

function crearCamarero(){
  const nombre=document.getElementById("nombre").value.trim();
  const pin=document.getElementById("pin").value.trim();

  if(!nombre||!pin){alert("faltan datos");return;}

  db.ref("camareros").push({
    nombre:nombre,
    pin:pin,
    activo:true
  });

  document.getElementById("nombre").value="";
  document.getElementById("pin").value="";
}

function cargarCamareros(){
  db.ref("camareros").on("value",snap=>{
    const data=snap.val()||{};
    let html="";
    Object.values(data).forEach(c=>{
      html+=`<div>${c.nombre} - ${c.pin}</div>`;
    });
    document.getElementById("listaCamareros").innerHTML=html;
  });
}

function cargarCarta(){
  db.ref("carta").on("value",snap=>{
    const data=snap.val()||{};
    let html="";
    Object.values(data).forEach(p=>{
      html+=`<div>${p.nombre} - ${p.precio}€</div>`;
    });
    document.getElementById("listaCarta").innerHTML=html;
  });
}
</script>

</body>
</html>
